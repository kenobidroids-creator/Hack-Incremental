        <span style="font-size:9px;color:#4a7a4a;">STEP ${chain.currentStep+1}/${chain.steps.length}</span>
      </div>
      <div style="margin-bottom:8px;line-height:1.8;">${stepDots}</div>
      <div style="font-size:10px;color:#4a7a4a;">${chain.flavor}</div>`;

    // Show CONTINUE button if not currently running (between steps or resumed from save)
    const currentStep=chain.steps[chain.currentStep];
    const needsContinue=!G.missionRunning&&currentStep&&(currentStep.status==='pending'||currentStep.status==='active');
    if(needsContinue){
      const contBtn=document.createElement('button');
      contBtn.style.cssText='margin-top:8px;width:100%;padding:9px;background:rgba(0,255,65,.08);border:1px solid #00ff41;color:#00ff41;font-family:Share Tech Mono,monospace;font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:3px;';
      contBtn.textContent=`[ CONTINUE — ${getMissionToolName(currentStep.toolId)} ]`;
      contBtn.onclick=()=>{
        if(currentStep.status==='active')currentStep.status='pending';
        advanceMissionChain();
        showPanel('none');
      };
      chainBox.appendChild(contBtn);
    }

    // Abort button
    const abortBtn=document.createElement('button');
    abortBtn.style.cssText='margin-top:6px;width:100%;padding:7px;background:transparent;border:1px solid #ff2d2d;color:#ff2d2d;font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:2px;cursor:pointer;border-radius:3px;';
    abortBtn.textContent='[ ABANDON MISSION ]';
    abortBtn.onclick=()=>{if(confirm('Abandon this mission? The node will go on cooldown.')){abortMission();}};
    chainBox.appendChild(abortBtn);
    container.appendChild(chainBox);
  }

  // Sector switcher
  if(G.unlockedSectors.length>1){
    const tabRow=document.createElement('div');
    tabRow.style.cssText='padding:6px 10px 0;display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid #1a3a1a;padding-bottom:8px;';
    SECTORS.forEach(s=>{
      if(!G.unlockedSectors.includes(s.id))return;
      const tab=document.createElement('span');
      tab.className=`sector-tab ${G.currentSector===s.id?'act':''}`;
      tab.style.borderColor=G.currentSector===s.id?s.color:'#1a3a1a';
      tab.style.color=G.currentSector===s.id?s.color:'#4a7a4a';
      tab.textContent=s.name;
      tab.onclick=()=>{G.currentSector=s.id;renderPanel('missions');};
      tabRow.appendChild(tab);
    });
    container.appendChild(tabRow);
  }

  // Available missions from scanned nodes in this sector — skip owned (those are done)
  const sectorNodes=MAP_NODES.filter(n=>n.sector===G.currentSector&&n.nodeType!=='hub');
  const curSector=SECTORS[G.currentSector];
  const chainBusy=!!G.activeMissionChain;
  const hdr=document.createElement('div');
  hdr.style.cssText=`padding:6px 12px 4px;font-size:9px;letter-spacing:2px;color:${curSector.color};border-bottom:1px solid #1a3a1a;`;
  hdr.textContent=`// ${curSector.name} — AVAILABLE TARGETS`;
  container.appendChild(hdr);

  if(chainBusy){
    const busyNote=document.createElement('div');
    busyNote.style.cssText='padding:4px 12px;font-size:9px;color:#4a7a4a;';
    busyNote.textContent='Mission in progress — complete or abandon before starting another.';
    container.appendChild(busyNote);
  }

  let anyVisible=false;
  sectorNodes.forEach(nodeDef=>{
    const nodeState=G.networkNodes[nodeDef.id];
    if(!nodeState||nodeState.status==='unknown')return;
    // Skip owned nodes — they're done. Rivals reclaiming them shows in RIVAL NODES section.
    if(nodeState.status==='owned')return;
    anyVisible=true;
    const template=MISSION_TEMPLATES[nodeDef.nodeType];
    if(!template)return;

    const isActive=G.activeMissionChain?.nodeId===nodeDef.id;
    const cooldownUntil=G.nodeCooldowns?.[nodeDef.id]||0;
    const onCooldown=Date.now()<cooldownUntil;

    // Check all tools unlocked
    const allT=[...MT,...Object.values(FACTION_MT).flat()];
    const lockedTools=template.steps.filter(tid=>{
      const t=allT.find(t=>t.id===tid);
      return !t||G.missionsCompleted<t.unlockAt[0];
    });
    const stepsUnlocked=lockedTools.length===0;
    const lockedNames=lockedTools.map(tid=>{const t=allT.find(t=>t.id===tid);return t?t.name.split(':')[0].trim()+' ('+t.unlockAt[0]+'ops)':tid;});
    const canStart=stepsUnlocked&&!isActive&&!onCooldown&&!chainBusy;

    const card=document.createElement('div');
    const borderCol=isActive?'#00ff41':onCooldown?'#ff2d2d':'#1a3a1a';
    card.style.cssText=`margin:6px 10px;padding:10px 12px;border:1px solid ${borderCol};border-radius:4px;background:#050a05;cursor:${canStart?'pointer':'default'};`;

    const statusLabel=isActive?'<span style="color:#00ff41">► IN PROGRESS</span>':
      chainBusy?'<span style="color:#4a7a4a;font-size:9px;">mission active</span>':
      onCooldown?`<span style="color:#ff2d2d">⏱ ${Math.ceil((cooldownUntil-Date.now())/60000)}min</span>`:
      stepsUnlocked?'<span style="color:#4a7a4a">AVAILABLE</span>':
      `<span style="color:#1a3a1a">🔒 LOCKED</span>`;

    const chainPreview=template.steps.map(tid=>{
      const t=allT.find(t=>t.id===tid);
      return t?t.name.split(':')[0].trim():'?';
    }).join(' → ');

    const nodeHeat=G.networkNodes[nodeDef.id]?.nodeHeat||0;
    const heatLabel=nodeHeat>70
      ?`<span style="color:#ff2d2d">⚠ HOT ${Math.round(nodeHeat)}%</span>`
      :nodeHeat>30
      ?`<span style="color:#ffb700">~ ${Math.round(nodeHeat)}% heat</span>`
      :'';

    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <span style="color:#00ff41;font-size:12px;">${template.name(nodeDef)}</span>
        ${statusLabel}
      </div>
      <div style="font-size:10px;color:#4a7a4a;margin-bottom:6px;line-height:1.5;">${template.flavor(nodeDef)}</div>
      <div style="font-size:9px;color:#4a7a4a;display:flex;justify-content:space-between;align-items:center;">
        <span><span style="color:#00d4ff;">${chainPreview}</span> · ×${template.bonusMultiplier.toFixed(1)} · tier ${template.securityTier}</span>
        ${heatLabel}
      </div>
      ${!stepsUnlocked?`<div style="font-size:9px;color:#1a3a1a;margin-top:3px;">🔒 ${lockedNames.join(', ')}</div>`:''}`;

    if(canStart) card.onclick=()=>startMissionChain(nodeDef.id);
    container.appendChild(card);
  });

  if(!anyVisible){
    const curSectorObj=SECTORS[G.currentSector];
    const tip=document.createElement('div');
    tip.style.cssText='margin:12px 10px;padding:12px;border:1px dashed #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;text-align:center;line-height:1.8;';
    tip.innerHTML=`No targets scanned in <span style="color:${curSectorObj.color}">${curSectorObj.name}</span> yet.<br>Run a <span style="color:#00ff41">NETWORK SCAN</span> to reveal nodes here.`;

    // If nmap is unlocked, offer a one-tap shortcut to start it
    const nmapT=MT.find(t=>t.id==='nmap_scan');
    const nmapOk=nmapT&&G.missionsCompleted>=nmapT.unlockAt[0];
    if(nmapOk&&!G.missionRunning){
      const scanBtn=document.createElement('button');
      scanBtn.style.cssText='margin-top:8px;padding:7px 14px;background:transparent;border:1px solid #00ff41;color:#00ff41;font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:3px;';
      scanBtn.textContent='[ RUN NETWORK SCAN ]';
      scanBtn.onclick=()=>{selectMission('nmap_scan');showPanel('none');};
      tip.appendChild(scanBtn);
    }
    container.appendChild(tip);
  }

  // Random discovered nodes — collapsible
  const randNodes=Object.entries(G.networkNodes)
    .filter(([k,v])=>v.random&&v.sector===G.currentSector&&v.status!=='unknown'&&v.status!=='owned');
  if(randNodes.length>0){
    const expanded=G._discoveredExpanded||false;
    const rHdr=document.createElement('div');
    rHdr.style.cssText='padding:6px 12px 4px;font-size:9px;letter-spacing:2px;color:#4a7a4a;border-top:1px solid #1a3a1a;margin-top:4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;';
    rHdr.innerHTML=`<span>// DISCOVERED TARGETS (${randNodes.length})</span><span style="color:#1a3a1a;">${expanded?'▲ COLLAPSE':'▼ EXPAND'}</span>`;
    rHdr.onclick=()=>{G._discoveredExpanded=!G._discoveredExpanded;renderPanel('missions');};
    container.appendChild(rHdr);

    if(expanded){
      randNodes.forEach(([nodeId,nodeState])=>{
        const fakeNodeDef={id:nodeId,name:nodeState.name,sector:nodeState.sector,nodeType:nodeState.nodeType||'iot_device'};
        const template=MISSION_TEMPLATES[fakeNodeDef.nodeType];
        if(!template)return;
        const allT=[...MT,...Object.values(FACTION_MT).flat()];
        const stepsUnlocked=template.steps.every(tid=>{
          const t=allT.find(t=>t.id===tid);
          return t&&G.missionsCompleted>=t.unlockAt[0];
        });
        const isActive=G.activeMissionChain?.nodeId===nodeId;
        const cooldownUntil=G.nodeCooldowns?.[nodeId]||0;
        const onCooldown=Date.now()<cooldownUntil;
        const nodeHeat=nodeState.nodeHeat||0;
        const chainPreview=template.steps.map(tid=>{
          const t=allT.find(t=>t.id===tid);
          return t?t.name.split(':')[0].trim():'?';
        }).join(' → ');
        const heatLabel=nodeHeat>70?`<span style="color:#ff2d2d">⚠ HOT ${Math.round(nodeHeat)}%</span>`:nodeHeat>30?`<span style="color:#ffb700">~ ${Math.round(nodeHeat)}% heat</span>`:'';
        const statusLabel=isActive?'<span style="color:#00ff41">► IN PROGRESS</span>':onCooldown?`<span style="color:#ff2d2d">⏱ ${Math.ceil((cooldownUntil-Date.now())/60000)}min</span>`:stepsUnlocked?'<span style="color:#4a7a4a">AVAILABLE</span>':'<span style="color:#1a3a1a">🔒 LOCKED</span>';
        const card=document.createElement('div');
        const borderCol=isActive?'#00ff41':onCooldown?'#ff2d2d':'#1a3a1a';
        card.style.cssText=`margin:3px 10px;padding:9px 12px;border:1px solid ${borderCol};border-radius:4px;background:#050a05;cursor:${stepsUnlocked&&!isActive&&!onCooldown?'pointer':'default'};`;
        card.innerHTML=`
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">
            <span style="color:#00ff41;font-size:11px;">${template.name(fakeNodeDef)}</span>
            ${statusLabel}
          </div>
          <div style="font-size:9px;color:#4a7a4a;display:flex;justify-content:space-between;">
            <span><span style="color:#00d4ff;">${chainPreview}</span> · ×${template.bonusMultiplier.toFixed(1)}</span>
            ${heatLabel}
          </div>`;
        if(stepsUnlocked&&!isActive&&!onCooldown)card.onclick=()=>startMissionChain(nodeId);
        container.appendChild(card);
      });
    }
  }

  // Rival-reclaimed nodes — show as RECLAIM missions with rival colour
  const rivalNodes=Object.entries(G.networkNodes)
    .filter(([k,v])=>v.status&&v.status.startsWith('rival')&&v.sector===G.currentSector);
  if(rivalNodes.length>0){
    const rivalHdr=document.createElement('div');
    rivalHdr.style.cssText='padding:6px 12px 4px;font-size:9px;letter-spacing:2px;color:#ff2d2d;border-top:1px solid #1a3a1a;margin-top:4px;';
    rivalHdr.textContent='// RIVAL NODES — RECLAIM';
    container.appendChild(rivalHdr);
    rivalNodes.forEach(([nodeId,nodeState])=>{
      const rivalType=nodeState.status; // 'rival_cipher' | 'rival_ghost' | 'rival_gov'
      const rivalColor=rivalType==='rival_cipher'?'#cc44ff':rivalType==='rival_ghost'?'#00d4ff':'#ff6600';
      const rivalLabel=rivalType==='rival_cipher'?'CIPHER':rivalType==='rival_ghost'?'GHOSTNET':'GOV';
      // Use isp_node template as a default attack chain for reclaim
      const fakeNodeDef={id:nodeId,name:nodeState.name,sector:nodeState.sector,nodeType:nodeState.nodeType||'isp_node'};
      const template=MISSION_TEMPLATES[fakeNodeDef.nodeType]||MISSION_TEMPLATES['isp_node'];
      const allT=[...MT,...Object.values(FACTION_MT).flat()];
      const stepsUnlocked=template.steps.every(tid=>{
        const t=allT.find(t=>t.id===tid);
        return t&&G.missionsCompleted>=t.unlockAt[0];
      });
      const isActive=G.activeMissionChain?.nodeId===nodeId;
      const chainPreview=template.steps.map(tid=>{
        const t=allT.find(t=>t.id===tid);
        return t?t.name.split(':')[0].trim():'?';
      }).join(' → ');
      const card=document.createElement('div');
      card.style.cssText=`margin:4px 10px;padding:10px 12px;border:1px solid ${rivalColor};border-radius:4px;background:rgba(${rivalType==='rival_cipher'?'204,68,255':rivalType==='rival_ghost'?'0,212,255':'255,102,0'},.05);cursor:${stepsUnlocked&&!isActive?'pointer':'default'};`;
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="color:${rivalColor};font-size:12px;">RECLAIM: ${nodeState.name}</span>
          <span style="font-size:9px;background:${rivalColor};color:#050a05;padding:1px 5px;border-radius:2px;letter-spacing:1px;">${rivalLabel}</span>
        </div>
        <div style="font-size:10px;color:#4a7a4a;margin-bottom:5px;">${rivalLabel} took this node. Run them out and reclaim it.</div>
        <div style="font-size:9px;color:#4a7a4a;">
          <span style="color:#00d4ff;">${chainPreview}</span> · ownership restored on complete
        </div>`;
      if(stepsUnlocked&&!isActive)card.onclick=()=>startMissionChain(nodeId);
      container.appendChild(card);
    });
  }
}

function renderContractsUI(container){
  // Refresh if empty or stale (>15 min) — but don't clobber a sector recon contract
  const hasSectorRecon=(G.contracts||[]).some(c=>c.sectorRecon);
  if(!hasSectorRecon&&(!G.contracts||G.contracts.length===0||(Date.now()-G.contractsLastRefresh>15*60*1000))){
    generateContracts();
  }

  const hdr=document.createElement('div');
  hdr.style.cssText='padding:8px 12px 4px;font-size:9px;color:#4a7a4a;letter-spacing:2px;border-bottom:1px solid #1a3a1a;display:flex;justify-content:space-between;align-items:center;';
  const refreshIn=Math.max(0,Math.ceil((G.contractsLastRefresh+15*60*1000-Date.now())/60000));
  hdr.innerHTML=`<span>// DARKWEB CONTRACTS</span><span style="color:#1a3a1a;">refresh ${refreshIn}min</span>`;
  container.appendChild(hdr);

  const intro=document.createElement('div');
  intro.style.cssText='padding:6px 12px 8px;font-size:10px;color:#4a7a4a;border-bottom:1px solid #1a3a1a;';
  intro.textContent='Anonymous single-op gigs. Lower pay, no chain required. Good for loot farming.';
  container.appendChild(intro);

  if(!G.contracts||G.contracts.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='margin:12px 10px;padding:12px;border:1px dashed #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;text-align:center;';
    empty.textContent='// No contracts available. Check back soon.';
    container.appendChild(empty);
    return;
  }

  G.contracts.forEach(contract=>{
    const expired=Date.now()>contract.expiresAt;
    const isActive=G.activeContractId===contract.id;
    const minsLeft=Math.max(0,Math.ceil((contract.expiresAt-Date.now())/60000));
    const isSectorRecon=!!contract.sectorRecon;
    const sectorObj=isSectorRecon?SECTORS[contract.sectorRecon]:null;

    const card=document.createElement('div');
    if(isSectorRecon){
      // Sector recon: visually urgent — sector colour border, NEW SECTOR badge
      const sc=sectorObj?.color||'#ffb700';
      card.style.cssText=`margin:6px 10px;padding:10px 12px;border:1px solid ${isActive?'#00ff41':expired?'#1a3a1a':sc};border-left:3px solid ${expired?'#1a3a1a':sc};border-radius:4px;background:rgba(${sc==='#ffb700'?'255,183,0':sc==='#ff2d2d'?'255,45,45':sc==='#cc44ff'?'204,68,255':'0,212,255'},.05);opacity:${expired?0.4:1};`;
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="color:${sc};font-size:12px;letter-spacing:1px;">${contract.sectorReconTitle}</span>
          <span style="font-size:9px;background:${sc};color:#050a05;padding:1px 6px;border-radius:2px;letter-spacing:1px;">${isActive?'► SCANNING':expired?'EXPIRED':'NEW SECTOR'}</span>
        </div>
        <div style="font-size:10px;color:#4a7a4a;margin-bottom:6px;line-height:1.5;">${contract.flavor}</div>
        <div style="font-size:9px;display:flex;justify-content:space-between;">
          <span style="color:#4a7a4a;">Tool: <span style="color:#00ff41;">NETWORK SCAN</span> · Reveals ${sectorObj?.name||'sector'} entry node</span>
          <span style="color:${minsLeft<15?'#ff2d2d':'#4a7a4a'};">⏱ ${minsLeft}min</span>
        </div>
        <div style="font-size:9px;color:#4a7a4a;margin-top:3px;">Bonus: <span style="color:#ffb700;">+$${fmtNum(contract.reward)}</span></div>`;
    } else {
      // Regular contract
      const borderCol=isActive?'#00ff41':'#1a3a1a';
      card.style.cssText=`margin:6px 10px;padding:10px 12px;border:1px solid ${borderCol};border-radius:4px;background:#050a05;opacity:${expired?0.4:1};`;
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="color:#00ff41;font-size:12px;">${contract.toolName}</span>
          <span style="font-size:9px;color:${isActive?'#00ff41':'#4a7a4a'};">${isActive?'► RUNNING':expired?'EXPIRED':minsLeft+'min left'}</span>
        </div>
        <div style="font-size:10px;color:#4a7a4a;margin-bottom:6px;line-height:1.5;">${contract.flavor}</div>
        <div style="font-size:9px;color:#4a7a4a;">
          Bonus: <span style="color:#ffb700;">+$${fmtNum(contract.reward)}</span>
          <span style="color:#4a7a4a;"> · loot goes to market as usual</span>
        </div>`;
    }

    if(!expired&&!isActive&&!G.missionRunning){
      card.style.cursor='pointer';
      card.onclick=()=>acceptContract(contract.id);
    }
    container.appendChild(card);
  });

  // Manual refresh button
  const refBtn=document.createElement('button');
  refBtn.style.cssText='margin:8px 10px;padding:7px;width:calc(100% - 20px);background:transparent;border:1px solid #1a3a1a;color:#4a7a4a;font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:3px;display:block;';
  refBtn.textContent='[ REFRESH CONTRACTS ]';
  refBtn.onclick=()=>{generateContracts();renderPanel('missions');};
  container.appendChild(refBtn);
}

function renderMap(container){
  const wrap=document.createElement('div'); wrap.style.cssText='padding:10px 12px;';

  // Sector selector tabs
  const sectorRow=document.createElement('div'); sectorRow.style.cssText='margin-bottom:10px;';
  SECTORS.forEach(s=>{
    const unlocked=G.unlockedSectors.includes(s.id);
    const tab=document.createElement('span');
    tab.className=`sector-tab ${G.currentSector===s.id?'act':''} ${!unlocked?'locked':''}`;
    tab.textContent=s.name; tab.style.borderColor=unlocked?s.color:'#1a3a1a'; tab.style.color=unlocked?(G.currentSector===s.id?s.color:'#4a7a4a'):'#1a3a1a';
    if(unlocked) tab.onclick=()=>{G.currentSector=s.id;renderPanel('map');if(curPanel==='missions')renderPanel('missions');};
    sectorRow.appendChild(tab);
  });
  wrap.appendChild(sectorRow);

  // Sector progress
  const sp=G.sectorProgress[G.currentSector]||{missions:0,owned:0};
  const sector=SECTORS[G.currentSector];
  const next=SECTORS[G.currentSector+1];
  if(next&&!G.unlockedSectors.includes(next.id)){
    const prog=document.createElement('div'); prog.style.cssText='font-size:10px;color:#4a7a4a;margin-bottom:8px;padding:6px 8px;border:1px solid #1a3a1a;border-radius:3px;';
    prog.innerHTML=`<div style="color:#ffb700;margin-bottom:3px;">UNLOCK ${next.name}</div><div style="color:#4a7a4a;font-size:9px;margin-bottom:4px;">${next.desc||''}</div>Ops: <span style="color:#00ff41">${sp.missions}</span>/${next.req.missions} | Owned: <span style="color:#00ff41">${countOwnedInSector(G.currentSector)}</span>/${next.req.owned} | Credits: <span style="color:#00ff41">$${fmtNum(G.credits)}</span>/$${fmtNum(next.req.credits)}`;
    wrap.appendChild(prog);
  }

  // ASCII map
  const mapPre=document.createElement('pre');
  mapPre.style.cssText='font-family:Share Tech Mono,monospace;font-size:10px;line-height:1.6;color:#4a7a4a;overflow-x:auto;';

  const ns=s=>G.networkNodes[s]||{};
  const sym=(id,lbl)=>{
    const n=ns(id); const name2=lbl||n.name||id;
    if(!n.status||n.status==='unknown') return `<span style="color:#1a3a1a">[ ??? ]</span>`;
    const colors={owned:'#ffb700',scanned:'#00ff41',burned:'#ff2d2d',rival_cipher:'#cc44ff',rival_ghost:'#00d4ff',rival_gov:'#ff6600'};

function calcOff(secs){
  if(secs<60)return null;
  // Offline agent determines how long simulated ops run
  const agentWindows=[0,30,120,240,480,600]; // minutes per level
  const agentLevel=G.offlineAgentLevel||0;
  const maxMins=agentLevel>0?agentWindows[agentLevel]:30; // baseline 30min even without agent (just market)
  const mins=Math.min(Math.floor(secs/60),maxMins);
  const cappedSecs=mins*60;
  const agentEfficiency=0.30; // 30% of normal earnings

  // Simulated mission earnings if agent is running
  let agentEarned=0;
  if(agentLevel>0&&mins>0){
    const t=MT[Math.min(Math.floor(G.missionsCompleted/10),MT.length-1)];
    const opsPerHour=6; // rough average
    const simulatedOps=Math.floor((mins/60)*opsPerHour);
    agentEarned=Math.floor(t.reward.base*G.rep*simulatedOps*agentEfficiency);
  }

  // Market offline sales (unchanged — always applies)
  let marketEarned=0;
  const marketLog=[];
  if(G.lootInventory&&G.lootInventory.length>0){
    const bwMult=Math.log2(G.bandwidth/56+1)*0.5+0.5;
    const ticksOffline=Math.floor(cappedSecs/2);
    G.lootInventory.forEach(loot=>{
      if(loot.qty<=0)return;
      const sellBoostActive=G.sellBoostUntil&&Date.now()<G.sellBoostUntil;
      const sellBoostMult=sellBoostActive?(G.sellBoostMult||3):1;
      const sellRate=Math.max(0.5,bwMult*(loot.qty>1000?2:1))*3*sellBoostMult;
      const mult=getLootValueMult(loot.type,loot.nodeId);
      const unitsSold=Math.min(loot.qty,Math.floor(sellRate*ticksOffline));
      const earned=unitsSold*loot.valueEach*mult;
      if(earned>0){
        marketEarned+=earned;
        marketLog.push({label:loot.label,qty:unitsSold,earned});
        loot.qty-=unitsSold;
        loot.totalValue=loot.qty*loot.valueEach;
      }
    });
    G.lootInventory=G.lootInventory.filter(l=>l.qty>0);
    G.marketEarnings=(G.marketEarnings||0)+marketEarned;
  }

  const totalEarned=agentEarned+Math.floor(marketEarned);
  if(totalEarned>0)G.credits+=totalEarned;
  return{mins,agentEarned,agentLevel,marketEarned:Math.floor(marketEarned),marketLog,totalEarned};
}

function showOffModal(g){
  if(!g)return;
  let html=`<div style="margin-bottom:8px;">Away: <span class="hi">${g.mins}min</span></div>`;
  if(g.agentEarned>0){
    html+=`<div>Offline agent: <span class="hi">+$${fmtNum(g.agentEarned)}</span> <span style="color:#4a7a4a;">(${Math.round(30)}% efficiency)</span></div>`;
  } else if(g.agentLevel===0&&g.mins>0){
    html+=`<div style="color:#4a7a4a;">No offline agent. Upgrade HW → OFFLINE AGENT to earn while away.</div>`;
  }
  if(g.marketEarned>0){
    html+=`<div>Market sales: <span class="hi">+$${fmtNum(g.marketEarned)}</span></div>`;
    g.marketLog.forEach(m=>{
      html+=`<div style="padding-left:8px;color:#4a7a4a;">${fmtNum(m.qty)} ${m.label} — $${fmtNum(m.earned)}</div>`;
    });
  }
  if(g.totalEarned>0){
    html+=`<div style="margin-top:8px;border-top:1px solid #1a3a1a;padding-top:6px;color:#ffb700;">+$${fmtNum(g.totalEarned)} total</div>`;
  } else {
    html+=`<div style="margin-top:6px;color:#4a7a4a;">No market activity while away.</div>`;
  }
  el('offlog').innerHTML=html;
  el('offmod').classList.add('on');
}

const SECTORS=[
  {id:0,name:'DOWNTOWN',        req:{missions:0, owned:0,   credits:0},     color:'#00ff41', desc:'Local blocks. Open networks. Low risk.'},
  {id:1,name:'FINANCIAL DIST',  req:{missions:5, owned:2,   credits:800},   color:'#ffb700', desc:'Corps and banks. Better loot. Rivals present.'},
  {id:2,name:'GOV QUARTER',     req:{missions:8, owned:3,   credits:5000},  color:'#ff2d2d', desc:'Municipal systems. High risk. Always watched.'},
  {id:3,name:'UNDERTOWN',       req:{missions:6, owned:4,   credits:20000}, color:'#cc44ff', desc:'Darknet. Black markets. Faction territory.'},
  {id:4,name:'INTL HUB',        req:{missions:8, owned:5,   credits:80000}, color:'#00d4ff', desc:'Global infrastructure. Maximum risk.'},
];

function getSectorMissions(sectorId){
  // Each sector has a subset of missions appropriate to its tier
  const pools={
    0:['nmap_scan','john_crack','hydra_ssh'],
    1:['nc_listen','scp_exfil','aircrack'],
    2:['sqlmap','metasploit'],
    3:['ssh_backdoor','cipher_darkweb','ghost_corp'],
    4:['worm_deploy'],
  };
  return pools[sectorId]||[];
}

function canUnlockSector(id){
  if(id===0)return true;
  const prev=SECTORS[id-1];
  const sp=G.sectorProgress[id-1]||{missions:0,owned:0};
  const req=SECTORS[id].req;
  // Faction gate for sector 3
  if(id===3&&!G.faction)return false;
  return sp.missions>=req.missions && sp.owned>=req.owned && G.credits>=req.credits;
}

function tryUnlockSectors(){
  SECTORS.forEach(s=>{
    if(!G.unlockedSectors.includes(s.id)&&canUnlockSector(s.id)){
      G.unlockedSectors.push(s.id);
      // Fanfare — make it feel like a real moment
      setTimeout(()=>{
        logSep();
        log(`> ▲ SECTOR UNLOCKED: ${s.name}`,'ok');
        log(`> ${s.desc}`,'dim');
        log(`> Open MAP to explore. Switch sectors in OPS to see new tools.`,'info');
        logSep();
        logMsg(`▲ SECTOR UNLOCKED: ${s.name} — ${s.desc}`,'ok');
        G.msgUnread=true; el('msg-badge').style.display='inline';
        // Generate the one-time sector recon contract
        generateSectorReconContract(s.id);
        // Refresh OPS panel if open so new tools are immediately visible
        if(curPanel==='missions')renderPanel('missions');
      },200);
    }
  });
}

function onMissionCompletedInSector(missionId){
  const sector=G.currentSector;
  if(!G.sectorProgress[sector])G.sectorProgress[sector]={missions:0,owned:0};
  G.sectorProgress[sector].missions++;
  tryUnlockSectors();
}

function countOwnedInSector(sectorId){
  // Simplified: total owned nodes counts toward all sectors
  return Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length;
}

const RIVAL_NODES=['axiom_db','fed_node','market','cipher_node','interpol'];

function initRivalNodes(){
  // Only set rivals in sector 1+ when those sectors are unlocked/visible.
  // Sector 0 (local net) is always yours — no rivals.
  // Rivals are seeded when a sector is first entered (unlocked).
  // This is called when unlocking sector 1+.
  if(G.unlockedSectors.includes(1)){
    if(G.networkNodes.corp_db&&G.networkNodes.corp_db.status==='scanned')
      G.networkNodes.corp_db.status='rival_cipher';
  }
  if(G.unlockedSectors.includes(2)){
    if(G.networkNodes.interpol&&G.networkNodes.interpol.status==='scanned')
      G.networkNodes.interpol.status='rival_gov';
  }
  if(G.unlockedSectors.includes(3)){
    if(G.networkNodes.market&&G.networkNodes.market.status==='scanned')
      G.networkNodes.market.status='rival_ghost';
  }
}

function rivalPassiveReclaim(){
  // Rivals slowly try to reclaim your nodes — 1 node per ~10 min
  const yourNodes=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status==='owned');
  if(yourNodes.length<=2)return; // skip reclaim if only 2 nodes
  const target=yourNodes[rnd(0,yourNodes.length-1)];
  if(!target)return;
  const rival=G.faction==='cipher'?'rival_ghost':'rival_cipher';
  G.networkNodes[target[0]].status='rival_cipher';
  logMsg(`> RIVAL RECLAIM: ${target[1].name||target[0]} taken by rival faction. Attack it back.`,'warn');
  G.msgUnread=true; el('msg-badge').style.display='inline';
}

function triggerRivalRaid(){
  if(!G.missionRunning||intState.active)return;
  if(G.phase!=='process')return;
  // Fire a special interrupt
  const raidInt={
    id:'rival_raid',
    title:'⚠ RIVAL FACTION RAID',
    body:'A rival operator is attacking your node. Tap to defend before it falls.',
    type:'timed_tap',timer:10,
    tapLabel:'[ DEFEND NODE ]',
    successMsg:'Node defended. Rival repelled.',
    failMsg:'Node lost to rival faction.',
    heatOnFail:10,
    cond:()=>true,
  };
  fireInterrupt(raidInt);
}

// local:true  = runs on YOUR machine, uses your RAM slots
// local:false = deployed to target node, uses node resources (no RAM cost)
// ═══════════════════════════════════════════════
const SCRIPT_DEFS=[
  {id:'keylogger',  name:'keylogger.py',   local:false, cr_s:2,   heat_s:.04, ram:0, price:150,  opsReq:0,  maxLvl:3, lvlBonus:2,   desc:'Installed on target. Passive credit drip.',    flavor:'Simple keylogger. Installed on device. Pays steady.'},
  {id:'portscanner',name:'portscanner.sh', local:true,  cr_s:0,   heat_s:0,   ram:1, price:200,  opsReq:0,  maxLvl:1, lvlBonus:0,   desc:'Runs locally. Passive recon, reveals nodes.',  flavor:'Continuous sweep from your machine. No trace.'},
  {id:'sniffer',    name:'sniffer.py',     local:true,  cr_s:0,   heat_s:.02, ram:1, price:480,  opsReq:5,  maxLvl:2, lvlBonus:0,   desc:'Runs locally. Sniffs traffic from your rig.',  flavor:'Local packet capture. Useful on active nodes.'},
  {id:'miner',      name:'miner.sh',       local:false, cr_s:8,   heat_s:.28, ram:0, price:900,  opsReq:10, maxLvl:3, lvlBonus:6,   desc:'Installed on target. Crypto mining, high yield.',flavor:'Burns the node\'s CPU for coin. Hot. Worth it.'},
  {id:'ddos',       name:'ddos.py',        local:false, cr_s:0,   heat_s:.14, ram:0, price:1400, opsReq:20, maxLvl:1, lvlBonus:0,   desc:'Installed on target. Auto-attacks rival nodes.',flavor:'Automated flood tool. Rivals hate it.', attacks:true},
];

function getScriptSlots(){return Math.max(1,Math.floor(G.ram/512));}
function getUsedSlots(){
  // Only LOCAL scripts consume your RAM slots
  return (G.deployedScripts||[]).filter(s=>{
    if(!s.active)return false;
    const def=SCRIPT_DEFS.find(d=>d.id===s.scriptId);
    return def?.local===true;
  }).reduce((acc,s)=>{
    const def=SCRIPT_DEFS.find(d=>d.id===s.scriptId);
    return acc+(def?.ram||1);
  },0);
}
function isScriptOwned(scriptId){return (G.ownedScripts||[]).includes(scriptId);}
function isScriptAvailable(def){return G.missionsCompleted>=def.opsReq;}
function getScriptLevel(scriptId,nodeId){
  const entry=G.deployedScripts?.find(s=>s.scriptId===scriptId&&(nodeId?s.nodeId===nodeId:true));
  return entry?.level||1;
}
function getScriptIncome(def,level){
  return def.cr_s+(def.lvlBonus*(level-1));
}

function buyScript(scriptId){
  const def=SCRIPT_DEFS.find(d=>d.id===scriptId); if(!def)return;
  if(isScriptOwned(scriptId)){log(`> Already own ${def.name}`,'dim');return;}
  if(!isScriptAvailable(def)){log(`> Need ${def.opsReq} ops to unlock.`,'warn');return;}
  if(G.credits<def.price){log(`> Need $${fmtNum(def.price)} to buy ${def.name}`,'warn');playFail();return;}
  G.credits-=def.price;
  if(!G.ownedScripts)G.ownedScripts=[];
  G.ownedScripts.push(scriptId);
  log(`> PURCHASED: ${def.name} — installed in software library`,'ok');
  playOK(); updateUI();
  if(curPanel==='market')renderPanel('market');
  if(curPanel==='upgrades')renderPanel('upgrades');
}

function upgradeScript(scriptId,nodeId){
  const def=SCRIPT_DEFS.find(d=>d.id===scriptId); if(!def)return;
  const entry=G.deployedScripts?.find(s=>s.scriptId===scriptId&&s.nodeId===nodeId);
  if(!entry){log(`> Script not deployed.`,'warn');return;}
  const lvl=entry.level||1;
  if(lvl>=def.maxLvl){log(`> ${def.name} already at max level.`,'dim');return;}
  const cost=def.price*(lvl*0.8); // each upgrade costs 80% of base price per level
  if(G.credits<cost){log(`> Need $${fmtNum(cost)} to upgrade.`,'warn');playFail();return;}
  G.credits-=cost;
  entry.level=(entry.level||1)+1;
  log(`> UPGRADED: ${def.name} → Level ${entry.level} (+$${def.lvlBonus}/s)`,'ok');
  playOK(); updateUI(); renderPanel('upgrades');
}

function deployScript(scriptId,nodeId){
  const def=SCRIPT_DEFS.find(d=>d.id===scriptId); if(!def)return;
  if(!isScriptOwned(scriptId)){log(`> ${def.name} not owned. Buy it from the SOFTWARE MARKET.`,'warn');return;}
  // Local scripts need RAM slots; remote scripts need an owned node
  if(def.local){
    const used=getUsedSlots(), slots=getScriptSlots();
    if(used+def.ram>slots){log(`> No RAM slots available (${used}/${slots} used)`,'warn');return;}
  } else {
    if(!nodeId){log(`> Select a node to deploy ${def.name} on.`,'warn');return;}
    if(G.networkNodes[nodeId]?.status!=='owned'){log(`> You don't own that node.`,'warn');return;}
  }
  if(!G.deployedScripts)G.deployedScripts=[];
  const existing=G.deployedScripts.find(s=>s.scriptId===scriptId&&s.nodeId===nodeId);
  if(existing){
    existing.active=!existing.active;
    log(`> ${existing.active?'STARTED':'STOPPED'}: ${def.name}${nodeId?' on '+G.networkNodes[nodeId]?.name:''},'ok`);
  } else {
    G.deployedScripts.push({scriptId,nodeId:nodeId||null,active:true,level:1});
    log(`> DEPLOYED: ${def.name}${nodeId?' → '+G.networkNodes[nodeId]?.name:''},'ok`);
  }
  playOK(); renderPanel('upgrades');
}

// Script tick — runs every 2 seconds
function scriptTick(){
  if(!G.deployedScripts)return;
  const ownedNodes=Object.keys(G.networkNodes||{}).filter(k=>G.networkNodes[k].status==='owned');
  let totalCr=0, totalTrace=0;
  G.deployedScripts.forEach(s=>{
    if(!s.active)return;
    const def=SCRIPT_DEFS.find(d=>d.id===s.scriptId); if(!def)return;
    // Remote scripts need an owned node
    if(!def.local){
      const targetNode=s.nodeId||ownedNodes[0];
      if(!targetNode||!ownedNodes.includes(targetNode)){s.active=false;return;}
    }
    const lvl=s.level||1;
    const income=getScriptIncome(def,lvl);
    totalCr+=income*2; // 2s tick
    totalTrace+=def.heat_s*2;
    // DDoS auto-attacks rival nodes
    if(def.attacks&&Math.random()<.05){
      const rivals=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status.startsWith('rival'));
      if(rivals.length){
        const target=rivals[rnd(0,rivals.length-1)];
        G.networkNodes[target[0]].status='scanned';
        logMsg(`> DDoS: ${target[1].name||target[0]} taken offline by ddos.py`,'ok');
        G.msgUnread=true; el('msg-badge').style.display='inline';
      }
    }
    // Port scanner reveals sector nodes
    if(def.id==='portscanner'&&Math.random()<.02)onReconComplete();
  });
  if(totalCr>0){
    G.credits+=totalCr*G.rep; updateUI();
    if(curPanel==='market')renderPanel('market');
  }
  if(totalTrace>0)addTrace(totalTrace);
}

const HACKER_DEFS=[

  {id:'skid2',  name:'script_kiddie_02', tier:1, costPerOp:120,  intervalMs:45000,  flavor:'Runs the same playbook. Every time.'},

  {id:'agent2', name:'freelance_op_B',   tier:2, costPerOp:350,  intervalMs:25000,  flavor:'Fast. Costs more than the others.'},
  {id:'elite1', name:'v01d_contact',     tier:3, costPerOp:900,  intervalMs:12000,  flavor:'You don\'t know who this is. Neither do they.'},
];

const HACKER_UNLOCK=[
  {tier:1, ops:10,  cost:2000,  label:'Script Kiddies', color:'#4a7a4a'},
  {tier:2, ops:25,  cost:8000,  label:'Freelance Ops',  color:'#ffb700'},
  {tier:3, ops:50,  cost:30000, label:'Elite Contact',   color:'#cc44ff'},
];

function isHackerOwned(id){return (G.hiredHackers||[]).some(h=>h.id===id);}
function isHackerActive(id){return (G.hiredHackers||[]).find(h=>h.id===id)?.active===true;}

function hireHacker(id){
  const def=HACKER_DEFS.find(d=>d.id===id); if(!def)return;
  if(isHackerOwned(id)){log(`> ${def.name} already on payroll.`,'dim');return;}
  const tierInfo=HACKER_UNLOCK.find(t=>t.tier===def.tier);
  if(G.missionsCompleted<tierInfo.ops){log(`> Need ${tierInfo.ops} ops to hire this tier.`,'warn');return;}
  if(G.credits<tierInfo.cost){log(`> Need $${fmtNum(tierInfo.cost)} to hire.`,'warn');playFail();return;}
  G.credits-=tierInfo.cost;
  if(!G.hiredHackers)G.hiredHackers=[];
  G.hiredHackers.push({id,active:true,lastRunAt:0});
  log(`> HIRED: ${def.name} — ${def.flavor}`,'ok');
  playOK(); updateUI(); renderPanel('upgrades'); save();
}

function toggleHacker(id){
  const entry=(G.hiredHackers||[]).find(h=>h.id===id); if(!entry)return;
  entry.active=!entry.active;
  const def=HACKER_DEFS.find(d=>d.id===id);
  log(`> ${def?.name||id}: ${entry.active?'ONLINE':'OFFLINE'}`,'dim');
  playOK(); renderPanel('upgrades'); save();
}

// Hacker tick — each active hacker tries to auto-run a free contract op periodically
function hackerTick(){
  if(!G.hiredHackers||G.hiredHackers.length===0)return;
  const now=Date.now();
  G.hiredHackers.forEach(entry=>{
    if(!entry.active)return;
    const def=HACKER_DEFS.find(d=>d.id===entry.id); if(!def)return;
    if(now-entry.lastRunAt<def.intervalMs)return;
    entry.lastRunAt=now;
    // Pay cost per op
    if(G.credits<def.costPerOp){
      log(`> ${def.name}: insufficient funds — idle`,'dim');
      return;
    }
    G.credits-=def.costPerOp;
    // Simulate a completed op — pick a tool, generate earnings & loot
    const allT=[...MT,...(G.faction?FACTION_MT[G.faction]:[])];
    const available=allT.filter(t=>{
      const[minM]=t.unlockAt;
      return G.missionsCompleted>=minM;
    });
    if(!available.length)return;
    const t=available[rnd(0,available.length-1)];
    const scale=1+G.missionsCompleted*0.05;
    const earned=Math.floor(t.reward.base*0.15*G.rep*scale); // 15% of normal — they're not as good as you
    G.credits+=earned;
    G.totalCreditsEarned=(G.totalCreditsEarned||0)+earned;
    G.missionsCompleted++;
    // Generate loot
    generateLoot(t.id,'HACKER_OP',null);
    updateUI();
    // Occasional log so player sees activity
    if(Math.random()<0.3)log(`> ${def.name}: completed ${t.name.split(':')[0]} — +$${fmtNum(earned)}`,'dim');
  });
}

function renderHiredHackers(container){
  const hdrDiv=document.createElement('div');
  hdrDiv.style.cssText='padding:8px 12px 3px;font-size:9px;color:#4a7a4a;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #1a3a1a;margin-top:4px;';
  hdrDiv.textContent='// CREW';
  container.appendChild(hdrDiv);

  const subDiv=document.createElement('div');
  subDiv.style.cssText='padding:0 12px 6px;font-size:10px;color:#4a7a4a;';
  subDiv.textContent='Hire operators to run ops automatically. Toggle on/off. You pay per op.';
  container.appendChild(subDiv);

  // Group by tier
  let lastTier=0;
  HACKER_DEFS.forEach(def=>{
    const tierInfo=HACKER_UNLOCK.find(t=>t.tier===def.tier);
    const owned=isHackerOwned(def.id);
    const active=isHackerActive(def.id);
    const tierUnlocked=G.missionsCompleted>=tierInfo.ops;
    const canAfford=G.credits>=tierInfo.cost;

    if(def.tier!==lastTier){
      lastTier=def.tier;
      const tierHdr=document.createElement('div');

      tierHdr.textContent=`${tierInfo.label} · $${fmtNum(tierInfo.cost)} to hire · ${tierInfo.ops} ops req`;
      container.appendChild(tierHdr);
    }

    const card=document.createElement('div');
    const borderCol=owned?(active?tierInfo.color:'#1a3a1a'):'#0d0d0d';
    card.style.cssText=`margin:2px 10px;padding:8px 12px;border:1px solid ${borderCol};border-radius:4px;background:${owned&&active?'rgba(0,0,0,.3)':'#050a05'};display:flex;justify-content:space-between;align-items:center;opacity:${tierUnlocked?1:0.35};gap:8px;`;

    const entry=G.hiredHackers?.find(h=>h.id===def.id);
    const secsToNext=entry?Math.max(0,Math.ceil((def.intervalMs-(Date.now()-entry.lastRunAt))/1000)):0;

    card.innerHTML=`
      <div style="flex:1;">
        <div style="color:${owned&&active?tierInfo.color:'#4a7a4a'};font-size:11px;margin-bottom:1px;">${def.name}</div>
        <div style="font-size:9px;color:#4a7a4a;">${def.flavor} · -$${def.costPerOp}/op${owned&&active&&secsToNext>0?` · next op in ${secsToNext}s`:''}</div>
      </div>`;

    if(!owned&&tierUnlocked){
      const btn=document.createElement('button');
      btn.style.cssText=`padding:5px 10px;background:transparent;border:1px solid ${canAfford?tierInfo.color:'#1a3a1a'};color:${canAfford?tierInfo.color:'#4a7a4a'};font-family:Share Tech Mono,monospace;font-size:9px;cursor:${canAfford?'pointer':'not-allowed'};border-radius:3px;flex-shrink:0;`;
      btn.textContent=`HIRE $${fmtNum(tierInfo.cost)}`;
      if(canAfford)btn.onclick=()=>hireHacker(def.id);
      card.appendChild(btn);
    } else if(owned){
      const btn=document.createElement('button');
      btn.style.cssText=`padding:5px 10px;background:${active?'rgba(0,255,65,.1)':'transparent'};border:1px solid ${active?tierInfo.color:'#1a3a1a'};color:${active?tierInfo.color:'#4a7a4a'};font-family:Share Tech Mono,monospace;font-size:9px;cursor:pointer;border-radius:3px;flex-shrink:0;letter-spacing:1px;`;
      btn.textContent=active?'ONLINE':'OFFLINE';
      btn.onclick=()=>toggleHacker(def.id);
      card.appendChild(btn);
    }
    container.appendChild(card);
  });
}

    }
  }

  // Active summary
  const activeAll=(G.deployedScripts||[]).filter(s=>s.active);
  if(activeAll.length>0){
    const summ=document.createElement('div');
    summ.style.cssText='margin:6px 10px;padding:8px;border:1px solid #003a0f;border-radius:4px;font-size:10px;color:#4a7a4a;background:rgba(0,255,65,.03);';
    const totalCr=activeAll.reduce((a,s)=>{const d=SCRIPT_DEFS.find(d=>d.id===s.scriptId);return a+getScriptIncome(d||{cr_s:0,lvlBonus:0},s.level||1);},0);
    const totalTr=activeAll.reduce((a,s)=>{const d=SCRIPT_DEFS.find(d=>d.id===s.scriptId);return a+(d?.heat_s||0);},0);
    summ.innerHTML=`<span style="color:#00ff41;">${activeAll.length} running</span> · +$${totalCr.toFixed(1)}/s · +${totalTr.toFixed(2)} trace/s`;
    container.appendChild(summ);
  }
}

function _renderScriptCard(def, nodeId, deployed, container, ownedNodes){
  const lvl=deployed?.level||1;
  const income=getScriptIncome(def,lvl);
  const atMax=lvl>=def.maxLvl;
  const canUpgrade=def.maxLvl>1&&deployed&&!atMax;
  const upgradeCost=canUpgrade?Math.floor(def.price*(lvl*0.8)):0;
  const card=document.createElement('div');
  card.className=`script-card ${deployed?'deployed':''}`;
  const stats=[];
  if(income>0){
    const lvlTag=def.maxLvl>1?(atMax?` (Lv${lvl} MAX)`:`(Lv${lvl})`):'';
    const nextTag=canUpgrade?` → $${income+def.lvlBonus}/s Lv${lvl+1}`:'';
    stats.push(`+$${income}/s ${lvlTag}${nextTag}`);
  }
  if(def.heat_s>0)stats.push(`+${def.heat_s} trace/s`);
  if(def.attacks)stats.push('auto-ddos');
  if(def.local&&def.ram>0)stats.push(`${def.ram} RAM`);
  card.innerHTML=`
    <div class="script-info">
      <div class="script-name">${def.name}${atMax&&def.maxLvl>1?' <span style="font-size:8px;color:#ffb700;">MAX</span>':''}</div>
      <div class="script-desc">${def.desc}</div>
      <div class="script-stats">${stats.join(' · ')}</div>
    </div>`;
  const btnGroup=document.createElement('div');
  btnGroup.style.cssText='display:flex;gap:4px;flex-shrink:0;';
  const runBtn=document.createElement('button');
  runBtn.className=`script-btn ${deployed?'active':''}`;
  runBtn.textContent=deployed?'STOP':'RUN';
  runBtn.onclick=()=>deployScript(def.id, nodeId);
  btnGroup.appendChild(runBtn);
  if(canUpgrade&&deployed){
    const canAffordUpg=G.credits>=upgradeCost;
    const upBtn=document.createElement('button');
    upBtn.style.cssText=`padding:5px 8px;background:transparent;border:1px solid ${canAffordUpg?'#ffb700':'#1a3a1a'};color:${canAffordUpg?'#ffb700':'#4a7a4a'};font-family:Share Tech Mono,monospace;font-size:9px;cursor:${canAffordUpg?'pointer':'not-allowed'};border-radius:3px;`;
    upBtn.textContent=`▲ $${fmtNum(upgradeCost)}`;
    if(canAffordUpg)upBtn.onclick=()=>upgradeScript(def.id, nodeId);
    btnGroup.appendChild(upBtn);
  }
  card.appendChild(btnGroup);
  container.appendChild(card);
}

const LOOT_TABLE={

  aircrack:       {type:'wifi_keys',      label:'WiFi Keys',         qty:()=>rnd(1,5),    val:()=>8},

// Faction price bonuses
function getLootValueMult(lootType, nodeId){
  let m=1;
  if(G.faction==='cipher'&&['ssh_creds','root_access','persist_access','btc_keys'].includes(lootType))m*=1.3;
  if(G.faction==='ghost'&&['data_records','db_records','corp_intel','target_intel'].includes(lootType))m*=1.3;
  // Global trace spoils market — buyers get nervous when you're hot
  if(G.trace>70)m*=0.6;
  else if(G.trace>50)m*=0.85;
  // Node heat spoils loot from that specific node
  if(nodeId&&G.networkNodes[nodeId]){
    const nh=G.networkNodes[nodeId].nodeHeat||0;
    if(nh>70)m*=0.7;
    else if(nh>40)m*=0.9;
  }
  // Black market: rep amplifier (time-limited ×2)
  if(G._repBoostUntil&&Date.now()<G._repBoostUntil)m*=2;
  m*=G.rep;
  return m;
}

// Add loot to inventory — stacks same type into existing listing
function generateLoot(missionId, corp, nodeId){
  const def=LOOT_TABLE[missionId]; if(!def)return null;
  let qty=def.qty();
  const val=def.val();
  if(val===0)return null;
  if(!G.lootInventory)G.lootInventory=[];

  // Black market: loot boost doubles qty, consume one charge
  if(G.lootBoostCharges&&G.lootBoostCharges>0){
    qty*=2;
    G.lootBoostCharges--;
    if(G.lootBoostCharges===0)log('> Loot multiplier expired.','dim');
  }

  const existing=G.lootInventory.find(l=>l.type===def.type);
  if(existing){
    existing.qty+=qty;
    existing.originalQty=(existing.originalQty||existing.qty)+qty;
    existing.totalValue=existing.qty*existing.valueEach;
    existing.source=corp||existing.source;
    existing.nodeId=nodeId||existing.nodeId;
    return existing;
  }

  const loot={
    id:randHash(), type:def.type, label:def.label,
    qty, originalQty:qty, valueEach:val,
    source:corp||'UNKNOWN', nodeId:nodeId||null,
    listedAt:Date.now(), totalValue:qty*val,
  };
  G.lootInventory.push(loot);
  return loot;
}

// Market tick — runs every 2s, drains loot into credits
function marketTick(){
  if(!G.lootInventory||G.lootInventory.length===0){
    updateMarketTicker(0,0);
    return;
  }
  const bwMult=Math.log2(G.bandwidth/56+1)*0.5+0.5;
  const sellBoostActive=G.sellBoostUntil&&Date.now()<G.sellBoostUntil;
  const sellBoostMult=sellBoostActive?(G.sellBoostMult||3):1;
  const freezeMult=G.assetFrozen?0.2:1; // asset freeze: 80% reduction
  let totalEarned=0, totalPending=0;
  const toRemove=[];

  G.lootInventory.forEach((loot,idx)=>{
    const sellRate=Math.max(0.5, bwMult*(loot.qty>1000?2:1))*3*sellBoostMult*freezeMult;
    const mult=getLootValueMult(loot.type, loot.nodeId);
    const earned=Math.min(loot.qty*loot.valueEach, sellRate*loot.valueEach*mult*2);
    const qtySold=Math.min(loot.qty, Math.ceil(sellRate*2));

    if(earned>0){
      G.credits+=earned;
      G.marketEarnings=(G.marketEarnings||0)+earned;
      totalEarned+=earned;
      loot.qty-=qtySold;
    }
    totalPending+=loot.qty*loot.valueEach;
    if(loot.qty<=0)toRemove.push(idx);
  });

  toRemove.reverse().forEach(i=>{
    const sold=G.lootInventory[i];
    if(sold)log(`> MARKET: ${sold.label} listing cleared — sale complete`,'dim');
    G.lootInventory.splice(i,1);
  });

  updateMarketTicker(totalEarned/2, totalPending, sellBoostActive, sellBoostMult);
  if(totalEarned>0){
    updateUI();
    if(curPanel==='market')renderPanel('market');
  }
}

function updateMarketTicker(ratePerSec, pending, sellBoostActive, sellBoostMult){
  const el2=el('market-ticker');
  if(!el2)return;
  const ownedCount=Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length;
  const upkeep=ownedCount*2;
  const hasActivity=pending>0||ratePerSec>0||upkeep>0;
  if(!hasActivity){el2.classList.remove('active');return;}
  el2.classList.add('active');
  const warn=G.trace>70?' <span class="mt-warn">⚠ buyers spooked</span>':'';
  let parts=[];
  if(ratePerSec>0){
    const rateDisplay=ratePerSec>=1?`$${ratePerSec.toFixed(2)}`:`$${ratePerSec.toFixed(3)}`;
    const boostTag=sellBoostActive?` <span style="color:#cc44ff">×${sellBoostMult} BOOST</span>`:'';
    parts.push(`MARKET: <span class="mt-val">+${rateDisplay}/s</span>${boostTag} ▸ <span class="mt-val">$${fmtNum(pending)}</span>${warn}`);
  } else if(pending>0){
    parts.push(`MARKET: <span style="color:#4a7a4a">queued</span> ▸ <span class="mt-val">$${fmtNum(pending)}</span>${warn}`);
  }
  if(G.assetFrozen){
    parts.unshift(`<span style="color:#ff2d2d">⚠ ASSETS FROZEN</span> <span style="color:#4a7a4a">· market -80% · SYS to launder</span>`);
  }
  if(upkeep>0){
    parts.push(`<span style="color:#ff6600">UPKEEP: -$${upkeep}/min</span> <span style="color:#4a7a4a">(${ownedCount} node${ownedCount>1?'s':''})</span>`);
  }
  el2.innerHTML=parts.join('  ·  ');
}

function generateBlackMarket(){
  if(!G.blackMarket)G.blackMarket=[];
  const shuffled=[...BM_ITEMS].sort(()=>Math.random()-0.5);
  // Store only serializable fields — cost/effect are functions, never save those
  G.blackMarket=shuffled.slice(0,3).map(item=>({
    id:item.id,
    instanceId:'bm_'+randHash(),
    expiresAt:Date.now()+30*60*1000,
  }));
  G.blackMarketRefresh=Date.now();
  save();
}

function buyBlackMarket(instanceId){
  const stored=G.blackMarket?.find(b=>b.instanceId===instanceId); if(!stored)return;
  if(Date.now()>stored.expiresAt){log('> Item expired.','warn');generateBlackMarket();renderPanel('market');return;}
  // Look up the live template by id — never stored in G (functions aren't serializable)
  const item=BM_ITEMS.find(b=>b.id===stored.id); if(!item)return;
  const cost=item.cost();
  if(G.credits<cost){log(`> Need $${fmtNum(cost)}`,'warn');playFail();return;}
  G.credits-=cost;
  item.effect();
  G.blackMarket=G.blackMarket.filter(b=>b.instanceId!==instanceId);
  playOK(); updateUI();
  if(curPanel==='market')renderPanel('market');
  save();
}

  open_wifi:(ctx,W,H,t)=>{

    persons.forEach((p,i)=>{
      const b=Math.sin(t*1.5+p.bob)*1;
      ctx.fillStyle='#4a7a4a'; ctx.fillRect(p.x*W,p.y*H+b,5,5); // head
      ctx.fillRect(p.x*W+1,p.y*H+5+b,3,8); // body
      // Laptop glow
      ctx.fillStyle='rgba(0,255,65,0.3)'; ctx.fillRect(p.x*W-8,(p.y+0.08)*H+b,8,5);
    });
    // Warm light orbs
    const grad=ctx.createRadialGradient(W*0.5,H*0.2,2,W*0.5,H*0.2,W*0.4);
    grad.addColorStop(0,'rgba(255,183,0,0.06)'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(0,255,65,0.5)'; ctx.font=`${Math.floor(W*0.055)}px monospace`;
    ctx.fillText(`CAF-CAM  ${new Date().toTimeString().slice(0,8)}`,4,12);
  },

  corp_relay:(ctx,W,H,t)=>{
    // Remote desktop — scrolling terminal/code
    ctx.fillStyle='#030808'; ctx.fillRect(0,0,W,H);
    // Fake OS window chrome
    ctx.fillStyle='#0a1a0a'; ctx.fillRect(0,0,W,14);
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,13,W,1);
    ['#ff2d2d','#ffb700','#00ff41'].forEach((c,i)=>{ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(8+i*11,7,4,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle='#4a7a4a'; ctx.font=`${Math.floor(W*0.05)}px monospace`; ctx.fillText('bash — corp_relay@internal',30,10);
    // Scrolling terminal lines
    const lines=['$ netstat -an | grep ESTABLISHED','tcp 0.0.0.0:22 192.168.1.'+rnd(1,254)+':'+rnd(1024,65535)+' ESTABLISHED','$ ps aux | grep suspicious','root 1337 0.2 0.1 ./backdoor.sh','$ cat /etc/shadow | head -5','root:$6$salt$hash123...','$ ./exfil.py --quiet --output /tmp/.x','[████████████████] 94%  2.3GB/2.4GB','$ tail -f /var/log/auth.log','Accepted publickey for root from 10.0.0.1'];
    const scrollOff=Math.floor(t*4)%lines.length;
    for(let i=0;i<Math.floor((H-18)/11);i++){

    if(Math.floor(t*2)%2===0){ctx.fillStyle='#00ff41';ctx.fillRect(2,H-18,7,10);}
  },

  corp_db:(ctx,W,H,t)=>{
    // Database viewer — rows of data scrolling
    ctx.fillStyle='#030a08'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0a1a0a'; ctx.fillRect(0,0,W,14);
    ctx.fillStyle='#4a7a4a'; ctx.font=`${Math.floor(W*0.05)}px monospace`;
    ctx.fillText('mysql> SELECT * FROM users LIMIT 100',2,10);
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,13,W,1);
    // Column headers
    const cols=['ID','USERNAME','EMAIL','HASH','DEPT'];
    const cw=W/cols.length;
    cols.forEach((c,i)=>{ctx.fillStyle='#ffb700';ctx.fillText(c,i*cw+2,24);});
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,27,W,1);
    // Scrolling data rows
    const names=['admin','j.smith','ceo_acct','db_root','hr_mgr','finance1','sysop'];
    const depts=['IT','HR','EXEC','OPS','FIN','LEGAL','SEC'];
    const scrollRow=Math.floor(t*3)%20;
    for(let i=0;i<Math.floor((H-30)/10);i++){
      const row=(i+scrollRow)%20;
      ctx.fillStyle=i%2===0?'#050f08':'#030a06';
      ctx.fillRect(0,30+i*10,W,10);
      ctx.fillStyle='#4a7a4a';
      ctx.fillText(String(1000+row),0*cw+2,38+i*10);
      ctx.fillText(names[row%names.length],1*cw+2,38+i*10);
      ctx.fillText(names[row%names.length]+'@corp.int',2*cw+2,38+i*10);
      ctx.fillStyle='#ff2d2d';
      ctx.fillText('$6$'+randHash().slice(0,8)+'...',3*cw+2,38+i*10);
      ctx.fillStyle='#4a7a4a';
      ctx.fillText(depts[row%depts.length],4*cw+2,38+i*10);
    }
  },

  pos_system:(ctx,W,H,t)=>{
    // POS terminal — transaction log scrolling
    ctx.fillStyle='#020808'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0a1a0a'; ctx.fillRect(0,0,W,14);
    ctx.fillStyle='#ffb700'; ctx.font=`${Math.floor(W*0.055)}px monospace`;
    ctx.fillText('POINT OF SALE v2.1.4',2,10);
    const scroll=Math.floor(t*1.5)%20;
    const items=['COFFEE $3.50','SANDWICH $8.99','BEER x2 $12.00','CHIPS $2.25','TIP 20% $2.70','VISA ****7734','APPROVED','---','COFFEE $3.50','MUFFIN $4.25','CASH $10.00','CHANGE $2.25','---','CARD ****3891','DECLINED','CARD ****8821','APPROVED','TOTAL $21.47'];
    for(let i=0;i<Math.floor((H-16)/11);i++){
      const line=items[(i+scroll)%items.length];
      const isApproved=line==='APPROVED'; const isDeclined=line==='DECLINED'; const isSep=line==='---';
      ctx.fillStyle=isApproved?'#00ff41':isDeclined?'#ff2d2d':isSep?'#1a3a1a':'#4a7a4a';
      ctx.font=`${Math.floor(W*0.05)}px monospace`;
      ctx.fillText(line,4,26+i*11);
    }
  },

  darknet:(ctx,W,H,t)=>{
    // Darknet relay — encrypted traffic visualizer
    ctx.fillStyle='#050005'; ctx.fillRect(0,0,W,H);
    // Animated connection lines
    for(let i=0;i<8;i++){
      const x1=Math.sin(t*0.7+i*0.8)*W*0.35+W/2;
      const y1=Math.cos(t*0.5+i*1.1)*H*0.3+H/2;
      const x2=Math.sin(t*0.3+i*1.4+3)*W*0.35+W/2;
      const y2=Math.cos(t*0.6+i*0.9+2)*H*0.3+H/2;
      ctx.strokeStyle=`rgba(204,68,255,${0.1+Math.sin(t*2+i)*0.1})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    // Nodes
    for(let i=0;i<6;i++){
      const nx=Math.sin(t*0.4+i*1.05)*W*0.35+W/2;
      const ny=Math.cos(t*0.3+i*1.05)*H*0.3+H/2;
      ctx.fillStyle=`rgba(204,68,255,${0.5+Math.sin(t*3+i)*0.3})`; ctx.beginPath(); ctx.arc(nx,ny,3,0,Math.PI*2); ctx.fill();
    }
    // Hex data streams
    ctx.fillStyle='rgba(204,68,255,0.4)'; ctx.font=`${Math.floor(W*0.045)}px monospace`;
    for(let r=0;r<6;r++){
      const chars='0123456789ABCDEF';
      let row='';for(let c=0;c<12;c++)row+=chars[Math.floor((t*5+r*7+c*3)%16)];
      ctx.fillText(row,2,12+r*11);
    }
    ctx.fillStyle='rgba(204,68,255,0.7)'; ctx.font=`${Math.floor(W*0.05)}px monospace`;
    ctx.fillText('RELAY ACTIVE  ANON',2,H-4);
  },
};

function showNodeViewer(nodeId){
  if(!G.remoteViewUnlocked){log('> Remote View not installed. Upgrade HW → INTELLIGENCE.','warn');return;}
  const node=G.networkNodes[nodeId]; if(!node||node.status!=='owned'){log('> Node not owned.','warn');return;}
  const nodeType=node.nodeType||'iot_device';

  // Map node types to their correct scenes
  const sceneMap={
    cam_device:'cam_device',      // Street/outdoor camera
    iot_device:'iot_device',      // Server rack / IoT
    nas_device:'iot_device',      // NAS — shows as server rack
    wifi_router:'open_wifi',      // Router — shows cafe/indoor
    open_wifi:'open_wifi',        // Cafe/public wifi
    pos_system:'pos_system',      // POS terminal
    isp_node:'iot_device',        // ISP relay — server room
    corp_relay:'corp_relay',      // Remote desktop terminal
    corp_mail:'corp_relay',       // Mail server — terminal
    corp_wifi:'open_wifi',        // Corp lobby — indoor
    corp_db:'corp_db',            // Database viewer
    gov_system:'corp_relay',      // Gov system — terminal
    gov_db:'corp_db',             // Gov DB viewer
    darknet:'darknet',            // Darknet — encrypted mesh
  };

  const sceneKey=sceneMap[nodeType]||null;
  if(!sceneKey){
    // No visual scene for this type — show static info
    log(`> Remote View: no visual feed available for ${nodeType} nodes.`,'dim');
    return;
  }
  const scene=VIEWER_SCENES[sceneKey];
  viewerNodeId=nodeId;

  // Build viewer overlay
  const overlay=document.createElement('div');
  overlay.id='node-viewer';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;';

  const header=document.createElement('div');
  header.style.cssText='font-family:Share Tech Mono,monospace;font-size:10px;color:#4a7a4a;letter-spacing:2px;margin-bottom:8px;text-align:center;';
  header.innerHTML=`// REMOTE VIEW — <span style="color:#00ff41">${node.name}</span>  <span style="color:#4a7a4a;">[${nodeType.replace('_',' ').toUpperCase()}]</span>`;

  const canvas=document.createElement('canvas');
  const W=240, H=180;
  canvas.width=W; canvas.height=H;
  canvas.style.cssText=`width:${W}px;height:${H}px;border:1px solid #1a3a1a;image-rendering:pixelated;`;

  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='margin-top:10px;padding:7px 20px;background:transparent;border:1px solid #1a3a1a;color:#4a7a4a;font-family:Share Tech Mono,monospace;font-size:10px;cursor:pointer;letter-spacing:2px;border-radius:3px;';
  closeBtn.textContent='[ DISCONNECT ]';
  closeBtn.onclick=()=>{
    if(viewerAnimFrame){cancelAnimationFrame(viewerAnimFrame);viewerAnimFrame=null;}
    overlay.remove(); viewerNodeId=null;
  };

  overlay.appendChild(header);
  overlay.appendChild(canvas);

  // Node switcher if multiple owned nodes
  const ownedNodes=Object.entries(G.networkNodes).filter(([k,v])=>v.status==='owned');
  if(ownedNodes.length>1){
    const switcher=document.createElement('div');
    switcher.style.cssText='display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;justify-content:center;';
    ownedNodes.forEach(([nid,nstate])=>{
      const btn=document.createElement('button');
      btn.style.cssText=`padding:3px 8px;background:${nid===nodeId?'rgba(0,255,65,.1)':'transparent'};border:1px solid ${nid===nodeId?'#00ff41':'#1a3a1a'};color:${nid===nodeId?'#00ff41':'#4a7a4a'};font-family:Share Tech Mono,monospace;font-size:8px;cursor:pointer;border-radius:2px;`;
      btn.textContent=nstate.name.slice(0,12);
      btn.onclick=()=>{ overlay.remove(); if(viewerAnimFrame){cancelAnimationFrame(viewerAnimFrame);viewerAnimFrame=null;} showNodeViewer(nid); };
      switcher.appendChild(btn);
    });
    overlay.appendChild(switcher);
  }

  overlay.appendChild(closeBtn);
  document.body.appendChild(overlay);

  // Animate
  let t=0;
  const ctx=canvas.getContext('2d');
  function frame(){
    t+=0.016;
    scene(ctx,W,H,t);
    viewerAnimFrame=requestAnimationFrame(frame);
  }
  frame();
}

// Tutorial state — what step are we waiting on
let tutWaiting = null; // null | 'tap_mission' | 'tap_type' | 'phase2_done' | 'open_hw' | 'open_map'

// Called after each meaningful action to advance tutorial
function tutorialCheck(event){
  if(G.tutorialDone) return;
  if(tutWaiting === event){
    tutWaiting = null;
    // Small delay then next step
    setTimeout(()=>tutorialAdvance(), 600);
  }
}

async function runTutorial(){
  G.tutorialStep = 0;
  G.tutorialDone = false;

  // Boot lines
  const bootLines = [
    ['> HACKNODE OS v0.5.0','dim',180],
    ['> Initializing...','dim',120],
    ['> Alias assigned: ghost_r00t','ok',150],
    ['> Location: UNKNOWN  |  Status: UNTRACEABLE','ok',180],
    ['─'.repeat(36),'sep',300],
  ];
  for(const[t,c,w] of bootLines){ log(t,c); await delay(w); }

  await delay(400);
  await tutorialAdvance();
}

async function tutorialAdvance(){
  if(G.tutorialDone) return;
  G.tutorialStep++;

  switch(G.tutorialStep){

    case 1:
      logMsg('v01d: You found this terminal. Good. That means you know what you are doing — or you think you do.','void');
      logMsg('v01d: I will walk you through your first operation. Pay attention.','void');
      log('> [MSG] Incoming message. Check the MSG tab above.','info');
      await delay(1200);
      log('> You need to map the local network before you can hit anything.','dim');
      await delay(800);
      log('> Tap [ OPS ] below. Go to the CONTRACTS tab — there is a NETWORK SCAN job waiting.','info');
      tutWaiting = 'tap_mission';
      break;

    case 2:
      await delay(400);
      log('> Good. Find the NETWORK SCAN contract and tap it to accept.','dim');
      await delay(600);
      log('> Contracts are quick single-tool jobs. They pay out loot you can sell on the market.','info');
      break;

    case 3:
      await delay(500);
      log('> Phase 1: Execute the command.','info');
      await delay(400);
      log('> Every tool starts with you running the command manually. Tap the button to type.','dim');
      await delay(400);
      log('> Each tap advances one character. Upgrade scripting later to go faster.','dim');
      tutWaiting = 'tap_type';
      break;

    case 4:
      await delay(300);
      log('> Keep tapping until the command is complete.','dim');
      tutWaiting = 'phase2_start';
      break;

    case 5:
      await delay(200);
      log('> Phase 2: Hardware processes the op. Watch the countdown.','proc');
      await delay(500);
      log('> Your CPU, bandwidth, and latency determine how fast this runs.','dim');
      await delay(400);
      log('> See the TRACE meter? Every op raises it. Hit 100% and you burn.','warn');
      tutWaiting = 'phase2_done';
      break;

    case 6:
      await delay(500);
      log('─'.repeat(36),'sep');
      log('> Scan complete. A node was revealed on your block.','info');
      await delay(600);
      log('> Now go back to OPS — the MISSIONS tab will show it as a target.','info');
      await delay(400);
      log('> Missions chain multiple tools together against a specific target. Better rewards.','dim');
      await delay(600);
      log('> Tap [ MAP ] to see your network.','info');
      tutWaiting = 'open_map';
      break;

    case 7:
      await delay(500);
      log('> That node is yours to hit. Accept a mission in OPS to start the chain.','dim');
      await delay(600);
      log('> Now check your hardware. Tap [ HW ].','info');
      tutWaiting = 'open_hw';
      break;

    case 8:
      await delay(500);
      log('> Upgrades cost credits. Start with DSL and Tab Complete.','dim');
      await delay(600);
      log('> DSL speeds up data transfers. Tab Complete makes each tap complete a full word.','dim');
      await delay(800);
      logMsg('v01d: One more thing. The TRACE meter decays on its own — but run too many ops back to back and it catches up. Pace yourself. Or burn. Your call.','void');
      log('> [MSG] Another message from v01d.','info');
      await delay(600);
      log('─'.repeat(36),'sep');
      log('> Tutorial complete. You know enough to be dangerous.','ok');
      await delay(400);
      log('> Run contracts. Accept missions. Reveal nodes. Expand.','dim');
      await delay(200);
      log('> Someone is watching. They always are.','dim');
      G.tutorialDone = true;
      save();
      break;
  }
}

// Hook tutorial events into existing functions
function onTutMissionSelected(){
  // Fires when any tool is selected (via contract accept or direct)
  if(G.tutorialDone) return;
  if(G.tutorialStep === 1){ tutorialCheck('tap_mission'); tutorialAdvance(); }
  else if(G.tutorialStep === 2){ G.tutorialStep = 2; tutorialAdvance(); }
}
function onTutFirstTap(){
  if(G.tutorialDone||G.tutorialStep < 3) return;
  if(G.tutorialStep === 3){ tutorialCheck('tap_type'); tutorialAdvance(); }
}
function onTutPhase2Start(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 4){ tutorialCheck('phase2_start'); tutorialAdvance(); }
}
function onTutPhase2Done(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 5){ tutorialCheck('phase2_done'); tutorialAdvance(); }
}
function onTutMapOpened(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 6){ tutorialCheck('open_map'); tutorialAdvance(); }
}
function onTutHWOpened(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 7){ tutorialCheck('open_hw'); tutorialAdvance(); }
}

async function boot(){
  const status=el('bootstatus'),screen=el('boot');
  // Load sound pref first
  const snd=localStorage.getItem('hacknode_snd');
  const hasSave=load();
  G.soundOn=snd==='1'; // sound pref overrides save
  const sndBtn=document.getElementById('nb-snd');
  if(sndBtn){sndBtn.textContent=G.soundOn?'SND✓':'SND';sndBtn.style.color=G.soundOn?'#00ff41':'#4a7a4a';}

  for(const line of['HACKNODE OS v0.4.0','Kernel modules loaded...','Network stack initialised...','Anonymisation layer: ACTIVE','Narrative engine: ONLINE','System ready.']){status.textContent=line;await delay(240);}
  await delay(300);
  screen.style.transition='opacity .5s'; screen.style.opacity='0';
  await delay(500); screen.style.display='none';

  initNetworkMap();

  if(hasSave){
    G.missionRunning=false; G.phase=null; G.activeMission=null;
    if(!G.missionQueue)G.missionQueue=[];
    if(!G.knownTargets)G.knownTargets={};
    if(!G.networkNodes)G.networkNodes={};
    if(!G.sectorProgress)G.sectorProgress={0:{missions:0,owned:0}};
    if(!G.unlockedSectors)G.unlockedSectors=[0];
    if(!G.deployedScripts)G.deployedScripts=[];
    if(!G.lootInventory)G.lootInventory=[];
    if(!G.marketEarnings)G.marketEarnings=0;
    if(!G.newsItems)G.newsItems=[];
    if(!G.shownMsgIds)G.shownMsgIds=[];
    if(!G.nodeCooldowns)G.nodeCooldowns={};
    if(!G.contracts)G.contracts=[];
    if(!G.missionChainsCompleted)G.missionChainsCompleted=0;
    if(!G.ownedScripts)G.ownedScripts=[];
    if(!G.activeUpgrades)G.activeUpgrades={};
    if(!G.sectorReconContracts)G.sectorReconContracts={};
    if(G.offlineAgentLevel===undefined)G.offlineAgentLevel=0;
    if(G.traceFloor===undefined)G.traceFloor=0;
    if(G.remoteViewUnlocked===undefined)G.remoteViewUnlocked=false;
    if(!G.blackMarket)G.blackMarket=[];
    if(!G.blackMarketRefresh)G.blackMarketRefresh=0;
    if(!G.lootBoostCharges)G.lootBoostCharges=0;
    if(!G.burnerProxyCharges)G.burnerProxyCharges=0;
    if(!G.sellBoostUntil)G.sellBoostUntil=0;
    if(!G.sellBoostMult)G.sellBoostMult=3;
    if(!G.hiredHackers)G.hiredHackers=[];
    if(G.assetFrozen===undefined)G.assetFrozen=false;
    if(G.softBurnCount===undefined)G.softBurnCount=0;
    // Restore shownMsgs Set from saved array — prevents message re-fire on reload
    shownMsgs=new Set(G.shownMsgIds);
    // Silently restore MSG pane from saved messages (no new notifications)
    if(G.shownMsgIds.length>0){
      const msgPane=getMsgPane();
      VOID_MSGS.filter(m=>shownMsgs.has(m.at)).forEach(m=>{
        const sep1=document.createElement('span');sep1.className='ll sep';sep1.textContent='─'.repeat(36);
        msgPane.appendChild(sep1);
        const el2=document.createElement('span');el2.className='ll '+(m.cls||'story');el2.textContent=m.msg;
        msgPane.appendChild(el2);
        const sep2=document.createElement('span');sep2.className='ll sep';sep2.textContent='─'.repeat(36);
        msgPane.appendChild(sep2);
      });
    }
    if(G.faction&&FACTION_MT[G.faction])FACTION_MISSIONS=FACTION_MT[G.faction].map(t=>genMission(t));
    if(G.typingTier>=3&&isUpgradeActive('type3'))startAutoTick();
    initNetworkMap(); initRivalNodes(); renderNewsPane();
    // Migrate: re-derive nodeType from MAP_NODES so viewer scenes are always correct
    MAP_NODES.forEach(n=>{
      if(G.networkNodes[n.id]&&n.nodeType){
        G.networkNodes[n.id].nodeType=n.nodeType;
      }
    });
    // Generate contracts if board is empty
    if(!G.contracts||G.contracts.length===0)generateContracts();
    // Restore faction bar
    if(G.faction){el('faction-bar').classList.add('on');el('faction-cipher').style.display=G.faction==='cipher'?'block':'none';el('faction-ghost').style.display=G.faction==='ghost'?'block':'none';}
    const secsAway=Math.floor((Date.now()-G.lastSeen)/1000); // capture BEFORE updateUI() calls save()
    updateUI(); updateTapBtn(); updateTraceBar();
    log('> Connection restored.','dim');
    log(`> Welcome back, ${G.alias}`,'ok');
    if(G.faction)log(`> Faction: ${G.faction.toUpperCase()} — standing confirmed`,G.faction);
    if(G.missionsCompleted>0)log(`> ${G.missionsCompleted} ops on record. ${Object.keys(G.knownTargets).length} targets known.`,'dim');
    // Resume active mission chain if one was in progress
    if(G.activeMissionChain){
      const chain=G.activeMissionChain;
      const activeStep=chain.steps[chain.currentStep];
      logSep();
      log(`> MISSION RESUMED: ${chain.name}`,'info');
      log(`> Step ${chain.currentStep+1}/${chain.steps.length}: ${getMissionToolName(activeStep?.toolId||'')}`,'dim');
      log(`> Tap [ OPS ] → MISSIONS to continue.`,'info');
      logSep();
      // Mark current step back to pending so it can be restarted
      if(activeStep&&activeStep.status==='active')activeStep.status='pending';
    }
    const g=calcOff(secsAway);
    if(g)setTimeout(()=>{showOffModal(g);updateUI();},600);
  }else{
    initNetworkMap(); initRivalNodes();
    generateContracts();
    updateUI(); updateTapBtn();
    await runTutorial();
  }
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

boot();
setInterval(()=>save(),30000);
// Market tick — drains loot into credits
setInterval(()=>marketTick(),2000);
// Script tick
setInterval(()=>scriptTick(),2000);
// Rival passive reclaim — every 10 minutes
setInterval(()=>{if(Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length>2)rivalPassiveReclaim();},600000);
// Node heat decay — every 5 seconds
setInterval(()=>nodeHeatTick(),5000);
setInterval(()=>{if(G.trace>50&&G.missionRunning&&Math.random()<.3)triggerRivalRaid();},180000);
// News feed — new item every 3-5 min
setInterval(()=>{
  if(G.missionsCompleted>=3){addNewsItem();}
},rnd(180000,300000));
// Sector progress bar update
setInterval(()=>{
  // Update owned count in sector progress
  const owned=countOwnedInSector(G.currentSector);
  if(!G.sectorProgress[G.currentSector])G.sectorProgress[G.currentSector]={missions:0,owned:0};
  G.sectorProgress[G.currentSector].owned=owned;
  tryUnlockSectors();
},10000);
</script>
